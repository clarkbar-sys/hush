    { const jn = $("#job-new"); if(jn) jn.addEventListener("click", ()=>{ if(m.online) openJobSheet(m.id); }); }
    app.querySelectorAll("[data-jrm]").forEach(b=>{
      b.addEventListener("click", ()=> deleteJob(b.dataset.jmid, b.dataset.jrm, b.dataset.jname));
    });
    // Jobs live on the agent, so pull them lazily on entry rather than dragging
    // every box's cron list through the 2s fleet poll. Demo jobs come baked into
    // the fixture, so only live mode fetches.
    if(MODE!=="demo" && m.online) loadJobs(m.id);
    const bo = $("#browse-open");
    if(bo) bo.addEventListener("click", ()=>{ if(!m.online) return; state.browsePath="/"; fillBrowse(m.id); });
    if(state.browsePath!=null) fillBrowse(m.id);
  }

  /* ---------- Files: the Store construct, unjailed, bounded by the hush user's
     read permissions on the box. Directories descend; files list (opening them
     is a later step). ---------- */
  async function fillBrowse(id){
    const path = state.browsePath;
    const stale = () => state.view!=="machine" || state.mid!==id || state.browsePath!==path;
    let box = $("#browse");
    if(!box) return;
    try {
      const r = await fetch(`api/machines/${encodeURIComponent(id)}/browse?path=${encodeURIComponent(path)}`, {cache:"no-store"});
      if(stale()) return;
      box = $("#browse"); if(!box) return;
      if(!r.ok){
        const msg = r.status===403 ? "permission denied — the hush user can't read this"
          : r.status===404 ? "no such directory"
          : r.status===400 ? "not a directory"
          : r.status===502 ? "machine unreachable" : `error ${r.status}`;
        box.innerHTML = browseBar(path, "") + `<div class="empty">${esc(msg)}</div>`;
        wireBrowse(id); return;
      }
      const l = await r.json();
      if(stale()) return;
      box = $("#browse"); if(!box) return;
      const rows = (l.entries||[]).map(browseRow).join("");
      const trunc = l.truncated ? `<div class="empty">directory truncated — showing the first entries</div>` : "";
      box.innerHTML = browseBar(l.path, l.parent) + (rows || `<div class="empty">empty directory</div>`) + trunc;
      wireBrowse(id);
    } catch(e){
      if(stale()) return;
      box = $("#browse"); if(box){ box.innerHTML = browseBar(path, "") + `<div class="empty">could not load</div>`; wireBrowse(id); }
    }
  }
  function browseBar(path, parent){
    const up = parent ? `<a data-up="${esc(parent)}">↑ up</a>` : "";
    // Keep the leading "/" and the deepest segments visible on a phone; drop
    // the middle of a long path rather than truncating the part that matters.
    let shown = path;
    if(path.length > 40){
      const parts = path.split("/").filter(Boolean);
      shown = "/…/" + parts.slice(-2).join("/");
    }
    return `<div class="browsebar"><span class="bpath" title="${esc(path)}">${esc(shown)}</span>
      <span class="bactions">${up}<a data-close>✕ close</a></span></div>`;
  }
  function browseRow(e){
    if(e.isDir){
      return `<button class="row" data-dir="${esc(e.name)}">
        <span class="gly">▸</span><span class="nm">${esc(e.name)}</span>
        <span class="rt">dir</span></button>`;
    }
    const sym = e.symlink ? `<span class="rt" style="opacity:.65">→ ${esc(e.symlink)}</span>` : "";
    return `<button class="row" data-file="${esc(e.name)}" data-size="${e.size}">
      <span class="gly" style="background:var(--accent-soft);color:var(--accent)">▪</span>
      <span class="nm">${esc(e.name)}</span>${sym}
      <span class="rt">${fmtBytes(e.size)}</span></button>`;
  }
  function wireBrowse(id){
    const box = $("#browse"); if(!box) return;
    box.querySelectorAll("[data-dir]").forEach(el=>el.addEventListener("click", ()=>{
      const base = state.browsePath==="/" ? "" : state.browsePath;
      state.browsePath = base + "/" + el.dataset.dir;
      fillBrowse(id);
    }));
    box.querySelectorAll("[data-file]").forEach(el=>el.addEventListener("click", ()=>{
      const base = state.browsePath==="/" ? "" : state.browsePath;
      openFile(id, base + "/" + el.dataset.file, el.dataset.file, +el.dataset.size);
    }));
    const up = box.querySelector("[data-up]");
    if(up) up.addEventListener("click", ()=>{ state.browsePath = up.dataset.up; fillBrowse(id); });
    const cl = box.querySelector("[data-close]");
    if(cl) cl.addEventListener("click", ()=>{ state.browsePath = null; renderMachine(); });
  }

  // openFile pops a viewer over the console for one file, streamed through
  // control's /file proxy. The kind is chosen by extension: video/audio get a
  // seekable player (the proxy forwards Range requests), images render inline,
  // small text is fetched and shown, and anything else offers a download. The
  // overlay lives on <body>, so the fleet poll re-rendering #app underneath
  // never tears it down.
  const VIDEO=["mp4","webm","ogv","ogm","mov","m4v"];
  const AUDIO=["mp3","ogg","oga","wav","flac","m4a","aac","opus"];
  const IMAGE=["png","jpg","jpeg","gif","webp","avif","svg","bmp","ico"];
  const TEXT=["txt","log","md","markdown","json","yaml","yml","toml","ini","conf","cfg","xml",
    "csv","tsv","sh","bash","zsh","fish","go","py","js","mjs","ts","c","h","cpp","hpp","rs","rb",
    "lua","pl","php","sql","html","css","service","timer","env","dockerfile","makefile","license"];
  const TEXT_MAX = 1024*1024;
  function openFile(id, path, name, size){
    const url = `api/machines/${encodeURIComponent(id)}/file?path=${encodeURIComponent(path)}`;
    const dl = url + "&download=1";
    const ext = name.includes(".") ? name.split(".").pop().toLowerCase() : name.toLowerCase();
    const ov = document.createElement("div");
    ov.className = "vov";
    ov.innerHTML = `<div class="vsheet">
        <div class="vbar">
          <div class="vname" title="${esc(path)}">${esc(name)}</div>
          <div class="vmeta">${fmtBytes(size)}</div>
          <a class="vbtn" href="${dl}">⤓ Download</a>
          <button class="vbtn vclose" aria-label="Close">✕</button>
        </div>
        <div class="vbody"><div class="vnote">loading…</div></div>
      </div>`;
    document.body.appendChild(ov);
    const body = ov.querySelector(".vbody");
    const alive = () => document.body.contains(ov);
    const close = () => { ov.remove(); document.removeEventListener("keydown", onkey); };
    const onkey = e => { if(e.key==="Escape") close(); };
    document.addEventListener("keydown", onkey);
    ov.querySelector(".vclose").addEventListener("click", close);
    ov.addEventListener("click", e => { if(e.target===ov) close(); });

    if(VIDEO.includes(ext)){
      body.innerHTML = `<video class="vmedia" controls autoplay playsinline src="${url}"></video>`;
    } else if(AUDIO.includes(ext)){
      body.innerHTML = `<audio class="vmedia vaudio" controls autoplay src="${url}"></audio>`;
    } else if(IMAGE.includes(ext)){
      body.innerHTML = `<img class="vmedia" src="${url}" alt="${esc(name)}">`;
    } else if(TEXT.includes(ext)){
      if(size!=null && size>TEXT_MAX){
        body.innerHTML = `<div class="vnote">${fmtBytes(size)} — too large to preview. Use Download.</div>`;
      } else {
        fetch(url, {cache:"no-store"})
          .then(r => r.ok ? r.text() : Promise.reject(r.status))
          .then(t => { if(alive()) body.innerHTML = `<pre class="vpre"></pre>`, body.firstChild.textContent = t; })
          .catch(s => { if(alive()) body.innerHTML = `<div class="vnote">could not load (${esc(String(s))})</div>`; });
      }
    } else {
      body.innerHTML = `<div class="vnote">No inline preview for this file — use Download.</div>`;
    }
  }
  function fmtBytes(n){
    if(n==null) return "";
    if(n<1024) return n+" B";
    const u=["K","M","G","T","P"]; let i=-1, v=n;
    do { v/=1024; i++; } while(v>=1024 && i<u.length-1);
    return (v>=10?Math.round(v):v.toFixed(1))+" "+u[i]+"B";
  }

  function svcRow(s){
    return `<button class="row" data-svc="${s.name}">
      <span class="gly">◉</span>
      <span class="nm">${s.name}</span>
      <span class="rt">${s.mem && s.mem!=="—" ? s.mem : ""}</span>
      <span class="state ${s.state}"><span class="sd"></span>${s.state}</span>
    </button>`;
  }
  // jobRow renders one Job on the Machine view. It speaks two shapes: the live
  // agent's jobView ({id, name, schedule, cmd, status:{running, runs, lastCode,
  // lastRun}}) and the demo fleet's lighter {name, sched, next}. Status leads —
  // whether the last fire passed is the thing worth seeing at a glance — with a
  // quiet delete on the right. The command rides the row title so what a job
  // does is legible on hover.
  function jobRow(j, mid){
    const name = esc(j.name || "");
    const sched = esc(j.schedule || j.sched || "");
    const st = j.status || {};
    let cls, label;
    if(j.next!==undefined && !st.runs && !st.running){     // demo: no run history yet
      cls = "sched"; label = esc(j.next || "scheduled");
    } else if(st.running){
      cls = "running"; label = "running";
    } else if(st.runs){
      const ok = st.lastCode === 0;
      cls = ok ? "ok" : "failed";
      label = (ok ? "ok" : "fail") + (st.lastRun ? " · " + relTimeISO(st.lastRun) : "");
    } else {
      cls = "sched"; label = "scheduled";
    }
    const key = j.id || j.name || "";
    const del = mid ? `<button class="jrm" data-jrm="${esc(key)}" data-jmid="${esc(mid)}" data-jname="${name}" aria-label="Delete job" title="Delete job">✕</button>` : "";
    return `<div class="row" style="cursor:default" title="${esc(j.cmd||"")}">
      <span class="gly">◷</span>
      <span class="nm">${name}</span>
      <span class="rt">${sched}</span>
      <span class="state ${cls}"><span class="sd"></span>${label}</span>
      ${del}
    </div>`;
  }
  // relTimeISO adapts relTime (which wants an epoch-ms) to the agent's RFC3339
  // lastRun stamps, degrading to "" on anything unparseable.
  function relTimeISO(iso){ const t = Date.parse(iso); return isNaN(t) ? "" : relTime(t); }
  // taskRow renders one run — either a live session run recorded by RUNS
  // ({cmd, ts, ok, label}) or a demo-fleet entry ({name, when, ok}).
  function taskRow(t){
    const name = esc(t.cmd || t.name || "");
    const when = t.ts ? relTime(t.ts) : (t.when || "");
    const ok = t.ok !== false;
    const label = esc(t.label || (ok ? "ok" : "fail"));
    return `<div class="row" style="cursor:default">
      <span class="gly">⚡</span>
      <span class="nm mono" title="${name}">${name}</span>
      <span class="rt">${esc(when)}</span>
      <span class="state ${ok?"ok":"failed"}"><span class="sd"></span>${label}</span>
    </div>`;
  }

  // relTime renders a coarse "how long ago" for ephemeral run records.
  function relTime(ts){
    const s = Math.round((Date.now()-ts)/1000);
    if(s < 45) return "just now";
    const m = Math.round(s/60); if(m < 60) return m+"m ago";
    return Math.round(m/60)+"h ago";
  }

  /* ---------- Task: run a one-shot command, streamed live ----------
     The Task construct — "a one-shot run of a program — ephemeral". The sheet
     picks a machine and a command; running opens a full-screen live view that
     streams the agent's Server-Sent Events (start → out → exit) and records the
     outcome into RUNS so the Machine view's Tasks section reflects it. */
  const taskScrim = $("#taskScrim");
  const taskBody = $("#taskSheetBody");
  let taskDraft = { id:null, cmd:"" };

  function openTaskSheet(preId){
    const online = M.filter(m=>m.online);
    taskDraft = { id: preId || (online[0] && online[0].id) || null, cmd:"" };
    renderTaskSheet();
    taskScrim.classList.add("open");
  }
  function closeTaskSheet(){ taskScrim.classList.remove("open"); }
  taskScrim.addEventListener("click", e=>{ if(e.target===taskScrim) closeTaskSheet(); });

  function renderTaskSheet(){
    const online = M.filter(m=>m.online);
    if(!online.length){
      taskBody.innerHTML = `<h3>Run a task</h3>
        <p class="sd">a one-shot command on one machine</p>
        <div class="field-note">No machines are online to run on.</div>
        <div class="sheet-actions"><button class="btn primary" id="tClose" style="flex:1">Close</button></div>`;
      $("#tClose").addEventListener("click", closeTaskSheet);
      return;
    }
    if(!online.some(m=>m.id===taskDraft.id)) taskDraft.id = online[0].id;
    const opts = online.map(m=>`<option value="${esc(m.id)}"${m.id===taskDraft.id?" selected":""}>${esc(m.id)}${m.os?` · ${esc(m.os)}`:""}</option>`).join("");
    taskBody.innerHTML = `
      <h3>Run a task</h3>
      <p class="sd">a one-shot command — streamed live, nothing persisted</p>
      <div class="field">
        <label>Machine</label>
        <select id="tMachine">${opts}</select>
      </div>
      <div class="field">
        <label>Command</label>
        <input type="text" id="tCmd" placeholder="e.g. uptime" autocapitalize="off" autocorrect="off" spellcheck="false" value="${esc(taskDraft.cmd)}">
        <div class="hint">runs via <b>sh -c</b> as the unprivileged hush user</div>
      </div>
      <div class="field-note">
        <b>Heads up —</b> this runs on <b>${esc(taskDraft.id)}</b> with no sandbox. It can do anything the hush user can — the OS permissions are the only fence.
      </div>
      <div class="sheet-actions">
        <button class="btn ghost" id="tCancel">Cancel</button>
        <button class="btn primary" id="tRun">⚡ Run</button>
      </div>`;
    const cmdEl = $("#tCmd");
    $("#tMachine").addEventListener("change", e=>{ taskDraft.id = e.target.value; renderHostNote(); });
    cmdEl.addEventListener("input", e=>{ taskDraft.cmd = e.target.value; });
    cmdEl.addEventListener("keydown", e=>{ if(e.key==="Enter") runTask(); });
    $("#tCancel").addEventListener("click", closeTaskSheet);
    $("#tRun").addEventListener("click", runTask);
    cmdEl.focus();
  }
  // Keep the danger note's named host in sync when the machine select changes,
  // without stealing focus from the command field.
  function renderHostNote(){
    const n = taskBody.querySelector(".field-note");
    if(n) n.innerHTML = `<b>Heads up —</b> this runs on <b>${esc(taskDraft.id)}</b> with no sandbox. It can do anything the hush user can — the OS permissions are the only fence.`;
  }
  function runTask(){
    const cmd = (taskDraft.cmd || "").trim();
    const id = taskDraft.id;
    if(!cmd){ $("#tCmd").focus(); return; }
    if(!id) return;
    closeTaskSheet();
    openRunView(id, cmd);
  }

  // openRunView streams one run to a full-screen terminal overlay and records
  // the outcome. Cancel/close aborts the fetch, which drops the connection and
  // (through hush-control) cancels the request context — killing the command's
  // process group on the box.
  function openRunView(id, cmd, opts){
    opts = opts || {};
    const canSave = opts.canSave !== false && MODE !== "demo";
    const ov = document.createElement("div");
    ov.className = "vov";
    ov.innerHTML = `<div class="vsheet">
        <div class="vbar">
          <span class="state running" id="rvState"><span class="sd"></span>running</span>
          <div class="vname" title="${esc(cmd)}">${esc(cmd)}</div>
          <div class="vmeta" id="rvMeta">${esc(id)}</div>
          ${canSave ? `<button class="vbtn" id="rvSave">＋ Save as Task</button>` : ""}
          <button class="vbtn" id="rvStop">■ Cancel</button>
          <button class="vbtn vclose" aria-label="Close">✕</button>
        </div>
        <div class="vbody runbody"><pre class="runterm" id="rvOut"></pre></div>
      </div>`;
    document.body.appendChild(ov);
    // The bridge from ephemeral to saved: mint a Task from exactly this run.
    const saveBtn = ov.querySelector("#rvSave");
    if(saveBtn) saveBtn.addEventListener("click", ()=> openTaskSaveSheet({ name:"", host:id, cmd }));
    const out = ov.querySelector("#rvOut");
    const stateEl = ov.querySelector("#rvState");
    const metaEl = ov.querySelector("#rvMeta");
    const stopBtn = ov.querySelector("#rvStop");
    const ac = new AbortController();
    let finished = false, recorded = false;

    const append = (text, cls) => {
      if(text == null || text === "") return;
      const span = document.createElement("span");
      if(cls) span.className = cls;
      span.textContent = text;
      out.appendChild(span);
      out.scrollTop = out.scrollHeight;
    };
    const setState = (cls, label, meta) => {
      stateEl.className = "state " + cls;
      stateEl.innerHTML = `<span class="sd"></span>${esc(label)}`;
      if(meta != null) metaEl.textContent = meta;
    };
    const record = (ok, label) => {
      if(recorded) return; recorded = true;
      RUNS[id] = RUNS[id] || [];
      RUNS[id].unshift({ cmd, ts: Date.now(), ok, label });
      RUNS[id] = RUNS[id].slice(0, 8);
      if(state.view === "machine" && state.mid === id) render();
    };
    const close = () => { ac.abort(); ov.remove(); document.removeEventListener("keydown", onkey); };
    const onkey = e => { if(e.key === "Escape") close(); };
    document.addEventListener("keydown", onkey);
    ov.querySelector(".vclose").addEventListener("click", close);
    ov.addEventListener("click", e => { if(e.target === ov) close(); });
    stopBtn.addEventListener("click", () => {
      if(finished){ close(); return; }
      ac.abort();
      finished = true;
      stopBtn.textContent = "✕ Close";
      setState("stopped", "canceled", id);
      record(false, "canceled");
    });

    const onEvent = ev => {
      if(ev.kind === "start"){ setState("running", "running", `${id} · pid ${ev.pid}`); }
      else if(ev.kind === "out"){ append(ev.data, ev.stream === "stderr" ? "err" : null); }
      else if(ev.kind === "error"){ append((ev.data||"error")+"\n", "err"); }
      else if(ev.kind === "exit"){
        finished = true;
        stopBtn.textContent = "✕ Close";
        // code is omitted from the JSON when it's 0 (Go's omitempty), so a
        // missing code means success — not an undefined exit.
        const code = ev.code == null ? 0 : ev.code;
        const ok = code === 0 && !ev.signal;
        const label = ev.signal ? ev.signal : ("exit " + code);
        const bits = [label, fmtDur(ev.ms)];
        if(ev.truncated) bits.push("output truncated");
        setState(ok ? "ok" : "failed", label, `${id} · ${bits.slice(1).join(" · ")}`);
        record(ok, label);
      }
    };

    const runner = MODE === "demo" ? simulateExec(cmd, onEvent, ac.signal)
      : streamExec(opts.runUrl || `api/machines/${encodeURIComponent(id)}/exec`, { cmd, timeoutSec: 300 }, onEvent, ac.signal);
    runner.catch(err => {
      if(ac.signal.aborted) return; // canceled path already handled
      finished = true;
      stopBtn.textContent = "✕ Close";
      const msg = (err && err.message) ? err.message : "connection failed";
      append("\n" + msg + "\n", "err");
      setState("failed", err && err.status ? ("error " + err.status) : "error", id);
      record(false, "error");
    });
  }

  // streamExec POSTs a run and parses the Server-Sent Events off the response
  // body, delivering each decoded event to onEvent as it arrives.
  async function streamExec(url, payload, onEvent, signal){
    const res = await fetch(url, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload), signal
    });
    if(!res.ok || !res.body){
      const txt = await res.text().catch(()=> "");
      throw { status: res.status, message: (txt || "").trim() || ("error " + res.status) };
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    for(;;){
      const { value, done } = await reader.read();
      if(done) break;
      buf += dec.decode(value, { stream:true });
      let i;
      while((i = buf.indexOf("\n\n")) >= 0){
        const frame = buf.slice(0, i); buf = buf.slice(i + 2);
        const line = frame.split("\n").find(l => l.startsWith("data:"));
        if(!line) continue;
        try { onEvent(JSON.parse(line.slice(5).trim())); } catch(e){}
      }
    }
  }

  // simulateExec fakes a run for demo/offline mode, so the feature is legible
  // without a live hush-control behind it.
  function simulateExec(cmd, onEvent, signal){
    return new Promise((resolve, reject) => {
      if(signal.aborted) return reject(new Error("aborted"));
      const t = [];
      const at = (ms, fn) => t.push(setTimeout(fn, ms));
      const bail = () => { t.forEach(clearTimeout); reject(new Error("aborted")); };
      signal.addEventListener("abort", bail, { once:true });
      onEvent({ kind:"start", pid: 4000 + Math.floor(Math.random()*900) });
      at(220, ()=> onEvent({ kind:"out", stream:"stdout", data:`$ ${cmd}\n` }));
      at(520, ()=> onEvent({ kind:"out", stream:"stdout", data:"demo mode — no agent connected.\n" }));
      at(820, ()=> onEvent({ kind:"out", stream:"stdout", data:"this is a simulated run.\n" }));
      at(1100, ()=> { signal.removeEventListener("abort", bail); onEvent({ kind:"exit", code:0, ms:1100 }); resolve(); });
    });
  }

  // fmtDur renders a run's wall-clock duration compactly.
  function fmtDur(ms){
    if(ms == null) return "";
    if(ms < 1000) return ms + "ms";
    const s = ms/1000;
    return (s < 10 ? s.toFixed(1) : Math.round(s)) + "s";
  }

  /* ---------- Workflow: a wired sequence of steps, saved and re-runnable ----------
     The Workflow construct — "a wired sequence (cd X → git pull → restart) —
     reusable, stampable". The sheet lists saved blueprints (Run / Edit / Delete)
     and builds new ones: a name plus an ordered list of {machine, command} steps.
     Edit reloads a blueprint into the builder and re-saves it in place (same id).
     Running streams a combined live log, one command after another over the
     tailnet, stopping at the first step that fails — the same /exec each Task
     uses, with sequencing on top. In demo mode blueprints live in memory so the
     feature is legible without a live hush-control behind it. */
  const wfScrim = $("#wfScrim");
  const wfBody = $("#wfSheetBody");
  let wfDraft = { name:"", steps:[] };   // the blueprint being built
  let wfSaved = [];                       // saved blueprints (from the server, or demo memory)
  const wfDemo = [];                      // demo-mode store, seeded lazily on first open
  let taskSaved = [];                     // saved Tasks (the reusable atom) from the server, or demo memory
  const taskDemo = [];                    // demo-mode task store, seeded lazily on first load

  function openWorkflowSheet(){
    wfDraft = { name:"", steps:[] };
    wfScrim.classList.add("open");
    wfBody.innerHTML = `<h3>Workflows</h3><p class="sd">loading saved blueprints…</p>`;
    loadWorkflows().then(list => { wfSaved = list; renderWorkflowSheet(); });
  }
  function closeWorkflowSheet(){ wfScrim.classList.remove("open"); }
  wfScrim.addEventListener("click", e=>{ if(e.target===wfScrim) closeWorkflowSheet(); });

  // Opens the sheet straight into editing an existing workflow, used by the
  // Fleet page's Workflows rollup (the sheet itself no longer lists saved
  // workflows — that list lives only on the Fleet page now).
  function openWorkflowSheetForEdit(id){
    wfScrim.classList.add("open");
    editWorkflow(id);
  }

  async function loadWorkflows(){
    if(MODE === "demo"){
      if(!wfDemo.length){
        // one worked example so the builder isn't a blank page in demo mode
        wfDemo.push({ id:"deploy-api-demo", name:"Deploy API", createdAt:"",
          steps:[{host:"citadel",cmd:"cd /srv/api && git pull"},{host:"citadel",cmd:"systemctl restart api"}] });
      }
      return wfDemo.slice();
    }
    try {
      const r = await fetch("api/workflows", {cache:"no-store"});
      if(!r.ok) throw new Error("bad status");
      const list = await r.json();
      return Array.isArray(list) ? list : [];
    } catch(e){ return []; }
  }

  // Keeps wfSaved fresh so the Fleet page's Workflows rollup has data even
  // if the user never opens the Workflows sheet.
  async function pollWorkflows(){
    wfSaved = await loadWorkflows();
    render();
  }

  function renderWorkflowSheet(){
    const fleet = M.slice();
    if(!wfDraft.steps.length) wfDraft.steps = [{ host:(fleet[0]&&fleet[0].id)||"", cmd:"" }];

    const stepRows = wfDraft.steps.map((st,i)=>{
      const opts = fleet.map(m=>`<option value="${esc(m.id)}"${m.id===st.host?" selected":""}>${esc(m.id)}${m.online?"":" · offline"}</option>`).join("");
      return `<div class="wf-step" data-i="${i}">
        <div class="wf-idx">${i+1}</div>
        <div class="wf-fields">
          <select data-field="host" data-i="${i}">${opts||`<option value="">no machines</option>`}</select>
          <input type="text" data-field="cmd" data-i="${i}" placeholder="e.g. cd /srv/api && git pull" autocapitalize="off" autocorrect="off" spellcheck="false" value="${esc(st.cmd)}">
        </div>
        <button class="wf-del" data-del="${i}" aria-label="Remove step"${wfDraft.steps.length>1?"":" style=\"visibility:hidden\""}>✕</button>
      </div>`;
    }).join("");

    const editing = !!wfDraft.editId;
    wfBody.innerHTML = `
      <h3>Workflows</h3>
      <p class="sd">a wired sequence — saved once, re-run any time</p>
      <div class="field" style="margin-top:4px">
        <label>${editing ? "Edit workflow" : "New workflow"}${editing ? ` <button class="wf-editcancel" id="wfEditCancel">new instead</button>` : ""}</label>
        <input type="text" id="wfName" placeholder="e.g. Deploy API" value="${esc(wfDraft.name)}" autocapitalize="off" spellcheck="false">
      </div>
      <div id="wfSteps">${stepRows}</div>
      <button class="wf-add" id="wfAdd">＋ Add step</button>
      ${taskSaved.length ? `<div class="wf-tasklib">
        <div class="wf-tasklib-h">or drop in a saved Task</div>
        <div class="wf-tasklib-row">${taskSaved.map(t=>`<button class="wf-taskchip" data-addtask="${esc(t.id)}" title="${esc(t.cmd)}">⚡ ${esc(t.name)}<span>${esc(t.host)}</span></button>`).join("")}</div>
      </div>` : ""}
      <div class="field-note">
        <b>Heads up —</b> each step runs unsandboxed on its machine and stops the run if it fails. It can do anything the hush user can.
      </div>
      <div class="sheet-actions">
        <button class="btn ghost" id="wfCancel">Cancel</button>
        <button class="btn primary" id="wfSave">${editing ? "Update workflow" : "Save workflow"}</button>
      </div>`;

    if(!fleet.length){
      wfBody.querySelector("#wfSave").disabled = true;
      wfBody.querySelector("#wfAdd").disabled = true;
    }
    $("#wfName").addEventListener("input", e=>{ wfDraft.name = e.target.value; });
    wfBody.querySelectorAll("[data-field]").forEach(el=>{
      el.addEventListener("input", e=>{
        const i = +e.target.dataset.i;
        wfDraft.steps[i][e.target.dataset.field] = e.target.value;
      });
    });
    wfBody.querySelectorAll("[data-del]").forEach(b=>{
      b.addEventListener("click", ()=>{ wfDraft.steps.splice(+b.dataset.del,1); renderWorkflowSheet(); });
    });
    $("#wfAdd").addEventListener("click", ()=>{
      wfDraft.steps.push({ host:(fleet[0]&&fleet[0].id)||"", cmd:"" });
      renderWorkflowSheet();
    });
    // Drop a saved Task in as a step — this is "a Workflow is built from Tasks".
    // A blank trailing step (the default first row) is replaced rather than kept,
    // so adding the first Task doesn't leave an empty step above it.
    wfBody.querySelectorAll("[data-addtask]").forEach(b=>{
      b.addEventListener("click", ()=>{
        const t = taskSaved.find(x=>x.id===b.dataset.addtask);
        if(!t) return;
        const last = wfDraft.steps[wfDraft.steps.length-1];
        if(wfDraft.steps.length===1 && last && !(last.cmd||"").trim()) wfDraft.steps = [];
        wfDraft.steps.push({ host:t.host, cmd:t.cmd });
        renderWorkflowSheet();
      });
    });
    const editCancel = $("#wfEditCancel");
    if(editCancel) editCancel.addEventListener("click", ()=>{ wfDraft = { name:"", steps:[] }; renderWorkflowSheet(); });
    $("#wfCancel").addEventListener("click", closeWorkflowSheet);
    $("#wfSave").addEventListener("click", saveWorkflow);
  }

  // editWorkflow loads a saved blueprint back into the builder so its name and
  // steps can be changed and re-saved in place (same id), instead of the old
  // delete-and-rebuild dance. A deep copy keeps edits from mutating wfSaved
  // until the update lands.
  function editWorkflow(id){
    const w = wfSaved.find(x=>x.id===id);
    if(!w) return;
    wfDraft = { editId:id, name:w.name||"", steps:(w.steps||[]).map(s=>({ host:s.host, cmd:s.cmd })) };
    if(!wfDraft.steps.length) wfDraft.steps = [{ host:"", cmd:"" }];
    renderWorkflowSheet();
    const nm = $("#wfName"); if(nm){ nm.focus(); }
    wfBody.scrollTop = wfBody.scrollHeight;
  }

  async function saveWorkflow(){
    const editId = wfDraft.editId;
    const name = (wfDraft.name||"").trim();
    const steps = wfDraft.steps.map(s=>({ host:s.host, cmd:(s.cmd||"").trim() })).filter(s=>s.host && s.cmd);
    if(!name){ $("#wfName").focus(); toast("give the workflow a name"); return; }
    if(!steps.length){ toast("add at least one step with a command"); return; }
    if(MODE === "demo"){
      if(editId){
        const w = wfDemo.find(x=>x.id===editId); if(w){ w.name = name; w.steps = steps; }
      } else {
        wfDemo.push({ id:"wf-"+Math.random().toString(36).slice(2,8), name, steps, createdAt:"" });
      }
      wfSaved = wfDemo.slice(); wfDraft = { name:"", steps:[] }; renderWorkflowSheet(); render();
      toast(editId ? "updated (demo)" : "saved (demo)"); return;
    }
    const savingLabel = editId ? "Updating…" : "Saving…";
    const restoreLabel = editId ? "Update workflow" : "Save workflow";
    const btn = $("#wfSave"); btn.disabled = true; btn.textContent = savingLabel;
    try {
      const url = editId ? "api/workflows/"+encodeURIComponent(editId) : "api/workflows";
      const method = editId ? "PUT" : "POST";
      const r = await fetch(url, { method, headers:{"Content-Type":"application/json"}, body: JSON.stringify({ name, steps }) });
      if(!r.ok){ const t = await r.text().catch(()=> ""); throw new Error((t||"").trim() || ("error "+r.status)); }
      wfSaved = await loadWorkflows();
      wfDraft = { name:"", steps:[] };
      renderWorkflowSheet(); render();
      toast(editId ? "workflow updated" : "workflow saved");
    } catch(err){
      btn.disabled = false; btn.textContent = restoreLabel;
      toast((err&&err.message) ? err.message : "couldn't save");
    }
  }

  async function deleteWorkflow(id){
    const w = wfSaved.find(x=>x.id===id);
    if(!confirm(`Delete workflow "${(w&&w.name)||id}"? This can't be undone.`)) return;
    if(MODE === "demo"){
      const i = wfDemo.findIndex(w=>w.id===id); if(i>=0) wfDemo.splice(i,1);
      wfSaved = wfDemo.slice(); renderWorkflowSheet(); render(); return;
    }
    try {
      const r = await fetch("api/workflows/"+encodeURIComponent(id), { method:"DELETE" });
      if(!r.ok && r.status!==204) throw new Error("error "+r.status);
    } catch(e){ toast("couldn't delete"); }
    wfSaved = await loadWorkflows();
    renderWorkflowSheet(); render();
  }

  /* ---------- Saved Tasks: the reusable atom ----------
     A saved Task is a named {host, cmd} you've decided to keep and re-run — the
     ephemeral one-shot graduated into a building block. The Fleet page's Tasks
     rollup lists them (Run / Edit / Delete); "Save as Task" in a run view mints
     one; the Workflow builder drops them in as steps. In demo mode they live in
     memory so the feature is legible without a live hush-control behind it. */
  const tsaveScrim = $("#tsaveScrim");
  const tsaveBody = $("#tsaveBody");
  let tsaveDraft = { name:"", host:"", cmd:"" };

  async function loadTasks(){
    if(MODE === "demo"){
      if(!taskDemo.length){
        const host = (M[0] && M[0].id) || "citadel";
        taskDemo.push({ id:"disk-check-demo", name:"Disk check", host, cmd:"df -h | sort -k5 -rh | head", createdAt:"" });
        taskDemo.push({ id:"docker-prune-demo", name:"Docker prune", host, cmd:"docker system prune -af", createdAt:"" });
      }
      return taskDemo.slice();
    }
    try {
      const r = await fetch("api/tasks", {cache:"no-store"});
      if(!r.ok) throw new Error("bad status");
      const list = await r.json();
      return Array.isArray(list) ? list : [];
    } catch(e){ return []; }
  }

  // Keeps taskSaved fresh so the Fleet rollup and the Workflow builder's
  // task-library both have data even before either sheet is opened.
  async function pollTasks(){
    taskSaved = await loadTasks();
    render();
  }

  function closeTaskSaveSheet(){ tsaveScrim.classList.remove("open"); }
  tsaveScrim.addEventListener("click", e=>{ if(e.target===tsaveScrim) closeTaskSaveSheet(); });

  // openTaskSaveSheet opens the create/edit form. Pass a draft to prefill it —
  // "Save as Task" hands it {host, cmd} straight off a run so the bridge from
  // ephemeral to saved is one tap.
  function openTaskSaveSheet(draft){
    tsaveDraft = Object.assign({ editId:null, name:"", host:"", cmd:"" }, draft||{});
    tsaveScrim.classList.add("open");
    renderTaskSaveSheet();
  }
  function openTaskSaveSheetForEdit(id){
    const t = taskSaved.find(x=>x.id===id);
    if(!t) return;
    openTaskSaveSheet({ editId:id, name:t.name||"", host:t.host||"", cmd:t.cmd||"" });
  }

  function renderTaskSaveSheet(){
    const fleet = M.slice();
    if(!fleet.some(m=>m.id===tsaveDraft.host)) tsaveDraft.host = (fleet[0]&&fleet[0].id) || tsaveDraft.host || "";
    const opts = fleet.map(m=>`<option value="${esc(m.id)}"${m.id===tsaveDraft.host?" selected":""}>${esc(m.id)}${m.online?"":" · offline"}</option>`).join("");
    const editing = !!tsaveDraft.editId;
    tsaveBody.innerHTML = `

  async function saveTask(){
    const editId = tsaveDraft.editId;
    const name = (tsaveDraft.name||"").trim();
    const host = tsaveDraft.host;
    const cmd = (tsaveDraft.cmd||"").trim();
    if(!name){ $("#tsName").focus(); toast("give the task a name"); return; }
    if(!host){ toast("pick a machine"); return; }
    if(!cmd){ $("#tsCmd").focus(); toast("add a command"); return; }
    if(MODE === "demo"){
      if(editId){ const t = taskDemo.find(x=>x.id===editId); if(t){ t.name=name; t.host=host; t.cmd=cmd; } }
      else { taskDemo.push({ id:"task-"+Math.random().toString(36).slice(2,8), name, host, cmd, createdAt:"" }); }
      taskSaved = taskDemo.slice(); closeTaskSaveSheet(); render();
      toast(editId ? "updated (demo)" : "saved (demo)"); return;
    }
    const btn = $("#tsSave"); btn.disabled = true; btn.textContent = editId ? "Updating…" : "Saving…";
    try {
      const url = editId ? "api/tasks/"+encodeURIComponent(editId) : "api/tasks";
      const method = editId ? "PUT" : "POST";
      const r = await fetch(url, { method, headers:{"Content-Type":"application/json"}, body: JSON.stringify({ name, host, cmd }) });
      if(!r.ok){ const t = await r.text().catch(()=> ""); throw new Error((t||"").trim() || ("error "+r.status)); }
      taskSaved = await loadTasks();
      closeTaskSaveSheet(); render();
      toast(editId ? "task updated" : "task saved");
    } catch(err){
      btn.disabled = false; btn.textContent = editId ? "Update task" : "Save task";
      toast((err&&err.message) ? err.message : "couldn't save");
    }
  }

  async function deleteTask(id){
    const t = taskSaved.find(x=>x.id===id);
    if(!confirm(`Delete task "${(t&&t.name)||id}"? This can't be undone.`)) return;
    if(MODE === "demo"){
      const i = taskDemo.findIndex(x=>x.id===id); if(i>=0) taskDemo.splice(i,1);
      taskSaved = taskDemo.slice(); render(); return;
    }
    try {
      const r = await fetch("api/tasks/"+encodeURIComponent(id), { method:"DELETE" });
      if(!r.ok && r.status!==204) throw new Error("error "+r.status);
    } catch(e){ toast("couldn't delete"); }
    taskSaved = await loadTasks(); render();

  // runSavedTask streams a saved Task through /api/tasks/{id}/run — the audited
  // path that resolves the command server-side — reusing the same run overlay an
  // ad-hoc Task uses. In demo mode openRunView falls back to a simulated run.
  function runSavedTask(id){

  // openWorkflowRunView streams a blueprint's run to the terminal overlay, using
  // step headers to punctuate the shared log. Cancel aborts the fetch, which
  // drops the connection and (through hush-control) cancels the in-flight step.
  function openWorkflowRunView(wf){
    const total = (wf.steps||[]).length;
    const ov = document.createElement("div");
    ov.className = "vov";
    ov.innerHTML = `<div class="vsheet">
        <div class="vbar">
          <span class="state running" id="wvState"><span class="sd"></span>running</span>
          <div class="vname" title="${esc(wf.name)}">⛓ ${esc(wf.name)}</div>
          <div class="vmeta" id="wvMeta">${total} step${total===1?"":"s"}</div>
          <button class="vbtn" id="wvStop">■ Cancel</button>
          <button class="vbtn vclose" aria-label="Close">✕</button>
        </div>
        <div class="vbody runbody"><pre class="runterm" id="wvOut"></pre></div>
      </div>`;
    document.body.appendChild(ov);
    const out = ov.querySelector("#wvOut");
    const stateEl = ov.querySelector("#wvState");
    const metaEl = ov.querySelector("#wvMeta");
    const stopBtn = ov.querySelector("#wvStop");
    const ac = new AbortController();
    let finished = false;
    const heads = [];   // step index -> summary element (for markHead)
    const groups = [];  // step index -> { details, outDiv }
    let curOut = out;   // where append() writes — the current step's output container

    const append = (text, cls) => {
      if(text == null || text === "") return;
      const span = document.createElement("span");
      if(cls) span.className = cls;
      span.textContent = text;
      curOut.appendChild(span);
      out.scrollTop = out.scrollHeight;
    };
    const setState = (cls, label, meta) => {
      stateEl.className = "state " + cls;
      stateEl.innerHTML = `<span class="sd"></span>${esc(label)}`;
      if(meta != null) metaEl.textContent = meta;
    };
    const markHead = (i, cls) => { if(heads[i]) heads[i].className = "wf-head " + cls; };
    const close = () => { ac.abort(); ov.remove(); document.removeEventListener("keydown", onkey); };
    const onkey = e => { if(e.key === "Escape") close(); };
    document.addEventListener("keydown", onkey);
    ov.querySelector(".vclose").addEventListener("click", close);
    ov.addEventListener("click", e => { if(e.target === ov) close(); });
    stopBtn.addEventListener("click", () => {
      if(finished){ close(); return; }
      ac.abort(); finished = true;
      stopBtn.textContent = "✕ Close";
      setState("stopped", "canceled");
    });

    const onEvent = ev => {
      if(ev.kind === "step"){
        const i = ev.index || 0;
        // reaching a new step means the previous one exited clean — roll it up
        // so a long run stays scannable; its command stays visible in the summary
        if(i > 0){ markHead(i-1, "ok"); if(groups[i-1]) groups[i-1].details.open = false; }
        const details = document.createElement("details");
        details.className = "wf-runstep";
        details.open = true;
        const h = document.createElement("summary");
        h.className = "wf-head on";
        h.textContent = `▶ step ${i+1}/${ev.count||total} · ${ev.host} · ${ev.cmd}`;
        const outDiv = document.createElement("div");
        outDiv.className = "wf-out";
        details.appendChild(h); details.appendChild(outDiv);
        out.appendChild(details);
        heads[i] = h; groups[i] = { details, outDiv }; curOut = outDiv;
        out.scrollTop = out.scrollHeight;
        setState("running", "running", `step ${i+1}/${ev.count||total}`);
      } else if(ev.kind === "out"){
        append(ev.data, ev.stream === "stderr" ? "err" : null);
      } else if(ev.kind === "stepExit"){
        const code = ev.code == null ? 0 : ev.code;
        const ok = code === 0 && !ev.signal;
        markHead(ev.index||0, ok ? "ok" : "bad");
        if(!ok) append(`\n[step ${(ev.index||0)+1} ${ev.signal || ("exit "+code)}]\n`, "err");
      } else if(ev.kind === "error"){
        append("\n"+(ev.data||"error")+"\n", "err");
        markHead(ev.index||0, "bad");
      } else if(ev.kind === "done"){
        finished = true;
        stopBtn.textContent = "✕ Close";
        if(ev.ok){
          heads.forEach((_,i)=>markHead(i,"ok"));
          groups.forEach(g=>{ g.details.open = false; }); // done — whole run rolls up, arrows reveal any step's command + output
          setState("ok", "done", `${ev.ran||total} step${(ev.ran||total)===1?"":"s"} · ok`);
        }
        else { const fs = (ev.failedStep==null?heads.length-1:ev.failedStep); setState("failed", "failed", `stopped at step ${fs+1}`); }
      }
    };

    const runner = MODE === "demo" ? simulateWorkflow(wf, onEvent, ac.signal)
      : streamExec(`api/workflows/${encodeURIComponent(wf.id)}/run`, {}, onEvent, ac.signal);
    runner.catch(err => {
      if(ac.signal.aborted) return;
      finished = true;
      stopBtn.textContent = "✕ Close";
      const msg = (err && err.message) ? err.message : "connection failed";
      append("\n" + msg + "\n", "err");
      setState("failed", err && err.status ? ("error " + err.status) : "error");
    });
  }

  // simulateWorkflow fakes a run for demo/offline mode, walking the steps with a
  // little delay so the sequencing reads the same as a live run.
  function simulateWorkflow(wf, onEvent, signal){
    return new Promise((resolve, reject) => {
      if(signal.aborted) return reject(new Error("aborted"));
      const steps = wf.steps || [];
      const t = [];
      const at = (ms, fn) => t.push(setTimeout(fn, ms));
      const bail = () => { t.forEach(clearTimeout); reject(new Error("aborted")); };
      signal.addEventListener("abort", bail, { once:true });
      let clock = 0;
      steps.forEach((st,i)=>{
        at(clock += 250, ()=> onEvent({ kind:"step", index:i, count:steps.length, host:st.host, cmd:st.cmd }));
        at(clock += 300, ()=> onEvent({ kind:"out", stream:"stdout", index:i, data:`$ ${st.cmd}\n(demo — no agent connected)\n` }));
        at(clock += 250, ()=> onEvent({ kind:"stepExit", index:i, code:0, ms:550 }));
      });
      at(clock += 250, ()=> { signal.removeEventListener("abort", bail); onEvent({ kind:"done", ok:true, ran:steps.length }); resolve(); });
    });
  }

  /* ---------- data: live + demo ---------- */
  function normalize(m){
    m.services = m.services || [];
    m.jobs = m.jobs || [];
    m.tasks = m.tasks || [];
    if(m.online===undefined) m.online = true;
    return m;
  }

  function ingestLive(data){
    M = data.map(m=>{
      normalize(m);
      // /api/fleet ships jobs empty (they're fetched per-machine on demand); keep
      // showing what we've already loaded for this box so the count and the
      // Machine-view list don't blink out on every poll.
      if(JOBS[m.id]) m.jobs = JOBS[m.id];
      const h = cpuHist[m.id] || Array(HIST).fill(m.cpu);
      h.push(m.cpu); while(h.length>HIST) h.shift();
      cpuHist[m.id] = h;
      m.loadHist = h.slice();
      return m;
    });
    // a machine added through "Add machine" graduates out of PENDING once its
    // first real /api/fleet entry shows up, with one pop-in animation.
    PENDING = PENDING.filter(p => {
      const arrived = M.some(m => m.id === p.id || (p.ip && m.ip === p.ip));
      if(arrived) JUST_ARRIVED.add(p.id);
      return !arrived;
    });
  }

  function setChip(){
    const chip = $("#statusChip");

    if(MODE==="live"){
      const online = M.filter(m=>m.online).length;
      txt = online===M.length ? "transport ok" : `${online}/${M.length} reachable`;
    } else if(MODE==="demo"){ txt = "demo data"; }
    else if(MODE==="lost"){ txt = "lost connection"; }

    const pairing = PENDING.length ? ` · ${PENDING.length} pairing` : "";
    $("#dockHint").textContent = MODE==="lost"
      ? `showing last known state · ${M.length} machine${M.length===1?"":"s"}`
      : `${M.length} machine${M.length===1?"":"s"}${pairing}`;

  function setLostBanner(on){
    const bar = $("#lostBar");
    bar.hidden = !on;
    document.body.classList.toggle("conn-lost", on);
    document.title = on ? "⛔ DISCONNECTED — hush" : DOC_TITLE;

      const ago = secs < 60 ? `${secs}s` : `${Math.round(secs/60)}m`;
      $("#lostBarText").textContent = `lost connection to hush-control · reconnecting… · down for ${ago}`;
    }

  async function poll(){
    try {
      const r = await fetch("api/fleet", {cache:"no-store"});
      if(!r.ok) throw new Error("bad status");
      const data = await r.json();
      if(!Array.isArray(data)) throw new Error("bad payload");
      ingestLive(data);
      MODE = "live";
      everLive = true;
      lostSince = 0;
      setLostBanner(false);
    } catch(e){
      if(everLive){
        // we had a real connection and lost it (e.g. hush-control rebooting) —
        // freeze the last known fleet rather than silently swapping in fake
        // demo machines, and make the loss unmissable.
        if(MODE!=="lost"){ lostSince = Date.now(); }
        MODE = "lost";
        setLostBanner(true);
      } else {
        // never connected at all (local preview, file://, no backend running) —
        // this is the legitimate demo-data fallback.
        if(MODE!=="demo"){ M = demoFleet(); }
        MODE = "demo";
        jitterDemo();
      }
    }
    setChip();
    render();
  }

  /* ---------- demo fleet (offline / file:// fallback) ---------- */

  function jitterDemo(){
    M.forEach(m=>{
      const j = v => Math.max(2, Math.min(98, Math.round(v + (Math.random()-0.5)*(m.status==="warn"?7:4))));
      m.cpu = j(m.cpu); m.mem = Math.max(2,Math.min(98, m.mem + (((Math.random()-0.5)*2)|0)));
      if(m.gpu!=null){ m.gpu = j(m.gpu); m.vram = Math.max(2,Math.min(99, m.vram + (((Math.random()-0.5)*2)|0))); }
      m.loadHist = m.loadHist.slice(1).concat([m.cpu]);

  /* ---------- Jobs: the cron construct, scheduled on the agent ----------
     A Job is "a cron / timer — fires on a schedule": a saved command the agent
     runs unattended, on its own box, as the unprivileged hush user — the same
     primitive a Task runs, with a schedule bolted on. The scheduler lives on the
     agent (commit #84), so the console is a thin client over hush-control's
     pass-through proxy: GET/POST /api/machines/{id}/jobs and DELETE .../{jobId}.
     Jobs are fetched per-machine on demand (not through the fleet poll) and
     cached in JOBS so the Machine view stays stable between polls. A box whose
     agent was started without -jobs answers 403 — surfaced as "jobs disabled",
     not an error. In demo mode jobs live in the fixture so the verb is legible
     without a live control plane behind it. */
  const jobScrim = $("#jobScrim");
  const jobBody = $("#jobSheetBody");
  let jobDraft = { id:null, name:"", schedule:"", cmd:"" };

  // loadJobs pulls one box's jobs into the JOBS cache and re-renders if we're
  // still looking at it. A 403 means the agent has jobs disabled; anything else
  // unreachable just leaves the cache untouched so a blip doesn't wipe the list.
  async function loadJobs(id){
    if(MODE === "demo" || jobsLoading.has(id)) return;
    jobsLoading.add(id);
    try {
      const r = await fetch(`api/machines/${encodeURIComponent(id)}/jobs`, {cache:"no-store"});
      if(r.status === 403){ JOBS_OFF.add(id); JOBS[id] = []; }
      else if(r.ok){
        JOBS_OFF.delete(id);
        const list = await r.json();
        JOBS[id] = Array.isArray(list) ? list : [];
      } else return;
      const m = byId(id); if(m) m.jobs = JOBS[id];
      if(state.view === "machine" && state.mid === id) render();
    } catch(e){ /* transient — keep whatever we had */ }
    finally { jobsLoading.delete(id); }
  }

  function closeJobSheet(){ jobScrim.classList.remove("open"); }
  jobScrim.addEventListener("click", e=>{ if(e.target===jobScrim) closeJobSheet(); });

  function openJobSheet(preId){
    const online = M.filter(m=>m.online);
    jobDraft = { id: preId || (online[0] && online[0].id) || null, name:"", schedule:"", cmd:"" };
    if(preId && JOBS_OFF.has(preId)){ toast("jobs are disabled on that box — start its agent with -jobs"); return; }
    renderJobSheet();
    jobScrim.classList.add("open");
  }

  function renderJobSheet(){
    const online = M.filter(m=>m.online);
    if(!online.length){
      jobBody.innerHTML = `<h3>Schedule a job</h3>
        <p class="sd">a command that fires on a cron schedule</p>
        <div class="field-note">No machines are online to schedule on.</div>
        <div class="sheet-actions"><button class="btn primary" id="jClose" style="flex:1">Close</button></div>`;
      $("#jClose").addEventListener("click", closeJobSheet);
      return;
    }
    if(!online.some(m=>m.id===jobDraft.id)) jobDraft.id = online[0].id;
    const opts = online.map(m=>`<option value="${esc(m.id)}"${m.id===jobDraft.id?" selected":""}>${esc(m.id)}${m.os?` · ${esc(m.os)}`:""}</option>`).join("");
    jobBody.innerHTML = `
      <h3>Schedule a job</h3>
      <p class="sd">a command that fires on a cron schedule — unattended, on the box</p>
      <div class="field">
        <label>Machine</label>
        <select id="jMachine">${opts}</select>
      </div>
      <div class="field">
        <label>Name</label>
        <input type="text" id="jName" placeholder="e.g. nightly-backup" autocapitalize="off" autocorrect="off" spellcheck="false" value="${esc(jobDraft.name)}">
      </div>
      <div class="field">
        <label>Schedule</label>
        <input type="text" id="jSched" placeholder="e.g. 0 3 * * *  (or @daily)" autocapitalize="off" autocorrect="off" spellcheck="false" value="${esc(jobDraft.schedule)}">
        <div class="hint">5-field cron, or a macro like <b>@daily</b> / <b>@hourly</b></div>
      </div>
      <div class="field">
        <label>Command</label>
        <input type="text" id="jCmd" placeholder="e.g. restic backup /srv" autocapitalize="off" autocorrect="off" spellcheck="false" value="${esc(jobDraft.cmd)}">
        <div class="hint">runs via <b>sh -c</b> as the unprivileged hush user</div>
      </div>
      <div class="field-note">
        <b>Heads up —</b> this fires on <b>${esc(jobDraft.id)}</b> with no sandbox, on its own schedule. It can do anything the hush user can — the OS permissions are the only fence.
      </div>
      <div class="sheet-actions">
        <button class="btn ghost" id="jCancel">Cancel</button>
        <button class="btn primary" id="jSave">◷ Schedule</button>
      </div>`;
    $("#jMachine").addEventListener("change", e=>{ jobDraft.id = e.target.value; renderJobHostNote(); });
    $("#jName").addEventListener("input", e=>{ jobDraft.name = e.target.value; });
    $("#jSched").addEventListener("input", e=>{ jobDraft.schedule = e.target.value; });
    $("#jCmd").addEventListener("input", e=>{ jobDraft.cmd = e.target.value; });
    $("#jCancel").addEventListener("click", closeJobSheet);
    $("#jSave").addEventListener("click", createJob);
    $("#jName").focus();
  }
  function renderJobHostNote(){
    const n = jobBody.querySelector(".field-note");
    if(n) n.innerHTML = `<b>Heads up —</b> this fires on <b>${esc(jobDraft.id)}</b> with no sandbox, on its own schedule. It can do anything the hush user can — the OS permissions are the only fence.`;
  }

  async function createJob(){
    const id = jobDraft.id;
    const name = (jobDraft.name||"").trim();
    const schedule = (jobDraft.schedule||"").trim();
    const cmd = (jobDraft.cmd||"").trim();
    if(!id) return;
    if(!name){ $("#jName").focus(); toast("give the job a name"); return; }
    if(!schedule){ $("#jSched").focus(); toast("add a schedule"); return; }
    if(!cmd){ $("#jCmd").focus(); toast("add a command"); return; }
    if(MODE === "demo"){
      const m = byId(id); if(m){ (m.jobs = m.jobs || []).push({ id:"job-"+Math.random().toString(36).slice(2,8), name, schedule, cmd, status:{} }); }
      closeJobSheet(); render(); toast("scheduled (demo)"); return;
    }
    const btn = $("#jSave"); btn.disabled = true; btn.textContent = "Scheduling…";
    try {
      const r = await fetch(`api/machines/${encodeURIComponent(id)}/jobs`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ name, schedule, cmd }) });
      if(r.status === 403){ JOBS_OFF.add(id); throw new Error("jobs are disabled on that box — start its agent with -jobs"); }
      if(!r.ok){ const t = await r.text().catch(()=> ""); throw new Error((t||"").trim() || ("error "+r.status)); }
      await loadJobs(id);
      closeJobSheet(); render();
      toast("job scheduled");
    } catch(err){
      btn.disabled = false; btn.textContent = "◷ Schedule";
      toast((err&&err.message) ? err.message : "couldn't schedule");
    }
  }

  async function deleteJob(mid, jobId, name){
    if(!confirm(`Delete job "${name||jobId}"? It stops firing immediately.`)) return;
    if(MODE === "demo"){
      const m = byId(mid); if(m && m.jobs){ const i = m.jobs.findIndex(j=>(j.id||j.name)===jobId); if(i>=0) m.jobs.splice(i,1); }
      render(); return;
    }
    try {
      const r = await fetch(`api/machines/${encodeURIComponent(mid)}/jobs/${encodeURIComponent(jobId)}`, { method:"DELETE" });
      if(!r.ok && r.status!==204) throw new Error("error "+r.status);
    } catch(e){ toast("couldn't delete"); }
    await loadJobs(mid); render();
  }

  /* ---------- build sheet ---------- */
  const scrim = $("#scrim");
  $("#palette").innerHTML = CONSTRUCTS.map(c=>{
    // Machine is the one construct that already ships (via the add-machine flow),
    // so it carries the "agents waiting to be added" dot the rest don't have.
    const badge = c[0]==="Machine" ? `<span class="badge-count" id="machineBadge" style="display:none"></span>` : "";
    return `
    <div class="pitem" data-c="${c[0]}">
      <span class="pg">${c[1]}</span>
      <div><div class="pn">${c[0]}${badge}</div><div class="pdz">${c[2]}</div></div>
    </div>`;
  }).join("");
  $("#buildBtn").addEventListener("click", ()=>scrim.classList.add("open"));
  scrim.addEventListener("click", e=>{ if(e.target===scrim) scrim.classList.remove("open"); });
  $("#palette").querySelectorAll(".pitem").forEach(el=>{
    el.addEventListener("click", ()=>{
      scrim.classList.remove("open");
      // Machine, Job, Task, and Workflow are the constructs that actually do
      // something today; the rest are still placeholders.
      if(el.dataset.c === "Machine"){ openAddSheet(); return; }
      if(el.dataset.c === "Job"){ openJobSheet(null); return; }
      if(el.dataset.c === "Task"){ openTaskSheet(null); return; }
      if(el.dataset.c === "Workflow"){ openWorkflowSheet(); return; }
      toast(`＋ ${el.dataset.c} builder — coming in a later phase`);
    });
  });

  /* ---------- add machine sheet ---------- */
  const addScrim = $("#addScrim");
  const addBody = $("#addSheetBody");
  let addStep = 0;                 // 0 form, 1 verified, 2 done
  let addDraft = { name:"", addr:"", role:"" };
  let addTestResult = null;
  let addBusy = false;
  let addError = "";
  // tailnet discovery state for the "Scan tailnet" affordance.
  let discoverState = { ran:false, loading:false, available:true, error:"", candidates:[] };
  // lastDiscover holds the most recent background poll result, so the badge and
  // the freshly-opened sheet can show discovered agents without waiting on a scan.
  let lastDiscover = null;

  function openAddSheet(){
    addStep = 0; addDraft = { name:"", addr:"", role:"" };
    addTestResult = null; addBusy = false; addError = "";
    // Seed from the last background poll so cached candidates show immediately;
    // "Rescan" then refreshes them live.
    if(lastDiscover){
      discoverState = { ran:true, loading:false, available:lastDiscover.available, error:"", candidates:lastDiscover.candidates.slice() };
    } else {
      discoverState = { ran:false, loading:false, available:true, error:"", candidates:[] };
    }
    addScrim.classList.add("open");
    renderAddSheet();
  }
  function closeAddSheet(){ addScrim.classList.remove("open"); }

  function renderAddSheet(){
    if(addStep === 0){
      addBody.innerHTML = `
        <h3>Add a machine</h3>
        <p class="sd">point hush-control at a new hush-agent on your tailnet</p>
        ${renderScanBlock()}
        <div class="field">
          <label>Name <span class="opt">— optional, falls back to the agent's hostname</span></label>
          <input type="text" id="fName" placeholder="e.g. beacon" value="${esc(addDraft.name)}">
        </div>
        <div class="field">
          <label>Tailnet address</label>
          <input type="text" id="fAddr" placeholder="100.71.x.x:8765" value="${esc(addDraft.addr)}">
          <div class="hint">the agent's tailnet IP or MagicDNS name, port 8765</div>
        </div>
        <div class="field">
          <label>Role <span class="opt">— optional</span></label>
          <input type="text" id="fRole" placeholder="e.g. store, gateway" value="${esc(addDraft.role)}">
        </div>
        <div class="field-note">
          <b>Note —</b> hush-agent has no auth yet, so this just confirms the address answers and saves it. Anything already on your tailnet can reach it.
        </div>
        ${addError ? `<div class="field-note err">${esc(addError)}</div>` : ""}
        <div class="sheet-actions">
          <button class="btn ghost" id="addCancel">Cancel</button>
          <button class="btn primary" id="addTest" ${addBusy?"disabled":""}>${addBusy?"Testing…":"Test connection →"}</button>
        </div>`;
      $("#addCancel").addEventListener("click", closeAddSheet);
      $("#addTest").addEventListener("click", submitTest);
      $("#fName").addEventListener("input", e=>{ addDraft.name = e.target.value; });
      $("#fAddr").addEventListener("input", e=>{ addDraft.addr = e.target.value; });
      $("#fRole").addEventListener("input", e=>{ addDraft.role = e.target.value; });
      attachScanHandlers();
    } else if(addStep === 1){
      const r = addTestResult;
      addBody.innerHTML = `
        <h3>Add a machine</h3>
        <p class="sd">${esc(addDraft.addr)}</p>
        <div class="verify-box">
          <div class="verify-row"><span class="vdot ok"></span>reached the agent</div>
          <div class="verify-row"><span class="vdot ok"></span>/vitals responded in ${r.latencyMs}ms</div>
          <div class="preview">
            <span class="gly">▦</span>
            <div><div class="pn">${esc(addDraft.name || r.host || "—")}</div><div class="pm">${esc(r.os||"—")}</div></div>
          </div>
        </div>
        <div class="sheet-actions">
          <button class="btn ghost" id="addBack">← Back</button>
          <button class="btn primary" id="addSave" ${addBusy?"disabled":""}>${addBusy?"Adding…":"Add to fleet"}</button>
        </div>`;
      $("#addBack").addEventListener("click", ()=>{ addStep=0; renderAddSheet(); });
      $("#addSave").addEventListener("click", submitAdd);
    } else {
      const total = M.length + PENDING.length;
      addBody.innerHTML = `
        <h3>${esc(addDraft.name || (addTestResult&&addTestResult.host) || "Machine")} added ✓</h3>
        <p class="sd">now watching ${total} machine${total===1?"":"s"}</p>
        <div class="field-note"><b>Note —</b> vitals arrive on the next poll (~2.5s). No restart of hush-control needed.</div>
        <div class="sheet-actions">
          <button class="btn primary" id="addDone" style="flex:1">Done</button>
        </div>`;
      $("#addDone").addEventListener("click", closeAddSheet);
    }
  }

  async function submitTest(){
    const addr = ($("#fAddr").value || "").trim();
    addDraft.addr = addr;
    if(!addr){ addError = "enter an address"; renderAddSheet(); return; }
    addBusy = true; addError = ""; renderAddSheet();
    try {
      const r = await fetch("api/agents/test", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ addr })
      });
      const data = await r.json();
      addBusy = false;
      if(!data.ok){ addError = data.error || "couldn't reach that address"; renderAddSheet(); return; }
      addTestResult = data;
      addStep = 1;
      renderAddSheet();
    } catch(e){
      addBusy = false; addError = "couldn't reach hush-control itself — is it running?";
      renderAddSheet();
    }
  }

  async function submitAdd(){
    addBusy = true; renderAddSheet();
    try {
      const r = await fetch("api/agents", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ name: addDraft.name, addr: addDraft.addr, role: addDraft.role })
      });
      if(!r.ok){
        addBusy = false; addError = await r.text() || "couldn't add that machine";
        addStep = 0; renderAddSheet(); return;
      }
      const added = await r.json();
      PENDING.push({ id: added.name || (addTestResult&&addTestResult.host) || added.addr, ip: added.ip });
      addBusy = false;
      addStep = 2;
      state.view = "fleet"; // so the pending card is visible behind the sheet
      renderAddSheet();
      render();
      poll(); // fetch fresh vitals now instead of waiting for the next interval tick
      // Drop the just-added machine from the discovery badge without waiting for
      // the next background scan.
      if(lastDiscover){
        lastDiscover.candidates = lastDiscover.candidates.filter(c => c.addr !== addDraft.addr);
        updateAddBadge();
      }
    } catch(e){
      addBusy = false; addError = "couldn't reach hush-control itself — is it running?";
      addStep = 0; renderAddSheet();
    }
  }

  // renderScanBlock draws the "Scan tailnet" control and, once a scan has run,
  // the list of discovered agents not yet in the fleet. Tapping one pre-fills
  // the form and runs the same test → add flow as a hand-typed address.
  function renderScanBlock(){
    const s = discoverState;
    if(s.loading){
      return `<div class="scan-block"><button class="btn ghost" disabled>Scanning tailnet…</button></div>`;
    }
    if(!s.ran){
      return `<div class="scan-block"><button class="btn ghost" id="scanBtn">⟲ Scan tailnet for agents</button></div>`;
    }
    if(!s.available){
      return `<div class="scan-block">
        <button class="btn ghost" id="scanBtn">⟲ Scan tailnet for agents</button>
        <div class="field-note">Tailnet scan needs hush-control running in tsnet mode. Enter the address by hand below.</div></div>`;
    }
    if(s.error){
      return `<div class="scan-block">
        <button class="btn ghost" id="scanBtn">⟲ Rescan tailnet</button>
        <div class="field-note err">${esc(s.error)}</div></div>`;
    }
    if(!s.candidates.length){
      return `<div class="scan-block">
        <button class="btn ghost" id="scanBtn">⟲ Rescan tailnet</button>
        <div class="field-note">No new hush-agents found — everything live on your tailnet is already in the fleet.</div></div>`;
    }
    const rows = s.candidates.map((c,i)=>`
      <button class="disc-row" data-i="${i}">
        <span class="gly">▦</span>
        <div class="disc-meta"><div class="pn">${esc(c.name||c.ip)}</div><div class="pm">${esc(c.ip)}${c.os?" · "+esc(c.os):""}</div></div>
        <span class="disc-add">Add →</span>
      </button>`).join("");
    return `<div class="scan-block">
      <div class="disc-list">${rows}</div>
      <button class="btn ghost" id="scanBtn">⟲ Rescan tailnet</button></div>`;
  }

  function attachScanHandlers(){
    const b = $("#scanBtn");
    if(b) b.addEventListener("click", ()=>scanTailnet(true)); // explicit scan → force fresh
    document.querySelectorAll(".disc-row").forEach(el=>{
      el.addEventListener("click", ()=>{
        const c = discoverState.candidates[+el.dataset.i];
        if(!c) return;
        addDraft.name = c.name || "";
        addDraft.addr = c.addr;
        addError = "";
        const inp = $("#fAddr"); if(inp) inp.value = c.addr;
        const nm = $("#fName"); if(nm) nm.value = c.name || "";
        submitTest(); // reuse the verify → add flow, exactly as a typed address
      });
    });
  }

  async function scanTailnet(fresh){
    discoverState.loading = true; discoverState.error = ""; renderAddSheet();
    try {
      const r = await fetch("api/discover" + (fresh ? "?rescan=1" : ""));
      const data = await r.json();
      discoverState = {
        ran:true, loading:false,
        available: !!data.available,
        error: data.error || "",
        candidates: Array.isArray(data.candidates) ? data.candidates : []
      };
      // keep the badge in sync with what the sheet just learned
      lastDiscover = { available: discoverState.available, candidates: discoverState.candidates };
      updateAddBadge();
    } catch(e){
      discoverState = { ran:true, loading:false, available:true, error:"couldn't reach hush-control — is it running?", candidates:[] };
    }
    renderAddSheet();
  }

  // pollDiscover refreshes the passive badge: how many agents are live on the
  // tailnet but not yet in the fleet. It reads the control plane's cached scan,
  // so it's cheap to call on an interval.
  async function pollDiscover(){
    try {
      const r = await fetch("api/discover");
      const data = await r.json();
      lastDiscover = {
        available: !!data.available,
        candidates: Array.isArray(data.candidates) ? data.candidates : []
      };
      updateAddBadge();
    } catch(e){ /* leave the last known badge in place */ }
  }

  function updateAddBadge(){
    const n = (lastDiscover && lastDiscover.available) ? lastDiscover.candidates.length : 0;
    // The dot rides on Build (the dock button) and on the Machine row inside its palette.
    ["#addBadge","#machineBadge"].forEach(sel=>{
      const b = $(sel);
      if(!b) return;
      if(n > 0){ b.textContent = n; b.style.display = ""; }
      else { b.style.display = "none"; }
    });
    const btn = $("#buildBtn");
    if(btn){
      if(n > 0) btn.title = n + " agent" + (n===1?"":"s") + " found on your tailnet, not yet added";
      else btn.removeAttribute("title");
    }
  }

  addScrim.addEventListener("click", e=>{ if(e.target===addScrim) closeAddSheet(); });

  /* ---------- fleet report download ---------- */
  async function downloadReport(){
    const btn = $("#reportBtn");
    btn.disabled = true;
    try {
      const r = await fetch("api/report", {cache:"no-store"});
      if(!r.ok) throw new Error("bad status");
      const blob = await r.blob();
      const cd = r.headers.get("Content-Disposition") || "";
      const m = /filename="?([^"]+)"?/.exec(cd);
      const name = m ? m[1] : "hush-fleet.json";
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click();
      a.remove(); URL.revokeObjectURL(url);
      toast("⬇ fleet report downloaded");
    } catch(e){
      toast("couldn't generate the report — is hush-control running?");
    } finally {
      btn.disabled = false;
    }
  }
  $("#reportBtn").addEventListener("click", downloadReport);

  /* ---------- toast ---------- */
  let toastT;
  function toast(msg){
    const t = $("#toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove("show"), 2600);
  }

  /* ---------- version / update indicator ---------- */
  const updateScrim = $("#updateScrim");
  const updateBody = $("#updateSheetBody");
  let lastVersion = null;

  async function checkVersion(force){
    const chip = $("#verChip");
    try {
      const r = await fetch(force ? "api/version?force=1" : "api/version", {cache:"no-store"});
      if(!r.ok) throw new Error("bad status");
      const v = await r.json();
      if(!v.current) throw new Error("no version");
      lastVersion = v;
      if(v.updateAvailable && v.latest){
        chip.className = "chip ver avail";
        chip.innerHTML = `<span class="up"></span>${v.current} → ${v.latest}`;
        chip.title = `A newer release (${v.latest}) is available. hush-control auto-updates on its timer; click for a command to update now.`;
      } else {
        chip.className = "chip ver";
        chip.innerHTML = v.current;
        chip.title = v.error ? `Update check failed: ${v.error}` : "Running the latest release. Click to check for updates now.";
      }
      chip.hidden = false;
      return v;
    } catch(e){
      lastVersion = null;
      chip.hidden = true; // no server-side version (demo / file://) — say nothing
      return null;
    }
  }

  $("#verChip").addEventListener("click", ()=>{
    if(lastVersion && lastVersion.updateAvailable && lastVersion.latest){
      openUpdateSheet();
    } else {
      openConfirmCheckSheet();
    }
  });

  function openConfirmCheckSheet(){
    updateBody.innerHTML = `
      <h3>Check for updates now?</h3>
      <p class="sd">This asks GitHub for the latest release immediately instead of waiting for the next scheduled check. GitHub limits unauthenticated API requests per hour, so avoid mashing this button.</p>
      <div class="sheet-actions">
        <button class="btn ghost" id="confCancel" style="flex:1">Cancel</button>
        <button class="btn primary" id="confScan" style="flex:1">Check now</button>
      </div>`;
    $("#confCancel").addEventListener("click", closeUpdateSheet);
    $("#confScan").addEventListener("click", async ()=>{
      const btn = $("#confScan");
      btn.disabled = true;
      btn.textContent = "Checking…";
      const v = await checkVersion(true);
      if(v && v.updateAvailable && v.latest){
        openUpdateSheet();
      } else {
        closeUpdateSheet();
        if(v) toast(v.error ? `update check failed: ${v.error}` : `up to date (${v.current})`);
      }
    });
    updateScrim.classList.add("open");
  }

  function openUpdateSheet(){
    const v = lastVersion;
    const cmd = "sudo systemctl start hush-control-update.service";
    updateBody.innerHTML = `
      <h3>Update available: ${esc(v.latest)}</h3>
      <p class="sd">running ${esc(v.current)} — hush-control auto-updates within its next daily window, or run this now over SSH:</p>
      <div class="cmdbox"><code>${esc(cmd)}</code><button class="btn" id="updCopy">Copy</button></div>
      <div class="field-note">Verifies the release's SHA-256 before swapping the binary, then restarts the service. Safe to run any time.</div>
      <div class="sheet-actions">
        <a class="btn ghost" href="https://github.com/clarkbar-sys/hush/releases/tag/${encodeURIComponent(v.latest)}" target="_blank" rel="noopener" style="text-decoration:none;text-align:center">Release notes</a>
        <button class="btn primary" id="updClose" style="flex:1">Done</button>
      </div>`;
    $("#updCopy").addEventListener("click", async ()=>{
      try { await navigator.clipboard.writeText(cmd); toast("copied to clipboard"); }
      catch(e){ toast("couldn't copy — select and copy manually"); }
    });
    $("#updClose").addEventListener("click", closeUpdateSheet);
    updateScrim.classList.add("open");
  }
  function closeUpdateSheet(){ updateScrim.classList.remove("open"); }
  updateScrim.addEventListener("click", e=>{ if(e.target===updateScrim) closeUpdateSheet(); });

  /* ---------- per-machine agent update popup ---------- */
  function openAgentUpdateSheet(m){
    const isMac = (m.os||"").toLowerCase()==="darwin";
    const cmd = isMac
      ? "go install github.com/clarkbar-sys/hush/cmd/hush-agent@latest"
      : "curl -fsSL https://raw.githubusercontent.com/clarkbar-sys/hush/main/install.sh | sudo sh\nsudo systemctl restart hush-agent";
    const note = isMac
      ? "macOS has no systemd unit to install — this rebuilds the binary with the Go toolchain. Restart the running hush-agent process yourself afterward."
      : "Re-runs the one-line installer to fetch the new binary, then restarts the service so it picks it up.";
    updateBody.innerHTML = `
      <h3>Update available on ${esc(m.id)}: ${esc(m.latestVersion)}</h3>
      <p class="sd">running ${esc(m.agentVersion)} — run this on ${esc(m.id)} over SSH:</p>
      <div class="cmdbox"><code>${esc(cmd)}</code><button class="btn" id="agentUpdCopy">Copy</button></div>
      <div class="field-note">${note}</div>
      <div class="sheet-actions">
        <a class="btn ghost" href="https://github.com/clarkbar-sys/hush/releases/tag/${encodeURIComponent(m.latestVersion)}" target="_blank" rel="noopener" style="text-decoration:none;text-align:center">Release notes</a>
        <button class="btn primary" id="agentUpdClose" style="flex:1">Done</button>
      </div>`;
    $("#agentUpdCopy").addEventListener("click", async ()=>{
      try { await navigator.clipboard.writeText(cmd); toast("copied to clipboard"); }
      catch(e){ toast("couldn't copy — select and copy manually"); }
    });
    $("#agentUpdClose").addEventListener("click", closeUpdateSheet);
    updateScrim.classList.add("open");
  }

  /* ---------- go ---------- */
  poll();
  setInterval(poll, 2500);
  checkVersion();
  setInterval(checkVersion, 15*60*1000);
  pollDiscover();
  setInterval(pollDiscover, 20000);
  pollWorkflows();
  setInterval(pollWorkflows, 20000);
  pollTasks();
  setInterval(pollTasks, 20000);

  /* register the service worker so the console is installable and opens
     offline. Only works in a secure context (tsnet HTTPS or localhost);
     silently skipped over plain-HTTP LAN, where the console still runs fine. */
  if ('serviceWorker' in navigator && window.isSecureContext) {
    window.addEventListener('load', () => {
      Promise.reject(new Error('sw disabled in preview')).catch((err) => {
        console.warn('service worker registration failed:', err);
      });
    });
  }
})();
</script>
