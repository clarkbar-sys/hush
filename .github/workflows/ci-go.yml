name: CI (Go)

# Triggers on every push/PR — no path filter. static/build/test are required
# status checks, and a path-filtered trigger would never queue this workflow
# (let alone report a status) for PRs that don't touch Go files, permanently
# blocking their merge. The `detect` job below does the equivalent skip
# instead, cheaply, while still letting the workflow — and its required
# checks — report back for every PR.
# Stage order: static (gofmt + vet) -> build -> test.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Preflight: only run the pipeline if this repo actually has Go sources.
  # Keeps CI green on the empty template (and any repo not yet using Go).
  detect:
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.f.outputs.found }}
    steps:
      - uses: actions/checkout@v7
      - id: f
        run: |
          if [ -n "$(git ls-files '*.go')" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false — skipping Go CI" && echo "found=false" >> "$GITHUB_OUTPUT"
          fi

  static:
    name: Static checks
    needs: detect
    if: needs.detect.outputs.found == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Format check
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:" && echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...

  build:
    name: Build
    needs: [detect, static]
    if: needs.detect.outputs.found == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...

  test:
    name: Test
    needs: [detect, static]
    if: needs.detect.outputs.found == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race ./...
