name: PR Title Lint

# Squash-merges use the PR title as the commit message, and release-please
# only sees Conventional Commits. Enforce the format here so every merge to
# main stays release-please-readable. This check is required (branch
# protection) so a non-conforming title blocks the merge instead of just
# being flagged.

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
