name: Release

# release-please keeps a "Release PR" that bumps the version and updates
# CHANGELOG.md from Conventional Commits. Merge that PR -> it tags the release.
# When a release is cut, the `artifacts` job builds the program(s) and attaches
# them to the GitHub Release. (Lean: no checksums / SBOM / signing.)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  artifacts:
    name: Build & attach release artifacts (${{ matrix.os }}/${{ matrix.arch }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # hush-agent is stdlib-only; hush-control embeds the web/ UI. Both
      # cross-compile clean with CGO disabled. install.sh expects exactly
      # this "<binary>_<os>_<arch>.tar.gz" naming on the release.
      - name: Build release artifacts
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p out
          for bin in hush-agent hush-control; do
            go build -trimpath -ldflags="-s -w" -o "out/$bin" "./cmd/$bin"
            tar -C out -czf "out/${bin}_${{ matrix.os }}_${{ matrix.arch }}.tar.gz" "$bin"
            rm "out/$bin"
          done
      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" out/*.tar.gz --clobber
