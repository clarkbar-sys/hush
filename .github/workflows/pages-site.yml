name: Deploy release site (GitHub Pages)

# Publishes site/ to the root of the gh-pages branch. The site root drops
# visitors straight into the live console: site/index.html is a bare redirect
# to demo/, and web/ (the console running in its built-in demo mode, no backend
# required) is staged into site/demo/ via scripts/build-web-preview.sh. So a
# visitor to the site root lands in the actual app, not a landing page — no
# mockup that could drift. Release and install info live in the README and the
# GitHub Releases page.
#
# The PR-preview workflow (pr-preview.yml) already owns gh-pages/pr-preview/
# pr-<N>/ for per-PR console previews; this job only touches the root and
# root/demo/, so the two coexist. Requires GitHub Pages to be enabled
# (Settings -> Pages -> Deploy from a branch -> gh-pages / root), same as the
# preview workflow.

on:
  push:
    branches: [main]
    # Redeploy when the landing redirect (site/**) changes, but also when the
    # console it stages into site/demo/ changes — web/** is the demo's actual
    # content, and scripts/build-web-preview.sh is how it's staged. Without
    # web/** here, a console change (feat(web): …) would refresh every PR
    # preview but leave the live demo at the site root stale.
    paths: ["site/**", "web/**", "scripts/build-web-preview.sh"]
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pages-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Stage the console demo into site/demo
        # Same self-contained demo bundle the PR-preview workflow uses, staged
        # under site/demo/ so the landing page's redirect to demo/ lands the
        # visitor in the real console (MODE=demo, no hush-control).
        run: ./scripts/build-web-preview.sh site/demo

      - name: Deploy to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: .
          keep_files: true
