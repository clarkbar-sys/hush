<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>hush — tailnet fleet console</title>
<style>
  :root {
    /* cyber — the console's single locked theme. neon on void, cyan × magenta.
       everything downstream reads these vars, so the whole UI re-skins from here. */
    --ground: #060210;
    --panel: #0d0620;
    --panel-2: #140b33;
    --border: #2c1e66;
    --border-soft: #1b1240;
    --text: #e6dcff;
    --muted: #9d86d9;
    --faint: #6a54a0;
    --accent: #19e3ff;
    --accent-soft: #06313f;
    --ring2: #ff2bd6;
    --good: #2bffa6;
    --good-soft: #06331f;
    --warn: #ffd23f;
    --warn-soft: #332905;
    --crit: #ff3d6e;
    --crit-soft: #360712;
    --shadow: 0 0 0 1px rgba(25,227,255,.05), 0 2px 0 rgba(0,0,0,.55);
    --scan: rgba(25,227,255,.03);   /* ambient scanline wash */
    --grid: rgba(120,80,220,.06);   /* blueprint grid        */
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: var(--mono);            /* locked: the whole console runs terminal-mono */
    --r: 0px;                       /* sharp HUD corners      */
    --tick: 9px;                    /* card corner-bracket size */
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.45;
    /* blueprint grid + scanline wash over the void */
    background:
      repeating-linear-gradient(var(--scan) 0 1px, transparent 1px 3px),
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 100% 38px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 38px 100%,
      var(--ground);
  }
  .wrap { max-width: 480px; margin: 0 auto; min-height: 100vh;
    background: transparent; position: relative;
    display: flex; flex-direction: column; }
  @media (min-width: 900px) { .wrap { max-width: 900px; } }
  #app { flex: 1; }

  /* ---- top bar ---- */
  header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: color-mix(in srgb, var(--ground) 82%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-soft);
  }
  .brand { display: flex; align-items: baseline; gap: 8px; }
  .brand b { font-size: 17px; letter-spacing: -.02em; font-weight: 700; }
  .brand .dot-h { width:7px; height:7px; border-radius:50%; background:var(--accent);
    display:inline-block; box-shadow:0 0 0 3px var(--accent-soft); }
  .spacer { flex: 1; }
  .chip {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 9px; border: 1px solid var(--border); border-radius: 999px;
    background: var(--panel); white-space: nowrap;
  }
  .chip .live { width:6px; height:6px; border-radius:50%; background:var(--accent);
    box-shadow:0 0 0 0 var(--accent); animation: pulse 2.4s infinite; }
  .chip.demo { color: var(--warn); border-color: var(--warn-soft); }
  .chip.demo .live { background: var(--warn); animation: none; }
  .chip.down { color: var(--crit); border-color: var(--crit-soft); }
  .chip.down .live { background: var(--crit); animation: none; }

  /* ---- lost-connection banner: has to be impossible to miss on a cached tab ---- */
  .lostbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 9px 12px; font-family: var(--mono); font-size: 12px; font-weight: 700;
    letter-spacing: .04em; text-transform: uppercase; text-align: center;
    color: #1a0006; background: var(--crit);
    animation: lostbar-blink 1.1s steps(1,end) infinite;
  }
  .lostbar[hidden] { display: none; }
  .lostbar-dot { width:7px; height:7px; border-radius:50%; background:#1a0006; flex-shrink:0; }
  @keyframes lostbar-blink { 0%,100% { opacity:1; } 50% { opacity:.55; } }
  body.conn-lost .wrap { filter: grayscale(.8) brightness(.6); pointer-events: none; }
  .chip.ver { text-decoration: none; }
  .chip.ver.avail { color: var(--good); border-color: var(--good-soft); cursor: pointer; }
  .chip.ver .up { width:6px; height:6px; border-radius:50%; background:var(--good);
    box-shadow:0 0 0 0 var(--good); animation: pulse 2.4s infinite; }

  /* ---- breadcrumb / summary strip ---- */
  .strip { padding: 14px 16px 6px; display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; }
  .crumbs { font-family: var(--mono); font-size: 12px; color: var(--faint);
    display:flex; align-items:center; gap:6px; }
  .crumbs a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .crumbs a:hover { text-decoration: underline; }
  .crumbs .sep { color: var(--faint); }
  .eyebrow { font-family: var(--mono); font-size: 10.5px; letter-spacing: .16em;
    text-transform: uppercase; color: var(--faint); }
  .h-title { font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin: 2px 0 0; }

  .summ { display:flex; gap: 8px; }
  .summ .s { display:flex; align-items:center; gap:6px; font-family:var(--mono);
    font-size: 12px; color: var(--muted); }
  .summ .s b { color: var(--text); }
  .swatch { width:8px; height:8px; border-radius:50%; }

  main { padding: 4px 16px 96px; }

  /* ---- fleet grid ---- */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
  @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }

  .node {
    position: relative; text-align: left; cursor: pointer;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--r); padding: 13px 13px 12px;
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: var(--shadow); overflow: hidden;
    transition: transform .12s ease, border-color .12s ease;
    font-family: var(--sans); color: var(--text);
  }
  .node:hover { transform: translateY(-2px); border-color: color-mix(in srgb, var(--sev) 55%, var(--border)); }
  .node:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .node::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--sev); }
  .node.s-good { --sev: var(--good); --sev-soft: var(--good-soft); }
  .node.s-warn { --sev: var(--warn); --sev-soft: var(--warn-soft); }
  .node.s-crit { --sev: var(--crit); --sev-soft: var(--crit-soft); }
  .node.offline { opacity: .62; }
  .node.pending { opacity: .7; border-style: dashed; }
  .node.pending::before { background: var(--faint); }
  .node.new { animation: newpop 900ms ease; }
  .placeholder-ring { width:44px; height:44px; border-radius:50%; border:3px dashed var(--border);
    display:grid; place-items:center; font-family:var(--mono); font-size:10px; color:var(--faint); }
  .badge.pending { color: var(--muted); background: var(--panel-2); border:1px dashed var(--border); }

  .node .hd { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .node .host { font-family: var(--mono); font-weight: 700; font-size: 15px;
    letter-spacing: -.01em; display:flex; align-items:center; gap:7px; }
  .aura { width:9px; height:9px; border-radius:50%; background:var(--sev);
    box-shadow: 0 0 0 3px var(--sev-soft); flex:none; }
  .node.s-good .aura { animation: pulse-good 3s infinite; }
  .node .meta { font-family: var(--mono); font-size: 10.5px; color: var(--faint);
    margin-top: 2px; }
  .role { font-family: var(--mono); font-size: 9px; text-transform: uppercase;
    letter-spacing:.1em; color: var(--accent); border:1px solid var(--border);
    padding: 2px 6px; border-radius: 6px; background: var(--panel-2); }

  .rings { display:flex; gap: 6px; align-items:flex-start; justify-content:space-between; }
  .ring { display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; }
  .ring svg { display:block; }
  .ring .v { font-family: var(--mono); font-size: 11px; font-weight:600;
    font-variant-numeric: tabular-nums; margin-top:3px; }
  .ring .k { font-family: var(--mono); font-size: 8.5px; letter-spacing:.1em;
    text-transform: uppercase; color: var(--faint); }
  .ring .k2 { font-family: var(--mono); font-size: 8.5px; color: var(--muted);
    font-variant-numeric: tabular-nums; display:flex; align-items:center; gap:3px; }
  .ring .k2 i { width:5px; height:5px; border-radius:50%; background:var(--ring2); flex:none; }

  .sparkwrap { margin-top: 2px; }
  .spark { width:100%; height: 26px; display:block; }

  .node .foot { display:flex; align-items:center; justify-content:space-between; gap:6px;
    border-top: 1px solid var(--border-soft); padding-top: 9px; }
  .cons { font-family: var(--mono); font-size: 10.5px; color: var(--muted);
    display:flex; gap: 8px; }
  .cons b { color: var(--text); }
  .badge { font-family: var(--mono); font-size: 10px; font-weight:600;
    padding: 2px 7px; border-radius: 999px; display:inline-flex; align-items:center; gap:5px;
    max-width: 62%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .badge.warn { color: var(--warn); background: var(--warn-soft); }
  .badge.crit { color: var(--crit); background: var(--crit-soft); }
  .badge.ok { color: var(--good); background: var(--good-soft); }

  /* ---- machine view ---- */
  .mhead { background: var(--panel); border:1px solid var(--border); border-radius: var(--r);
    padding: 16px; box-shadow: var(--shadow); margin-top: 8px; }
  .mhead .top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .mhead .host { font-family: var(--mono); font-weight:700; font-size: 20px;
    display:flex; align-items:center; gap:9px; letter-spacing:-.01em; }
  .mhead .sub { font-family: var(--mono); font-size: 11.5px; color:var(--faint); margin-top:3px;
    display:flex; gap: 12px; flex-wrap: wrap; }
  .pill { font-family: var(--mono); font-size: 11px; font-weight:600; padding: 5px 11px;
    border-radius: 999px; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .pill.good { color:var(--good); background:var(--good-soft); }
  .pill.warn { color:var(--warn); background:var(--warn-soft); }
  .pill.crit { color:var(--crit); background:var(--crit-soft); }
  .pill .d { width:6px; height:6px; border-radius:50%; background:currentColor; }

  .alertbar { margin-top: 12px; display:flex; align-items:center; gap:9px;
    font-family: var(--mono); font-size: 12px; padding: 9px 11px; border-radius: 9px; }
  .alertbar.warn { color: var(--warn); background: var(--warn-soft); }
  .alertbar.crit { color: var(--crit); background: var(--crit-soft); }

  .vitals { display:flex; gap: 18px; align-items:center; margin-top: 14px;
    padding-top: 14px; border-top:1px solid var(--border-soft); flex-wrap: wrap; }
  .bigring { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .bigring .v { font-family:var(--mono); font-weight:700; font-size:13px; font-variant-numeric:tabular-nums; }
  .bigring .k { font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); }
  .bigring .k2 { font-family:var(--mono); font-size:9px; color:var(--muted); font-variant-numeric:tabular-nums;
    display:flex; align-items:center; gap:3px; margin-top:1px; }
  .bigring .k2 i { width:5px; height:5px; border-radius:50%; background:var(--ring2); flex:none; }
  .loadbox { flex:1; min-width: 140px; }
  .loadbox .lbl { font-family:var(--mono); font-size:9.5px; letter-spacing:.12em;
    text-transform:uppercase; color:var(--faint); display:flex; justify-content:space-between; }
  .loadbox .lbl b { color: var(--text); font-size: 12px; }

  .sec-title { font-family: var(--mono); font-size: 11px; letter-spacing:.14em;
    text-transform: uppercase; color: var(--faint); margin: 22px 2px 8px;
    display:flex; align-items:center; gap:8px; }
  .sec-title .n { color: var(--muted); }
  .sec-title::after { content:""; flex:1; height:1px; background: var(--border-soft); }

  .list { display:flex; flex-direction:column; gap: 8px; }
  .empty { font-family:var(--mono); font-size:11.5px; color:var(--faint);
    padding: 10px 12px; border:1px dashed var(--border); border-radius:10px; }
  .row {
    display:flex; align-items:center; gap:11px; cursor:pointer;
    background: var(--panel); border:1px solid var(--border); border-radius: 10px;
    padding: 11px 12px; box-shadow: var(--shadow); text-align:left; width:100%;
    font-family: var(--sans); color: var(--text);
    transition: border-color .12s ease, transform .1s ease;
  }
  .row:hover { border-color: var(--accent); transform: translateX(2px); }
  .row:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .row .gly { width:26px; height:26px; border-radius:7px; display:grid; place-items:center;
    font-size: 13px; background: var(--panel-2); border:1px solid var(--border-soft);
    color: var(--muted); flex:none; }
  .row .nm { font-family: var(--mono); font-size: 13px; font-weight:600; flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .row .rt { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space:nowrap; }
  .state { display:inline-flex; align-items:center; gap:6px; font-family:var(--mono);
    font-size: 10.5px; font-weight:600; }
  .state .sd { width:7px; height:7px; border-radius:50%; }
  .state.running { color: var(--good); } .state.running .sd { background:var(--good); box-shadow:0 0 0 3px var(--good-soft); }
  .state.failed  { color: var(--crit); } .state.failed  .sd { background:var(--crit); box-shadow:0 0 0 3px var(--crit-soft); }
  .state.stopped { color: var(--faint); } .state.stopped .sd { background:var(--faint); }
  .state.sched   { color: var(--accent); } .state.sched .sd { background:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

  /* ---- construct detail ---- */
  .card { background: var(--panel); border:1px solid var(--border); border-radius: var(--r);
    box-shadow: var(--shadow); margin-top: 8px; overflow:hidden; }
  .card .chd { padding: 16px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .card .cname { font-family:var(--mono); font-weight:700; font-size:18px; display:flex; align-items:center; gap:9px; }
  .card .ctype { font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    color: var(--faint); margin-top: 4px; }
  .metagrid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border-soft);
    border-top:1px solid var(--border-soft); border-bottom:1px solid var(--border-soft); }
  .metagrid .m { background: var(--panel); padding: 11px 12px; }
  .metagrid .mk { font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); }
  .metagrid .mv { font-family:var(--mono); font-size:14px; font-weight:600; margin-top:3px; font-variant-numeric:tabular-nums; }
  @media (max-width:479px){ .metagrid{ grid-template-columns:repeat(2,1fr);} }

  .controls { display:flex; gap:8px; padding: 14px 16px; flex-wrap:wrap;
    border-bottom:1px solid var(--border-soft); }
  .btn { font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer;
    border-radius:9px; padding: 9px 14px; border:1px solid var(--border);
    background: var(--panel-2); color: var(--text); display:inline-flex; align-items:center; gap:7px; }
  .btn:hover { border-color: var(--accent); }
  .btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .btn.primary { background: var(--accent); border-color: var(--accent);
    color: #04211d; } .btn.primary:hover { filter: brightness(1.06); }
  .btn.danger:hover { border-color: var(--crit); color: var(--crit); }
  .btn.ghost { background: transparent; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }

  .field { margin-bottom: 14px; }
  .field label { display:block; font-family:var(--mono); font-size:10.5px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .field .opt { text-transform:none; letter-spacing:0; color:var(--faint); font-family:var(--sans); }
  .field input { width:100%; font-family:var(--mono); font-size:14px; color:var(--text);
    background: var(--panel-2); border:1px solid var(--border); border-radius:9px;
    padding: 10px 12px; outline:none; }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--faint); }
  .field .hint { margin-top:5px; font-family:var(--mono); font-size:10.5px; color:var(--faint); }

  .verify-box { border:1px solid var(--border); border-radius:10px; padding:12px; margin: 4px 0 16px;
    background: var(--panel-2); }
  .verify-row { display:flex; align-items:center; gap:9px; font-family:var(--mono); font-size:12.5px; }
  .verify-row + .verify-row { margin-top:8px; }
  .vdot { width:8px; height:8px; border-radius:50%; flex:none; }
  .vdot.ok { background: var(--good); box-shadow:0 0 0 3px var(--good-soft); }
  .preview { display:flex; align-items:center; gap:10px; margin-top:10px; padding-top:10px;
    border-top:1px solid var(--border-soft); }
  .preview .gly { width:32px; height:32px; border-radius:8px; background:var(--good-soft); color:var(--good);
    display:grid; place-items:center; font-size:15px; flex:none; }
  .preview .pn { font-family:var(--mono); font-weight:700; font-size:13px; }
  .preview .pm { font-family:var(--mono); font-size:10.5px; color:var(--faint); }

  .field-note { font-family:var(--mono); font-size:10.5px; color:var(--faint); line-height:1.6;
    background: var(--panel-2); border:1px dashed var(--border); border-radius:9px; padding:9px 11px; margin: 2px 0 18px; }
  .field-note b { color: var(--muted); }
  .field-note.err { color: var(--crit); border-color: var(--crit-soft); }

  /* tailnet discovery (Scan tailnet) */
  .scan-block { margin: 2px 0 16px; }
  .scan-block .btn.ghost { width:100%; }
  .disc-list { display:flex; flex-direction:column; gap:7px; margin-bottom:9px; }
  .disc-row { display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    border:1px solid var(--border); border-radius:10px; padding:9px 11px; background:var(--panel-2);
    color:inherit; cursor:pointer; font:inherit; }
  .disc-row:hover, .disc-row:focus-visible { border-color: var(--accent); outline:none; }
  .disc-row .gly { width:30px; height:30px; border-radius:8px; background:var(--good-soft); color:var(--good);
    display:grid; place-items:center; font-size:15px; flex:none; }
  .disc-meta { flex:1; min-width:0; }
  .disc-meta .pn { font-family:var(--mono); font-weight:700; font-size:13px; }
  .disc-meta .pm { font-family:var(--mono); font-size:10.5px; color:var(--faint); }
  .disc-add { font-family:var(--mono); font-size:11px; color:var(--accent); flex:none; }
  /* count of agents found on the tailnet but not yet added */
  .badge-count { display:inline-grid; place-items:center; min-width:16px; height:16px; padding:0 4px;
    margin-left:6px; border-radius:8px; background:var(--accent); color:var(--ground);
    font-family:var(--mono); font-size:10px; font-weight:700; line-height:1; vertical-align:middle; }

  .sheet-actions { display:flex; gap:9px; }
  .sheet-actions .btn { flex:1; justify-content:center; }

  .logwrap { padding: 12px 14px 16px; }
  .logbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .logbar .l { font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); }
  .term { background: var(--panel-2); border:1px solid var(--border-soft); border-radius:9px;
    padding: 14px 12px; min-height: 96px; display:grid; place-items:center; text-align:center;
    font-family: var(--mono); font-size: 12px; color: var(--faint); line-height:1.6; }

  /* ---- bottom hotbar / build ---- */
  .dock { position: sticky; bottom: 0; z-index: 15;
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    background: color-mix(in srgb, var(--ground) 88%, transparent);
    backdrop-filter: blur(10px); border-top: 1px solid var(--border-soft);
    display:flex; gap: 10px; align-items:center; }
  .dock .hint { font-family:var(--mono); font-size:11px; color:var(--faint); flex:1; }
  .build { flex:none; }

  /* ---- sheet ---- */
  .scrim { position: fixed; inset:0; background: rgba(6,12,14,.5); z-index: 40;
    display:none; align-items:flex-end; justify-content:center; }
  .scrim.open { display:flex; }
  .sheet { width:100%; max-width: 480px; background: var(--panel);
    border-top-left-radius: 18px; border-top-right-radius: 18px;
    border:1px solid var(--border); border-bottom:none; padding: 8px 16px 24px;
    box-shadow: 0 -10px 40px rgba(0,0,0,.3); animation: rise .22s ease; }
  @media (min-width:900px){ .scrim{ align-items:center;} .sheet{ border-radius:18px; max-width:560px;} }
  .grab { width:38px; height:4px; border-radius:99px; background: var(--border); margin: 6px auto 12px; }
  .sheet h3 { margin: 0 0 2px; font-size: 16px; }
  .sheet p.sd { margin: 0 0 14px; font-family:var(--mono); font-size:11px; color:var(--faint); }
  .palette { display:grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .pitem { display:flex; gap:11px; align-items:flex-start; padding: 11px;
    border:1px solid var(--border); border-radius: 10px; background: var(--panel-2); cursor:pointer; }
  .pitem:hover { border-color: var(--accent); }
  .pitem .pg { width:30px; height:30px; border-radius:8px; display:grid; place-items:center;
    font-size: 15px; background: var(--panel); border:1px solid var(--border-soft); color:var(--accent); flex:none; }
  .pitem .pn { font-family:var(--mono); font-weight:700; font-size:13px; }
  .pitem .pdz { font-size: 11px; color: var(--muted); line-height:1.35; margin-top:2px; }

  /* ---- toast ---- */
  #toast { position: fixed; left:50%; bottom: 84px; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--ground); font-family: var(--mono); font-size: 12px;
    padding: 10px 15px; border-radius: 10px; z-index: 60; opacity:0; pointer-events:none;
    transition: opacity .2s, transform .2s; max-width: 90%; box-shadow: 0 8px 30px rgba(0,0,0,.3); }
  #toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

  .note { font-family:var(--mono); font-size:11px; color:var(--faint); text-align:center;
    padding: 14px 16px 0; }

  /* ============================================================
     CYBER SKIN — structural HUD treatment on top of the palette.
     Sharp corners, terminal chrome, target brackets. Single theme,
     so these ride directly on the base components.
     ============================================================ */
  /* sharpen every rounded holdout (status LEDs stay round on purpose) */
  .chip, .pill, .role, .badge, .row, .row .gly, .btn, .term,
  .sheet, .grab, .pitem, .pitem .pg, #toast, .alertbar { border-radius: 0; }

  /* header: blinking cursor on the wordmark */
  .brand b::after { content:"_"; color: var(--accent); margin-left:1px;
    animation: blink 1.1s step-end infinite; }
  .chip { text-transform: uppercase; letter-spacing:.08em; }
  .chip .live { box-shadow:0 0 7px var(--accent); }

  /* section heading: // prefix, chromatic-aberration title + cursor */
  .eyebrow::before { content:"// "; }
  .h-title { text-transform: uppercase; letter-spacing:.05em;
    text-shadow: -1.4px 0 rgba(255,43,214,.55), 1.4px 0 rgba(25,227,255,.55); }
  .h-title::after { content:" ▮"; color: var(--accent); text-shadow:none;
    animation: blink 1.1s step-end infinite; }

  /* fleet card: top severity rule + diagonal target brackets */
  .node::before { inset:0 0 auto 0; width:auto; height:2px; box-shadow:0 0 8px var(--sev); }
  .node::after { content:""; position:absolute; inset:5px; pointer-events:none;
    background:
      linear-gradient(var(--accent),var(--accent)) top right / var(--tick) 1px no-repeat,
      linear-gradient(var(--accent),var(--accent)) top right / 1px var(--tick) no-repeat,
      linear-gradient(var(--accent),var(--accent)) bottom left / var(--tick) 1px no-repeat,
      linear-gradient(var(--accent),var(--accent)) bottom left / 1px var(--tick) no-repeat;
    opacity:.5; transition: opacity .12s ease; }
  .node:hover::after { opacity:1; }
  .node .host { text-transform: uppercase; letter-spacing:.02em; }
  .role { text-shadow:0 0 6px var(--accent-soft); }
  .aura { box-shadow:0 0 0 2px var(--sev-soft), 0 0 8px var(--sev); }
  .ring .v, .bigring .v { text-shadow:0 0 8px currentColor; }

  /* pills → bracketed square tags */
  .badge { background: transparent; border:1px solid currentColor; padding:2px 5px;
    text-transform: uppercase; letter-spacing:.06em; }
  .badge::before { content:"["; margin-right:3px; opacity:.7; }
  .badge::after  { content:"]"; margin-left:3px;  opacity:.7; }

  /* dock reads like a shell prompt; buttons like commands */
  .dock .hint::before { content:"$ "; color: var(--accent); }
  .btn { text-transform: uppercase; letter-spacing:.1em; }

  @keyframes blink { 0%,55%{ opacity:1; } 56%,100%{ opacity:0; } }
  @keyframes pulse { 0%{ box-shadow:0 0 0 0 var(--accent);} 70%{ box-shadow:0 0 0 6px transparent;} 100%{ box-shadow:0 0 0 0 transparent;} }
  @keyframes pulse-good { 0%{ box-shadow:0 0 0 0 var(--good-soft);} 70%{ box-shadow:0 0 0 6px transparent;} 100%{ box-shadow:0 0 0 0 transparent;} }
  @keyframes rise { from{ transform: translateY(30px); opacity:.4;} to{ transform:none; opacity:1;} }
  @keyframes newpop { 0%{ transform:scale(.94);} 60%{ transform:scale(1.01);} 100%{ transform:scale(1);} }
  @media (prefers-reduced-motion: reduce) {
    *, ::before, ::after { animation-duration: .001ms !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="lostbar" id="lostBar" hidden>
  <span class="lostbar-dot"></span>
  <span id="lostBarText">lost connection to hush-control</span>
</div>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="dot-h"></span><b>hush</b>
    </div>
    <div class="spacer"></div>
    <a class="chip ver" id="verChip" href="https://github.com/clarkbar-sys/hush/releases" target="_blank" rel="noopener" hidden></a>
    <div class="chip" id="statusChip"><span class="live"></span>connecting…</div>
  </header>

  <div id="app"></div>

  <div class="dock">
    <span class="hint" id="dockHint">loading fleet…</span>
    <button class="btn" id="addMachineBtn">⊕ Add machine<span class="badge-count" id="addBadge" style="display:none"></span></button>
    <button class="btn primary build" id="buildBtn">＋ Build</button>
  </div>
</div>

<div class="scrim" id="scrim">
  <div class="sheet" role="dialog" aria-label="Build a construct">
    <div class="grab"></div>
    <h3>Build a construct</h3>
    <p class="sd">the whole vocabulary — eight nouns, nothing else</p>
    <div class="palette" id="palette"></div>
  </div>
</div>

<div class="scrim" id="addScrim">
  <div class="sheet" role="dialog" aria-label="Add a machine">
    <div class="grab"></div>
    <div id="addSheetBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  "use strict";
  const $ = (s,r=document)=>r.querySelector(s);
  const app = $("#app");
  const HIST = 26;                 // sparkline sample count

  /* ---------- state ---------- */
  const CONSTRUCTS = [
    ["Machine","▦","a tailnet host — has vitals, holds everything else"],
    ["Service","◉","a systemd unit — persistent, running or stopped"],
    ["Job","◷","a cron / timer — fires on a schedule"],
    ["Task","⚡","a one-shot run of a program — ephemeral"],
    ["Workflow","⛓","a wired sequence — reusable, stampable blueprint"],
    ["Store","▤","a disk / dataset — the NAS especially"],
    ["Backup","⭯","a Job that hauls a machine into a Store, dedup'd"],
    ["Link","⇄","the tailnet edge between two machines"],
  ];
  const sevRank = { crit:2, warn:1, good:0 };

  let M = [];                      // current fleet
  let MODE = "connecting";         // connecting | live | demo | lost
  let everLive = false;            // true once /api/fleet has answered at least once
  let lostSince = 0;               // ms timestamp poll() started failing after being live
  const DOC_TITLE = document.title;
  const cpuHist = {};              // id -> rolling cpu samples (live mode)
  const state = { view:"fleet", mid:null, cname:null };
  const byId = id => M.find(m=>m.id===id);
  let PENDING = [];                // machines just added via the UI, awaiting first check-in
  const JUST_ARRIVED = new Set();  // ids to pop-highlight for one render after their first check-in
  function esc(s){ return String(s??"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  /* ---------- svg helpers ---------- */
  function ring(pct, size){
    const r = size/2 - 3, c = 2*Math.PI*r, off = c*(1-pct/100);
    const col = pct>=85 ? "var(--crit)" : pct>=70 ? "var(--warn)" : "var(--accent)";
    const cx = size/2;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--border)" stroke-width="3"/>
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${col}" stroke-width="3"
        stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
        transform="rotate(-90 ${cx} ${cx})"/></svg>`;
  }
  function utilCol(p){ return p>=85?"var(--crit)":p>=70?"var(--warn)":"var(--accent)"; }
  function memCol(p){ return p>=90?"var(--crit)":p>=80?"var(--warn)":"var(--ring2)"; }
  function dualRing(outer, inner, size){
    const cx = size/2;
    const r1 = cx-3, c1 = 2*Math.PI*r1, o1 = c1*(1-outer/100);
    const r2 = cx-9, c2 = 2*Math.PI*r2, o2 = c2*(1-inner/100);
    const sw = 3.2;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cx}" r="${r1}" fill="none" stroke="var(--border)" stroke-width="${sw}"/>
      <circle cx="${cx}" cy="${cx}" r="${r2}" fill="none" stroke="var(--border)" stroke-width="${sw}"/>
      <circle cx="${cx}" cy="${cx}" r="${r1}" fill="none" stroke="${utilCol(outer)}" stroke-width="${sw}"
        stroke-linecap="round" stroke-dasharray="${c1.toFixed(1)}" stroke-dashoffset="${o1.toFixed(1)}"
        transform="rotate(-90 ${cx} ${cx})"/>
      <circle cx="${cx}" cy="${cx}" r="${r2}" fill="none" stroke="${memCol(inner)}" stroke-width="${sw}"
        stroke-linecap="round" stroke-dasharray="${c2.toFixed(1)}" stroke-dashoffset="${o2.toFixed(1)}"
        transform="rotate(-90 ${cx} ${cx})"/></svg>`;
  }
  function sparkline(data, w, h){
    const n = data.length;
    const pts = data.map((v,i)=>{
      const x=(i/(n-1))*w, y=h-3-(v/100)*(h-6);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    const last = pts[pts.length-1].split(",");
    const area = `0,${h} ${pts.join(" ")} ${w},${h}`;
    const gid = "g"+Math.floor(Math.random()*1e6);
    return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="var(--accent)" stop-opacity=".28"/>
        <stop offset="1" stop-color="var(--accent)" stop-opacity="0"/>
      </linearGradient></defs>
      <polygon points="${area}" fill="url(#${gid})"/>
      <polyline points="${pts.join(" ")}" fill="none" stroke="var(--accent)" stroke-width="1.6"
        stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${last[0]}" cy="${last[1]}" r="2.4" fill="var(--accent)"/></svg>`;
  }

  /* ---------- render ---------- */
  function render(){
    if(state.view==="machine" && !byId(state.mid)) state.view = "fleet";
    if(state.view==="fleet") renderFleet();
    else if(state.view==="machine") renderMachine();
    else renderConstruct();
  }

  function renderFleet(){
    const crit = M.filter(m=>m.status==="crit").length;
    const warn = M.filter(m=>m.status==="warn").length;
    const good = M.filter(m=>m.status==="good").length;
    app.innerHTML = `
      <div class="strip">
        <div style="flex:1">
          <div class="h-title">Fleet</div>
        </div>
        <div class="summ">
          <span class="s"><span class="swatch" style="background:var(--good)"></span><b>${good}</b> ok</span>
          <span class="s"><span class="swatch" style="background:var(--warn)"></span><b>${warn}</b> warn</span>
          <span class="s"><span class="swatch" style="background:var(--crit)"></span><b>${crit}</b> crit</span>
        </div>
      </div>
      <main>
        <div class="grid">
          ${PENDING.map(pendingNodeCard).join("")}
          ${M.slice().sort((a,b)=>sevRank[b.status]-sevRank[a.status]).map(nodeCard).join("")}
        </div>
        ${(M.length+PENDING.length) ? "" : `<p class="note">no machines reporting yet</p>`}
      </main>`;
    app.querySelectorAll(".node[data-id]").forEach(el=>{
      el.addEventListener("click", ()=>enterMachine(el.dataset.id));
    });
    JUST_ARRIVED.clear(); // the pop animation above only needs to play once
  }

  // A machine just added through "Add machine", shown until its first real
  // /api/fleet entry shows up (see poll()'s PENDING filter below).
  function pendingNodeCard(p){
    return `
      <div class="node pending">
        <div class="hd">
          <div>
            <div class="host"><span class="aura" style="background:var(--faint)"></span>${esc(p.id)}</div>
            <div class="meta">${esc(p.ip||"")}</div>
          </div>
        </div>
        <div class="rings"><div class="ring"><div class="placeholder-ring">?</div></div></div>
        <div class="foot">
          <span class="cons">waiting for first check-in…</span>
          <span class="badge pending">◌ pairing</span>
        </div>
      </div>`;
  }

  function nodeCard(m){
    const rolePill = m.role ? `<span class="role">${m.role}</span>` : "";
    let badge;
    if(!m.online) badge = `<span class="badge crit">● offline</span>`;
    else if(m.status==="crit") badge = `<span class="badge crit">● ${(m.alert||"critical").split("—")[0].trim()}</span>`;
    else if(m.status==="warn") badge = `<span class="badge warn">▲ ${(m.alert||"elevated").split("·")[0].trim()}</span>`;
    else badge = `<span class="badge ok">● nominal</span>`;
    const gpuRing = m.gpu!=null ? `
          <div class="ring">${dualRing(m.gpu,m.vram,44)}<span class="v">${m.gpu}%</span><span class="k">gpu</span><span class="k2"><i></i>${m.vram}% vram</span></div>` : "";
    const hist = m.loadHist && m.loadHist.length>1 ? m.loadHist : [m.cpu||0, m.cpu||0];
    return `
      <button class="node s-${m.status} ${m.online?"":"offline"}${JUST_ARRIVED.has(m.id)?" new":""}" data-id="${m.id}">
        <div class="hd">
          <div>
            <div class="host"><span class="aura"></span>${m.id}</div>
            <div class="meta">${m.os||"—"}${m.ip?` · ${m.ip}`:""}${m.gpu!=null&&m.gpuName?` · ${m.gpuName}`:""}</div>
          </div>
          ${rolePill}
        </div>
        <div class="rings">
          <div class="ring">${dualRing(m.cpu,m.mem,44)}<span class="v">${m.cpu}%</span><span class="k">cpu</span><span class="k2"><i></i>${m.mem}% mem</span></div>
          <div class="ring">${ring(m.disk,44)}<span class="v">${m.disk}%</span><span class="k">disk</span></div>
          ${gpuRing}
        </div>
        <div class="sparkwrap">${sparkline(hist, 200, 26)}</div>
        <div class="foot">
          <span class="cons"><b>${m.services.length}</b>&nbsp;svc <b>${m.jobs.length}</b>&nbsp;job</span>
          ${badge}
        </div>
      </button>`;
  }

  function enterMachine(id){ state.view="machine"; state.mid=id; render(); scrollTop(); }
  function enterConstruct(name){ state.view="construct"; state.cname=name; render(); scrollTop(); }
  function goFleet(){ state.view="fleet"; render(); scrollTop(); }
  function scrollTop(){ window.scrollTo({top:0,behavior:"instant"}); }
  function sevVar(s){ return s==="good"?"good":s==="warn"?"warn":"crit"; }

  function renderMachine(){
    const m = byId(state.mid);
    const sv = sevVar(m.status);
    const alert = m.alert ? `<div class="alertbar ${m.status}">${m.status==="crit"?"●":"▲"} ${m.alert}</div>` : "";
    const hist = m.loadHist && m.loadHist.length>1 ? m.loadHist : [m.cpu||0, m.cpu||0];
    app.innerHTML = `
      <div class="strip">
        <div class="crumbs"><a id="bk">Fleet</a><span class="sep">/</span><span>${m.id}</span></div>
      </div>
      <main>
        <div class="mhead">
          <div class="top">
            <div>
              <div class="host"><span class="aura" style="--sev:var(--${sv});--sev-soft:var(--${sv}-soft);background:var(--${sv})"></span>${m.id}</div>
              <div class="sub"><span>${m.os||"—"}</span>${m.ip?`<span>${m.ip}</span>`:""}${m.up?`<span>up ${m.up}</span>`:""}${m.gpu!=null&&m.gpuName?`<span style="color:var(--accent)">${m.gpuName}${m.vramText?` · ${m.vramText}`:""}</span>`:""}${m.role?`<span style="color:var(--accent)">${m.role}</span>`:""}${m.agentVersion?`<span>agent ${m.agentVersion}</span>`:""}</div>
            </div>
            <span class="pill ${m.status}"><span class="d"></span>${!m.online?"offline":m.status==="good"?"healthy":m.status==="warn"?"degraded":"critical"}</span>
          </div>
          ${alert}
          <div class="vitals">
            <div class="bigring">${dualRing(m.cpu,m.mem,56)}<span class="v">${m.cpu}%</span><span class="k">cpu</span><span class="k2"><i></i>${m.mem}% mem</span></div>
            <div class="bigring">${ring(m.disk,56)}<span class="v">${m.disk}%</span><span class="k">disk</span></div>
            ${m.gpu!=null?`
            <div class="bigring">${dualRing(m.gpu,m.vram,56)}<span class="v">${m.gpu}%</span><span class="k">gpu</span><span class="k2"><i></i>${m.vram}% vram</span></div>`:""}
            <div class="loadbox">
              <div class="lbl"><span>cpu trend</span><b>load ${m.load||"—"}</b></div>
              ${sparkline(hist,260,34)}
            </div>
          </div>
        </div>

        <div class="sec-title">Services <span class="n">${m.services.length}</span></div>
        <div class="list">${m.services.length ? m.services.map(svcRow).join("")
          : `<div class="empty">${m.online ? "no running or failed units reported" : "machine unreachable"}</div>`}</div>

        ${m.jobs.length?`<div class="sec-title">Jobs <span class="n">${m.jobs.length}</span></div>
          <div class="list">${m.jobs.map(jobRow).join("")}</div>`:""}
        ${m.tasks.length?`<div class="sec-title">Recent tasks <span class="n">${m.tasks.length}</span></div>
          <div class="list">${m.tasks.map(taskRow).join("")}</div>`:""}
      </main>`;
    $("#bk").addEventListener("click", goFleet);
    app.querySelectorAll("[data-svc]").forEach(el=>{
      el.addEventListener("click", ()=>enterConstruct(el.dataset.svc));
    });
  }

  function svcRow(s){
    return `<button class="row" data-svc="${s.name}">
      <span class="gly">◉</span>
      <span class="nm">${s.name}</span>
      <span class="rt">${s.mem && s.mem!=="—" ? s.mem : ""}</span>
      <span class="state ${s.state}"><span class="sd"></span>${s.state}</span>
    </button>`;
  }
  function jobRow(j){
    return `<div class="row" style="cursor:default">
      <span class="gly">◷</span>
      <span class="nm">${j.name}</span>
      <span class="rt">${j.sched||""}</span>
      <span class="state sched"><span class="sd"></span>${j.next||""}</span>
    </div>`;
  }
  function taskRow(t){
    return `<div class="row" style="cursor:default">
      <span class="gly">⚡</span>
      <span class="nm">${t.name}</span>
      <span class="rt">${t.when||""}</span>
      <span class="state ${t.ok?"running":"failed"}"><span class="sd"></span>${t.ok?"ok":"fail"}</span>
    </div>`;
  }

  function renderConstruct(){
    const m = byId(state.mid);
    const s = (m.services||[]).find(x=>x.name===state.cname) || {name:state.cname, state:"stopped"};
    const running = s.state==="running";
    app.innerHTML = `
      <div class="strip">
        <div class="crumbs"><a id="bkf">Fleet</a><span class="sep">/</span><a id="bkm">${m.id}</a><span class="sep">/</span><span>${s.name}</span></div>
      </div>
      <main>
        <div class="card">
          <div class="chd">
            <div>
              <div class="cname"><span class="state ${s.state}"><span class="sd"></span></span>${s.name}</div>
              <div class="ctype">Service · systemd unit · ${m.id}</div>
            </div>
            <span class="pill ${running?"good":s.state==="failed"?"crit":"warn"}"><span class="d"></span>${s.state==="failed"?"failed":running?"active (running)":s.state}</span>
          </div>
          <div class="metagrid">
            <div class="m"><div class="mk">state</div><div class="mv">${s.state}</div></div>
            <div class="m"><div class="mk">memory</div><div class="mv">${s.mem && s.mem!=="—" ? s.mem : "—"}</div></div>
            <div class="m"><div class="mk">pid</div><div class="mv">${s.pid||"—"}</div></div>
            <div class="m"><div class="mk">restarts</div><div class="mv">${s.restarts!=null?s.restarts:"—"}</div></div>
          </div>
          <div class="controls">
            <button class="btn ${running?"":"primary"}" data-act="${running?"restart":"start"}">${running?"⟳ Restart":"▶ Start"}</button>
            <button class="btn danger" data-act="stop" ${running?"":"disabled"}>■ Stop</button>
            <button class="btn" data-act="edit unit">✎ Edit unit</button>
            <button class="btn" data-act="full logs">⤓ Full logs</button>
          </div>
          <div class="logwrap">
            <div class="logbar"><span class="l">journal</span></div>
            <div class="term">Live <code>journalctl -u ${s.name}</code> streaming<br>arrives in Phase 1.</div>
          </div>
        </div>
        <p class="note">Phase 0 is read-only — controls are a preview of Phase 1.</p>
      </main>`;
    $("#bkf").addEventListener("click", goFleet);
    $("#bkm").addEventListener("click", ()=>{ state.view="machine"; render(); scrollTop(); });
    app.querySelectorAll("[data-act]").forEach(b=>{
      b.addEventListener("click", ()=>toast(`⟶ would ${b.dataset.act} ${s.name} on ${m.id} — Phase 1`));
    });
  }

  /* ---------- data: live + demo ---------- */
  function normalize(m){
    m.services = m.services || [];
    m.jobs = m.jobs || [];
    m.tasks = m.tasks || [];
    if(m.online===undefined) m.online = true;
    return m;
  }

  function ingestLive(data){
    M = data.map(m=>{
      normalize(m);
      const h = cpuHist[m.id] || Array(HIST).fill(m.cpu);
      h.push(m.cpu); while(h.length>HIST) h.shift();
      cpuHist[m.id] = h;
      m.loadHist = h.slice();
      return m;
    });
    // a machine added through "Add machine" graduates out of PENDING once its
    // first real /api/fleet entry shows up, with one pop-in animation.
    PENDING = PENDING.filter(p => {
      const arrived = M.some(m => m.id === p.id || (p.ip && m.ip === p.ip));
      if(arrived) JUST_ARRIVED.add(p.id);
      return !arrived;
    });
  }

  function setChip(){
    const chip = $("#statusChip");
    chip.className = "chip" + (MODE==="demo"?" demo":MODE==="live"?"":" down");
    let txt = "connecting…";
    if(MODE==="live"){
      const online = M.filter(m=>m.online).length;
      txt = online===M.length ? "transport ok" : `${online}/${M.length} reachable`;
    } else if(MODE==="demo"){ txt = "demo data"; }
    else if(MODE==="lost"){ txt = "lost connection"; }
    chip.innerHTML = `<span class="live"></span>${txt}`;
    const crit = M.filter(m=>m.status==="crit").length;
    const warn = M.filter(m=>m.status==="warn").length;
    const pairing = PENDING.length ? ` · ${PENDING.length} pairing` : "";
    $("#dockHint").textContent = MODE==="lost"
      ? `showing last known state · ${M.length} machine${M.length===1?"":"s"}`
      : `${M.length} machine${M.length===1?"":"s"} · ${crit} critical · ${warn} warning${pairing}`;
  }

  function setLostBanner(on){
    const bar = $("#lostBar");
    bar.hidden = !on;
    document.body.classList.toggle("conn-lost", on);
    document.title = on ? "⛔ DISCONNECTED — hush" : DOC_TITLE;
    if(on){
      const secs = Math.max(0, Math.round((Date.now() - lostSince) / 1000));
      const ago = secs < 60 ? `${secs}s` : `${Math.round(secs/60)}m`;
      $("#lostBarText").textContent = `lost connection to hush-control · reconnecting… · down for ${ago}`;
    }
  }

  async function poll(){
    try {
      const r = await fetch("api/fleet", {cache:"no-store"});
      if(!r.ok) throw new Error("bad status");
      const data = await r.json();
      if(!Array.isArray(data)) throw new Error("bad payload");
      ingestLive(data);
      MODE = "live";
      everLive = true;
      lostSince = 0;
      setLostBanner(false);
    } catch(e){
      if(everLive){
        // we had a real connection and lost it (e.g. hush-control rebooting) —
        // freeze the last known fleet rather than silently swapping in fake
        // demo machines, and make the loss unmissable.
        if(MODE!=="lost"){ lostSince = Date.now(); }
        MODE = "lost";
        setLostBanner(true);
      } else {
        // never connected at all (local preview, file://, no backend running) —
        // this is the legitimate demo-data fallback.
        if(MODE!=="demo"){ M = demoFleet(); }
        MODE = "demo";
        jitterDemo();
      }
    }
    setChip();
    render();
  }

  /* ---------- demo fleet (offline / file:// fallback) ---------- */
  function walk(n, base, amp){
    const a=[]; let v=base;
    for(let i=0;i<n;i++){ v+=(Math.random()-0.5)*amp; v=Math.max(2,Math.min(98,v)); a.push(v); }
    return a;
  }
  function demoFleet(){
    const mk = o => { o.online=true; o.jobs=o.jobs||[]; o.tasks=o.tasks||[]; o.loadHist=walk(HIST,o.cpu,12); return o; };
    return [
      mk({ id:"citadel", agentVersion:"v1.3.0", os:"Debian 12", ip:"100.71.8.9", role:"", status:"good", cpu:23, mem:47, disk:38, up:"41d", load:"0.9",
        gpu:18, vram:47, gpuName:"RTX 3090", vramText:"11.3 / 24 GB",
        services:[{name:"hush-agent",state:"running",mem:"18 MB"},{name:"caddy",state:"running",mem:"42 MB"},{name:"postgres",state:"running",mem:"512 MB"},{name:"tailscaled",state:"running",mem:"24 MB"}],
        jobs:[{name:"nightly-backup",next:"in 3h 12m",sched:"0 3 * * *"},{name:"cert-renew",next:"in 6d",sched:"@weekly"}],
        tasks:[{name:"git pull · deploy/api",when:"12m ago",ok:true}] }),
      mk({ id:"nas", agentVersion:"v1.3.0", os:"TrueNAS · ZFS", ip:"100.71.4.2", role:"store", status:"good", cpu:11, mem:34, disk:81, up:"92d", load:"0.4", gpu:null,
        services:[{name:"hush-agent",state:"running",mem:"17 MB"},{name:"smbd",state:"running",mem:"88 MB"},{name:"zfs-scrub",state:"running",mem:"6 MB"}],
        jobs:[{name:"pull-backups",next:"in 3h 12m",sched:"0 3 * * *"}] }),
      mk({ id:"forge", agentVersion:"v1.2.0", os:"Arch Linux", ip:"100.71.2.5", role:"", status:"warn", cpu:88, mem:71, disk:52, up:"6d", load:"14.2",
        gpu:62, vram:71, gpuName:"RTX 4070", vramText:"8.5 / 12 GB", alert:"load 14.2 · CI backlog building",
        services:[{name:"hush-agent",state:"running",mem:"18 MB"},{name:"buildkite-agent",state:"running",mem:"120 MB"},{name:"docker",state:"running",mem:"340 MB"}],
        jobs:[{name:"cache-prune",next:"in 40m",sched:"*/30 * * * *"}] }),
      mk({ id:"atlas", agentVersion:"v1.3.0", os:"Ubuntu 24.04", ip:"100.71.9.3", role:"", status:"crit", cpu:5, mem:22, disk:63, up:"2d", load:"0.2",
        gpu:34, vram:41, gpuName:"RTX 3060", vramText:"4.9 / 12 GB", alert:"plex.service failed — exit code 1",
        services:[{name:"hush-agent",state:"running",mem:"18 MB"},{name:"plex",state:"failed",mem:"—"},{name:"jellyfin",state:"running",mem:"210 MB"},{name:"sonarr",state:"running",mem:"96 MB"}],
        jobs:[{name:"library-scan",next:"in 1h",sched:"0 * * * *"}] }),
      mk({ id:"pi-gate", agentVersion:"v1.3.0", os:"Raspberry Pi OS", ip:"100.71.0.1", role:"gateway", status:"good", cpu:31, mem:58, disk:44, up:"118d", load:"1.1", gpu:null,
        services:[{name:"hush-agent",state:"running",mem:"16 MB"},{name:"tailscaled",state:"running",mem:"22 MB"},{name:"adguardhome",state:"running",mem:"54 MB"}],
        jobs:[{name:"speedtest-log",next:"in 25m",sched:"*/30 * * * *"}] }),
      mk({ id:"lab-01", agentVersion:"v1.3.0", os:"NixOS 24.05", ip:"100.71.5.7", role:"", status:"good", cpu:9, mem:19, disk:12, up:"3d", load:"0.3",
        gpu:88, vram:91, gpuName:"RTX 4090", vramText:"21.8 / 24 GB",
        services:[{name:"hush-agent",state:"running",mem:"18 MB"},{name:"k3s",state:"running",mem:"430 MB"}] }),
    ];
  }
  function jitterDemo(){
    M.forEach(m=>{
      const j = v => Math.max(2, Math.min(98, Math.round(v + (Math.random()-0.5)*(m.status==="warn"?7:4))));
      m.cpu = j(m.cpu); m.mem = Math.max(2,Math.min(98, m.mem + (((Math.random()-0.5)*2)|0)));
      if(m.gpu!=null){ m.gpu = j(m.gpu); m.vram = Math.max(2,Math.min(99, m.vram + (((Math.random()-0.5)*2)|0))); }
      m.loadHist = m.loadHist.slice(1).concat([m.cpu]);
    });
  }

  /* ---------- build sheet ---------- */
  const scrim = $("#scrim");
  $("#palette").innerHTML = CONSTRUCTS.map(c=>`
    <div class="pitem" data-c="${c[0]}">
      <span class="pg">${c[1]}</span>
      <div><div class="pn">${c[0]}</div><div class="pdz">${c[2]}</div></div>
    </div>`).join("");
  $("#buildBtn").addEventListener("click", ()=>scrim.classList.add("open"));
  scrim.addEventListener("click", e=>{ if(e.target===scrim) scrim.classList.remove("open"); });
  $("#palette").querySelectorAll(".pitem").forEach(el=>{
    el.addEventListener("click", ()=>{ scrim.classList.remove("open"); toast(`＋ ${el.dataset.c} builder — coming in a later phase`); });
  });

  /* ---------- add machine sheet ---------- */
  const addScrim = $("#addScrim");
  const addBody = $("#addSheetBody");
  let addStep = 0;                 // 0 form, 1 verified, 2 done
  let addDraft = { name:"", addr:"", role:"" };
  let addTestResult = null;
  let addBusy = false;
  let addError = "";
  // tailnet discovery state for the "Scan tailnet" affordance.
  let discoverState = { ran:false, loading:false, available:true, error:"", candidates:[] };
  // lastDiscover holds the most recent background poll result, so the badge and
  // the freshly-opened sheet can show discovered agents without waiting on a scan.
  let lastDiscover = null;

  function openAddSheet(){
    addStep = 0; addDraft = { name:"", addr:"", role:"" };
    addTestResult = null; addBusy = false; addError = "";
    // Seed from the last background poll so cached candidates show immediately;
    // "Rescan" then refreshes them live.
    if(lastDiscover){
      discoverState = { ran:true, loading:false, available:lastDiscover.available, error:"", candidates:lastDiscover.candidates.slice() };
    } else {
      discoverState = { ran:false, loading:false, available:true, error:"", candidates:[] };
    }
    addScrim.classList.add("open");
    renderAddSheet();
  }
  function closeAddSheet(){ addScrim.classList.remove("open"); }

  function renderAddSheet(){
    if(addStep === 0){
      addBody.innerHTML = `
        <h3>Add a machine</h3>
        <p class="sd">point hush-control at a new hush-agent on your tailnet</p>
        ${renderScanBlock()}
        <div class="field">
          <label>Name <span class="opt">— optional, falls back to the agent's hostname</span></label>
          <input type="text" id="fName" placeholder="e.g. beacon" value="${esc(addDraft.name)}">
        </div>
        <div class="field">
          <label>Tailnet address</label>
          <input type="text" id="fAddr" placeholder="100.71.x.x:8765" value="${esc(addDraft.addr)}">
          <div class="hint">the agent's tailnet IP or MagicDNS name, port 8765</div>
        </div>
        <div class="field">
          <label>Role <span class="opt">— optional</span></label>
          <input type="text" id="fRole" placeholder="e.g. store, gateway" value="${esc(addDraft.role)}">
        </div>
        <div class="field-note">
          <b>Note —</b> hush-agent has no auth yet, so this just confirms the address answers and saves it. Anything already on your tailnet can reach it.
        </div>
        ${addError ? `<div class="field-note err">${esc(addError)}</div>` : ""}
        <div class="sheet-actions">
          <button class="btn ghost" id="addCancel">Cancel</button>
          <button class="btn primary" id="addTest" ${addBusy?"disabled":""}>${addBusy?"Testing…":"Test connection →"}</button>
        </div>`;
      $("#addCancel").addEventListener("click", closeAddSheet);
      $("#addTest").addEventListener("click", submitTest);
      $("#fName").addEventListener("input", e=>{ addDraft.name = e.target.value; });
      $("#fAddr").addEventListener("input", e=>{ addDraft.addr = e.target.value; });
      $("#fRole").addEventListener("input", e=>{ addDraft.role = e.target.value; });
      attachScanHandlers();
    } else if(addStep === 1){
      const r = addTestResult;
      addBody.innerHTML = `
        <h3>Add a machine</h3>
        <p class="sd">${esc(addDraft.addr)}</p>
        <div class="verify-box">
          <div class="verify-row"><span class="vdot ok"></span>reached the agent</div>
          <div class="verify-row"><span class="vdot ok"></span>/vitals responded in ${r.latencyMs}ms</div>
          <div class="preview">
            <span class="gly">▦</span>
            <div><div class="pn">${esc(addDraft.name || r.host || "—")}</div><div class="pm">${esc(r.os||"—")}</div></div>
          </div>
        </div>
        <div class="sheet-actions">
          <button class="btn ghost" id="addBack">← Back</button>
          <button class="btn primary" id="addSave" ${addBusy?"disabled":""}>${addBusy?"Adding…":"Add to fleet"}</button>
        </div>`;
      $("#addBack").addEventListener("click", ()=>{ addStep=0; renderAddSheet(); });
      $("#addSave").addEventListener("click", submitAdd);
    } else {
      const total = M.length + PENDING.length;
      addBody.innerHTML = `
        <h3>${esc(addDraft.name || (addTestResult&&addTestResult.host) || "Machine")} added ✓</h3>
        <p class="sd">now watching ${total} machine${total===1?"":"s"}</p>
        <div class="field-note"><b>Note —</b> vitals arrive on the next poll (~2.5s). No restart of hush-control needed.</div>
        <div class="sheet-actions">
          <button class="btn primary" id="addDone" style="flex:1">Done</button>
        </div>`;
      $("#addDone").addEventListener("click", closeAddSheet);
    }
  }

  async function submitTest(){
    const addr = ($("#fAddr").value || "").trim();
    addDraft.addr = addr;
    if(!addr){ addError = "enter an address"; renderAddSheet(); return; }
    addBusy = true; addError = ""; renderAddSheet();
    try {
      const r = await fetch("api/agents/test", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ addr })
      });
      const data = await r.json();
      addBusy = false;
      if(!data.ok){ addError = data.error || "couldn't reach that address"; renderAddSheet(); return; }
      addTestResult = data;
      addStep = 1;
      renderAddSheet();
    } catch(e){
      addBusy = false; addError = "couldn't reach hush-control itself — is it running?";
      renderAddSheet();
    }
  }

  async function submitAdd(){
    addBusy = true; renderAddSheet();
    try {
      const r = await fetch("api/agents", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ name: addDraft.name, addr: addDraft.addr, role: addDraft.role })
      });
      if(!r.ok){
        addBusy = false; addError = await r.text() || "couldn't add that machine";
        addStep = 0; renderAddSheet(); return;
      }
      const added = await r.json();
      PENDING.push({ id: added.name || (addTestResult&&addTestResult.host) || added.addr, ip: added.ip });
      addBusy = false;
      addStep = 2;
      state.view = "fleet"; // so the pending card is visible behind the sheet
      renderAddSheet();
      render();
      poll(); // fetch fresh vitals now instead of waiting for the next interval tick
      // Drop the just-added machine from the discovery badge without waiting for
      // the next background scan.
      if(lastDiscover){
        lastDiscover.candidates = lastDiscover.candidates.filter(c => c.addr !== addDraft.addr);
        updateAddBadge();
      }
    } catch(e){
      addBusy = false; addError = "couldn't reach hush-control itself — is it running?";
      addStep = 0; renderAddSheet();
    }
  }

  // renderScanBlock draws the "Scan tailnet" control and, once a scan has run,
  // the list of discovered agents not yet in the fleet. Tapping one pre-fills
  // the form and runs the same test → add flow as a hand-typed address.
  function renderScanBlock(){
    const s = discoverState;
    if(s.loading){
      return `<div class="scan-block"><button class="btn ghost" disabled>Scanning tailnet…</button></div>`;
    }
    if(!s.ran){
      return `<div class="scan-block"><button class="btn ghost" id="scanBtn">⟲ Scan tailnet for agents</button></div>`;
    }
    if(!s.available){
      return `<div class="scan-block">
        <button class="btn ghost" id="scanBtn">⟲ Scan tailnet for agents</button>
        <div class="field-note">Tailnet scan needs hush-control running in tsnet mode. Enter the address by hand below.</div></div>`;
    }
    if(s.error){
      return `<div class="scan-block">
        <button class="btn ghost" id="scanBtn">⟲ Rescan tailnet</button>
        <div class="field-note err">${esc(s.error)}</div></div>`;
    }
    if(!s.candidates.length){
      return `<div class="scan-block">
        <button class="btn ghost" id="scanBtn">⟲ Rescan tailnet</button>
        <div class="field-note">No new hush-agents found — everything live on your tailnet is already in the fleet.</div></div>`;
    }
    const rows = s.candidates.map((c,i)=>`
      <button class="disc-row" data-i="${i}">
        <span class="gly">▦</span>
        <div class="disc-meta"><div class="pn">${esc(c.name||c.ip)}</div><div class="pm">${esc(c.ip)}${c.os?" · "+esc(c.os):""}</div></div>
        <span class="disc-add">Add →</span>
      </button>`).join("");
    return `<div class="scan-block">
      <div class="disc-list">${rows}</div>
      <button class="btn ghost" id="scanBtn">⟲ Rescan tailnet</button></div>`;
  }

  function attachScanHandlers(){
    const b = $("#scanBtn");
    if(b) b.addEventListener("click", ()=>scanTailnet(true)); // explicit scan → force fresh
    document.querySelectorAll(".disc-row").forEach(el=>{
      el.addEventListener("click", ()=>{
        const c = discoverState.candidates[+el.dataset.i];
        if(!c) return;
        addDraft.name = c.name || "";
        addDraft.addr = c.addr;
        addError = "";
        const inp = $("#fAddr"); if(inp) inp.value = c.addr;
        const nm = $("#fName"); if(nm) nm.value = c.name || "";
        submitTest(); // reuse the verify → add flow, exactly as a typed address
      });
    });
  }

  async function scanTailnet(fresh){
    discoverState.loading = true; discoverState.error = ""; renderAddSheet();
    try {
      const r = await fetch("api/discover" + (fresh ? "?rescan=1" : ""));
      const data = await r.json();
      discoverState = {
        ran:true, loading:false,
        available: !!data.available,
        error: data.error || "",
        candidates: Array.isArray(data.candidates) ? data.candidates : []
      };
      // keep the badge in sync with what the sheet just learned
      lastDiscover = { available: discoverState.available, candidates: discoverState.candidates };
      updateAddBadge();
    } catch(e){
      discoverState = { ran:true, loading:false, available:true, error:"couldn't reach hush-control — is it running?", candidates:[] };
    }
    renderAddSheet();
  }

  // pollDiscover refreshes the passive badge: how many agents are live on the
  // tailnet but not yet in the fleet. It reads the control plane's cached scan,
  // so it's cheap to call on an interval.
  async function pollDiscover(){
    try {
      const r = await fetch("api/discover");
      const data = await r.json();
      lastDiscover = {
        available: !!data.available,
        candidates: Array.isArray(data.candidates) ? data.candidates : []
      };
      updateAddBadge();
    } catch(e){ /* leave the last known badge in place */ }
  }

  function updateAddBadge(){
    const b = $("#addBadge");
    if(!b) return;
    const n = (lastDiscover && lastDiscover.available) ? lastDiscover.candidates.length : 0;
    if(n > 0){
      b.textContent = n;
      b.style.display = "";
      const btn = $("#addMachineBtn");
      if(btn) btn.title = n + " agent" + (n===1?"":"s") + " found on your tailnet, not yet added";
    } else {
      b.style.display = "none";
      const btn = $("#addMachineBtn");
      if(btn) btn.removeAttribute("title");
    }
  }

  $("#addMachineBtn").addEventListener("click", openAddSheet);
  addScrim.addEventListener("click", e=>{ if(e.target===addScrim) closeAddSheet(); });

  /* ---------- toast ---------- */
  let toastT;
  function toast(msg){
    const t = $("#toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove("show"), 2600);
  }

  /* ---------- version / update indicator ---------- */
  async function checkVersion(){
    const chip = $("#verChip");
    try {
      const r = await fetch("api/version", {cache:"no-store"});
      if(!r.ok) throw new Error("bad status");
      const v = await r.json();
      if(!v.current) throw new Error("no version");
      if(v.updateAvailable && v.latest){
        chip.className = "chip ver avail";
        chip.innerHTML = `<span class="up"></span>${v.current} → ${v.latest}`;
        chip.title = `A newer release (${v.latest}) is available. hush-control auto-updates on its timer; click to view the release.`;
      } else {
        chip.className = "chip ver";
        chip.innerHTML = v.current;
        chip.title = v.error ? `Update check failed: ${v.error}` : "Running the latest release.";
      }
      chip.hidden = false;
    } catch(e){
      chip.hidden = true; // no server-side version (demo / file://) — say nothing
    }
  }

  /* ---------- go ---------- */
  poll();
  setInterval(poll, 2500);
  checkVersion();
  setInterval(checkVersion, 15*60*1000);
  pollDiscover();
  setInterval(pollDiscover, 20000);
})();
</script>
</body>
</html>
