  }
  function jitterDemo(){
    M.forEach(m=>{
      const j = v => Math.max(2, Math.min(98, Math.round(v + (Math.random()-0.5)*(m.status==="warn"?7:4))));
      m.cpu = j(m.cpu); m.mem = Math.max(2,Math.min(98, m.mem + (((Math.random()-0.5)*2)|0)));
      if(m.gpu!=null){ m.gpu = j(m.gpu); m.vram = Math.max(2,Math.min(99, m.vram + (((Math.random()-0.5)*2)|0))); }
      m.loadHist = m.loadHist.slice(1).concat([m.cpu]);
      m.netRx = Math.max(0, Math.round(m.netRx + (Math.random()-0.5)*Math.max(2000,m.netRx*0.5)));
      m.netTx = Math.max(0, Math.round(m.netTx + (Math.random()-0.5)*Math.max(1000,m.netTx*0.5)));
      m.netRxHist = m.netRxHist.slice(1).concat([m.netRx]);
      m.netTxHist = m.netTxHist.slice(1).concat([m.netTx]);
    });
  }

  /* ---------- Backups: the restic construct, defined on the agent ----------
     A Backup is "a Job that hauls a Machine into a Store, dedup'd": a saved set
     of paths this box sends into a restic repository, encrypted and dedup'd. The
     definition (and its repo key) live on the agent — the box that holds the
     data holds the key — so, like Jobs, the console is a thin client over
     hush-control's pass-through proxy: GET/POST /api/machines/{id}/backups,
     DELETE .../{bid}, POST .../{bid}/run (streamed to the run terminal), and
     GET .../{bid}/snapshots. A box whose agent was started without -backup
     answers 403, surfaced as "backups disabled". */
  const backupScrim = $("#backupScrim");
  const backupBody = $("#backupSheetBody");

  // BACKUP_FREQ maps a plain-English cadence to the cron spec the agent runs
  // on. Time Machine never asks anyone for a crontab, so neither do we —
  // "Custom…" is the escape hatch for the one operator who wants one.
  const BACKUP_FREQ = {
    hourly: { label:"Every hour",              cron:"0 * * * *" },
    daily:  { label:"Every day, 3am",          cron:"0 3 * * *" },
    weekly: { label:"Every week (Sun, 3am)",   cron:"0 3 * * 0" },
    manual: { label:"Manual only",             cron:"" },
    custom: { label:"Custom…",                 cron:null },
  };

  // genBackupPassword mints a random repo key so nobody has to invent one —
  // the same "just turn it on" move Time Machine makes with FileVault. 192
  // bits of entropy, base64url so it's easy to select and copy.
  function genBackupPassword(){
    const b = new Uint8Array(24);
    crypto.getRandomValues(b);
    let s = ""; for(const x of b) s += String.fromCharCode(x);
    return btoa(s).replace(/[+/=]/g, c => ({"+":"-","/":"_","=":""}[c]));
  }

  // vaultsFor lists the fleet's detected backup vaults a machine could send to,
  // the console's stand-in for Time Machine's "choose a disk" list.
  function vaultsFor(machineId){
    return M.filter(x=>x.backup&&x.backup.vault&&x.ip&&x.id!==machineId);
  }

  function freshBackupDraft(id){
    return {
      id, name:"", paths:"", excludes:"",
      dest:"", repo:"", password: genBackupPassword(), passReveal:false,
      whole:true, oneFileSystem:true, advOpen:false,
      freq:"daily", schedule: BACKUP_FREQ.daily.cron,
    };
  }

  // computeBackupRepo derives the repo URL from the chosen vault + backup name
  // (rest:http://<vault-ip>:8000/<name>, one sub-repo per source machine so
  // they don't collide) — a no-op when the operator picked "Custom repository".
  function computeBackupRepo(){
    if(!backupDraft || backupDraft.dest === "custom") return;
    const ip = backupDraft.dest.slice("vault:".length);
    const sub = (backupDraft.name||backupDraft.id||"repo").trim().replace(/[^a-zA-Z0-9._-]/g,"-");
    backupDraft.repo = `rest:http://${ip}:8000/${sub}`;
  }

  let backupDraft = null;

  // loadBackups pulls one box's backups into the BACKUPS cache and re-renders if
  // we're still looking at it. A 403 means the agent has backups disabled;
  // anything else unreachable leaves the cache untouched so a blip doesn't wipe it.
  async function loadBackups(id){
    if(MODE === "demo" || backupsLoading.has(id)) return;
    backupsLoading.add(id);
    try {
      const r = await fetch(`api/machines/${encodeURIComponent(id)}/backups`, {cache:"no-store"});
      if(r.status === 403){ BACKUPS_OFF.add(id); BACKUPS[id] = []; }
      else if(r.ok){
        BACKUPS_OFF.delete(id);
        const list = await r.json();
        BACKUPS[id] = Array.isArray(list) ? list : [];
      } else return;
      const m = byId(id); if(m) m.backups = BACKUPS[id];
      if(state.view === "machine" && state.mid === id) render();
    } catch(e){ /* transient — keep whatever we had */ }
    finally { backupsLoading.delete(id); }
  }

  function closeBackupSheet(){ backupScrim.classList.remove("open"); }
  backupScrim.addEventListener("click", e=>{ if(e.target===backupScrim) closeBackupSheet(); });

  function openBackupSheet(preId){
    const online = M.filter(m=>m.online);
    if(preId && BACKUPS_OFF.has(preId)){ toast("backups are disabled on that box — start its agent with -backup"); return; }
    backupDraft = freshBackupDraft(preId || (online[0] && online[0].id) || null);
    renderBackupSheet();
    backupScrim.classList.add("open");
  }

  // renderBackupSheet draws the Time-Machine-style flow: pick a machine, pick a
  // destination (a detected vault, pre-filled — or a raw repository for anyone
  // who has one already), an auto-generated key, and a plain-English cadence.
  // "Whole machine" is the default, same as Time Machine backing up everything
  // on the disk; choosing specific folders is one tap away, not the starting
  // point. Naming and a custom repository URL live under Advanced.
  function renderBackupSheet(){
    const online = M.filter(m=>m.online);
    if(!online.length){
      backupBody.innerHTML = `<h3>Configure a backup</h3>
        <p class="sd">restic snapshots of the paths you name, into a Store</p>
        <div class="field-note">No machines are online to back up.</div>
        <div class="sheet-actions"><button class="btn primary" id="bClose" style="flex:1">Close</button></div>`;
      $("#bClose").addEventListener("click", closeBackupSheet);
      return;
    }
    if(!backupDraft || !online.some(m=>m.id===backupDraft.id)) backupDraft = freshBackupDraft(online[0].id);
    if(!backupDraft.name) backupDraft.name = `${backupDraft.id}-backup`;
    const vaults = vaultsFor(backupDraft.id);
    if(!backupDraft.dest) backupDraft.dest = vaults.length ? `vault:${vaults[0].ip}` : "custom";
    if(backupDraft.dest !== "custom" && !vaults.some(v=>`vault:${v.ip}`===backupDraft.dest)){
      backupDraft.dest = vaults.length ? `vault:${vaults[0].ip}` : "custom";
    }
    computeBackupRepo();

    const mOpts = online.map(m=>`<option value="${esc(m.id)}"${m.id===backupDraft.id?" selected":""}>${esc(m.id)}${m.os?` · ${esc(m.os)}`:""}</option>`).join("");
    const destOpts = vaults.map(v=>`<option value="vault:${esc(v.ip)}"${backupDraft.dest===`vault:${v.ip}`?" selected":""}>${esc(v.id)} (vault)</option>`)
      .concat(`<option value="custom"${backupDraft.dest==="custom"?" selected":""}>Custom repository…</option>`).join("");
    const freqOpts = Object.entries(BACKUP_FREQ).map(([k,f])=>`<option value="${k}"${backupDraft.freq===k?" selected":""}>${esc(f.label)}</option>`).join("");

    backupBody.innerHTML = `
      <h3>Configure a backup</h3>
      <p class="sd">pick a machine and a destination — restic snapshots it, encrypted and dedup'd, on the schedule you set</p>
      <div class="field">
        <label>Machine</label>
        <select id="bMachine">${mOpts}</select>
      </div>
      <div class="field">
        <label>Back up to</label>
        ${vaults.length ? `<select id="bDest">${destOpts}</select>`
          : `<div class="hint">no vault detected on your fleet yet — enter a repository below, or <a id="bSetupVault" style="cursor:pointer;color:var(--accent)">set one up</a></div>`}
      </div>
      ${backupDraft.dest === "custom" ? `
      <div class="field">
        <label>Repository</label>
        <input type="text" id="bRepo" placeholder="e.g. rest:http://nas:8000/homelab" autocapitalize="off" autocorrect="off" spellcheck="false" value="${esc(backupDraft.repo)}">
        <div class="hint">a restic backend — a <b>rest-server</b> URL, an <b>sftp:</b> target, or a local path</div>
      </div>` : `
      <div class="hint" style="margin:-9px 0 14px 2px">→ <span class="mono" id="bRepoPreview">${esc(backupDraft.repo)}</span></div>`}
      <div class="field">
        <label>Encryption key</label>
        <div style="display:flex;gap:6px">
          <input type="${backupDraft.passReveal?"text":"password"}" id="bPass" autocapitalize="off" autocorrect="off" spellcheck="false" value="${esc(backupDraft.password)}" style="flex:1">
          <button type="button" class="btn ghost" id="bPassEye" title="${backupDraft.passReveal?"Hide":"Show"}" style="padding:0 12px">${backupDraft.passReveal?"hide":"show"}</button>
          <button type="button" class="btn ghost" id="bPassCopy" title="Copy" style="padding:0 12px">copy</button>
        </div>
        <div class="hint">auto-generated, stored on <b>${esc(backupDraft.id)}</b> only — the console never sees it. <b>Save a copy</b>: it's the only key that unlocks this backup.</div>
      </div>
      <div class="field">
        <label>Frequency</label>
        <select id="bFreq">${freqOpts}</select>
        ${backupDraft.freq==="custom" ? `
        <input type="text" id="bSched" style="margin-top:8px" placeholder="e.g. 0 3 * * *  (or @daily)" autocapitalize="off" autocorrect="off" spellcheck="false" value="${esc(backupDraft.schedule)}">
        <div class="hint">5-field cron, or a macro like <b>@daily</b></div>` : ``}
      </div>
      <label class="field" style="flex-direction:row;align-items:center;gap:.5rem;cursor:pointer">
        <input type="checkbox" id="bWhole" style="width:auto"${backupDraft.whole?" checked":""}>
        <span>Back up the whole machine <span style="opacity:.6">(everything under /, not crossing mount points)</span></span>
      </label>
      ${!backupDraft.whole ? `
      <div class="field">
        <label>Paths</label>
        <textarea id="bPaths" rows="3" placeholder="/etc&#10;/home/josh" autocapitalize="off" autocorrect="off" spellcheck="false">${esc(backupDraft.paths)}</textarea>
        <div class="hint" style="display:flex;align-items:center;gap:8px;justify-content:space-between">
          <span>one absolute path per line</span>
          <button type="button" class="btn ghost" id="bPick" style="padding:3px 9px">▦ Pick from disk usage</button>
        </div>
      </div>
      <div class="field">
        <label>Excludes <span style="opacity:.6">(optional)</span></label>
        <textarea id="bEx" rows="2" placeholder="*.tmp&#10;/home/josh/.cache" autocapitalize="off" autocorrect="off" spellcheck="false">${esc(backupDraft.excludes)}</textarea>
        <div class="hint">one restic <b>--exclude</b> pattern per line</div>
      </div>
      <label class="field" style="flex-direction:row;align-items:center;gap:.5rem;cursor:pointer">
        <input type="checkbox" id="bOFS" style="width:auto"${backupDraft.oneFileSystem?" checked":""}>
        <span>Don't cross mount points (<b>--one-file-system</b>)</span>
      </label>` : ``}
      <details class="rollup"${backupDraft.advOpen?" open":""}>
        <summary class="sec-title">Advanced</summary>
        <div class="field" style="margin-top:8px">
          <label>Name</label>
          <input type="text" id="bName" placeholder="e.g. debian-root" autocapitalize="off" autocorrect="off" spellcheck="false" value="${esc(backupDraft.name)}">
        </div>
      </details>
      <div class="field-note">
        <b>Heads up —</b> creating this initialises the repo and verifies the key against it, so a bad address or key fails now, not at 3am.
      </div>
      <div class="sheet-actions">
        <button class="btn ghost" id="bCancel">Cancel</button>
        <button class="btn primary" id="bSave">⭯ Create</button>
      </div>`;

    $("#bMachine").addEventListener("change", e=>{
      const oldId = backupDraft.id, newId = e.target.value;
      if(backupDraft.name === `${oldId}-backup`) backupDraft.name = `${newId}-backup`;
      backupDraft.id = newId;
      backupDraft.dest = "";
      renderBackupSheet();
    });
    const destSel = $("#bDest");
    if(destSel) destSel.addEventListener("change", e=>{ backupDraft.dest = e.target.value; renderBackupSheet(); });
    const setupLink = $("#bSetupVault");
    if(setupLink) setupLink.addEventListener("click", ()=>{ const m = byId(backupDraft.id); if(m) openBackupSetupSheet(m); });
    const repoInput = $("#bRepo");
    if(repoInput) repoInput.addEventListener("input", e=>{ backupDraft.repo = e.target.value; });
    $("#bPass").addEventListener("input", e=>{ backupDraft.password = e.target.value; });
    $("#bPassEye").addEventListener("click", ()=>{ backupDraft.passReveal = !backupDraft.passReveal; renderBackupSheet(); });
    $("#bPassCopy").addEventListener("click", async ()=>{
      try { await navigator.clipboard.writeText(backupDraft.password); toast("copied — keep it somewhere safe"); }
      catch(e){ toast("couldn't copy"); }
    });
    $("#bFreq").addEventListener("change", e=>{
      backupDraft.freq = e.target.value;
      const f = BACKUP_FREQ[backupDraft.freq];
      if(f.cron !== null) backupDraft.schedule = f.cron;
      renderBackupSheet();
    });
    const schedInput = $("#bSched");
    if(schedInput) schedInput.addEventListener("input", e=>{ backupDraft.schedule = e.target.value; });
    $("#bWhole").addEventListener("change", e=>{
      backupDraft.whole = e.target.checked;
      backupDraft.oneFileSystem = backupDraft.whole;
      renderBackupSheet();
    });
    const pathsTa = $("#bPaths");
    if(pathsTa) pathsTa.addEventListener("input", e=>{ backupDraft.paths = e.target.value; });
    const exTa = $("#bEx");
    if(exTa) exTa.addEventListener("input", e=>{ backupDraft.excludes = e.target.value; });
    const ofsBox = $("#bOFS");
    if(ofsBox) ofsBox.addEventListener("change", e=>{ backupDraft.oneFileSystem = e.target.checked; });
    const pickBtn = $("#bPick");
    if(pickBtn) pickBtn.addEventListener("click", ()=>{
      if(!backupDraft.id){ toast("pick a machine first"); return; }
      // Reuse the disk-usage treemap as a path picker: the current paths seed the
      // selection, and Add writes the chosen absolute paths back into the field.
      openDu(backupDraft.id, "/", { select:true, initial: lines(backupDraft.paths), onDone: paths => {
        backupDraft.paths = paths.join("\n");
        const ta = $("#bPaths"); if(ta) ta.value = backupDraft.paths;
      }});
    });
    $("#bName").addEventListener("input", e=>{
      backupDraft.name = e.target.value;
      if(backupDraft.dest !== "custom"){
        computeBackupRepo();
        const prev = $("#bRepoPreview"); if(prev) prev.textContent = backupDraft.repo;
      }
    });
    const advEl = backupBody.querySelector("details.rollup");
    if(advEl) advEl.addEventListener("toggle", ()=>{ backupDraft.advOpen = advEl.open; });
    $("#bCancel").addEventListener("click", closeBackupSheet);
    $("#bSave").addEventListener("click", createBackup);
  }

  // lines splits a textarea into trimmed, non-empty lines — the shape the paths
  // and excludes fields feed the API.
  function lines(s){ return (s||"").split("\n").map(x=>x.trim()).filter(Boolean); }

  async function createBackup(){
    const id = backupDraft.id;
    const name = (backupDraft.name||"").trim() || `${id}-backup`;
    const repo = (backupDraft.repo||"").trim();
    const password = backupDraft.password||"";
    const paths = backupDraft.whole ? ["/"] : lines(backupDraft.paths);
    const excludes = backupDraft.whole ? [] : lines(backupDraft.excludes);
    const oneFileSystem = !!backupDraft.oneFileSystem;
    const schedule = (backupDraft.freq === "custom" ? (backupDraft.schedule||"") : (BACKUP_FREQ[backupDraft.freq]||{}).cron||"").trim();
    if(!id) return;
    if(!repo){ const ri=$("#bRepo"); if(ri) ri.focus(); toast("add a repository"); return; }
    if(!password){ $("#bPass").focus(); toast("add an encryption key"); return; }
    if(!paths.length){ toast("add at least one path"); return; }
    if(MODE === "demo"){
      const m = byId(id); if(m){ (m.backups = m.backups || []).push({ id:"bk-"+Math.random().toString(36).slice(2,8), name, repo, paths, oneFileSystem, schedule, status:{} }); }
      closeBackupSheet(); render(); toast("configured (demo)"); return;
    }
    const btn = $("#bSave"); btn.disabled = true; btn.textContent = "Creating…";
    try {
      const r = await fetch(`api/machines/${encodeURIComponent(id)}/backups`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ name, repo, password, paths, excludes, oneFileSystem, schedule }) });
      if(r.status === 403){ BACKUPS_OFF.add(id); throw new Error("backups are disabled on that box — start its agent with -backup"); }
      if(!r.ok){ const t = await r.text().catch(()=> ""); throw new Error((t||"").trim() || ("error "+r.status)); }
      await loadBackups(id);
      closeBackupSheet(); render();
      toast("backup configured");
    } catch(err){
      btn.disabled = false; btn.textContent = "⭯ Create";
      toast((err&&err.message) ? err.message : "couldn't configure");
    }
  }

  async function deleteBackup(mid, bid, name){
    if(!confirm(`Delete backup "${name||bid}"? Its definition is forgotten — the repo's snapshots are left untouched.`)) return;
    if(MODE === "demo"){
      const m = byId(mid); if(m && m.backups){ const i = m.backups.findIndex(b=>(b.id||b.name)===bid); if(i>=0) m.backups.splice(i,1); }
      render(); return;
    }
    try {
      const r = await fetch(`api/machines/${encodeURIComponent(mid)}/backups/${encodeURIComponent(bid)}`, { method:"DELETE" });
      if(!r.ok && r.status!==204) throw new Error("error "+r.status);
    } catch(e){ toast("couldn't delete"); }
    await loadBackups(mid); render();
  }

  // runBackup streams a run into the run terminal overlay, then refreshes the
  // box's backups so the row's last-run status updates.
  function runBackup(mid, bid){
    const b = (BACKUPS[mid]||[]).find(x=>(x.id||x.name)===bid) || (byId(mid)?.backups||[]).find(x=>(x.id||x.name)===bid);
    const label = `restic backup · ${b ? (b.name||bid) : bid}`;
    if(MODE === "demo"){ openRunView(mid, label, { canSave:false }); return; }
    openRunView(mid, label, {
      runUrl: `api/machines/${encodeURIComponent(mid)}/backups/${encodeURIComponent(bid)}/run`,
      canSave: false,
      onClose: ()=> loadBackups(mid),
    });
    // The run view doesn't call back on close in every path, so also refresh
    // shortly after kickoff to catch the "running" → "ok" transition.
    setTimeout(()=> loadBackups(mid), 1500);
  }

  async function openSnapshots(mid, bid, name){
    let snaps;
    if(MODE === "demo"){
      snaps = demoSnapshots(mid, bid);
    } else {
      toast("loading snapshots…");
      try {
        const r = await fetch(`api/machines/${encodeURIComponent(mid)}/backups/${encodeURIComponent(bid)}/snapshots`, {cache:"no-store"});
        if(!r.ok){ const t = await r.text().catch(()=> ""); throw new Error((t||"").trim() || ("error "+r.status)); }
        snaps = await r.json();
      } catch(err){ toast((err&&err.message) ? err.message : "couldn't load snapshots"); return; }
    }
    const rows = (Array.isArray(snaps)?snaps:[]).slice().reverse().map(s=>{
      const sid = esc(s.short_id||s.id||"");
      return `<div class="row" data-bbrowse="${sid}" style="cursor:pointer" title="Browse this snapshot's files">
        <span class="gly">⭯</span>
        <span class="nm mono">${sid}</span>
        <span class="rt">${esc((s.paths||[]).join(", "))}</span>
        <span class="state ok"><span class="sd"></span>${esc(relTimeISO(s.time)||s.time||"")}</span>
        <button class="jrm" data-brestore="${sid}" title="Restore this snapshot" aria-label="Restore this snapshot" style="color:var(--accent)">⤓</button>
      </div>`;}).join("");
    backupBody.innerHTML = `
      <h3>Snapshots · ${esc(name||bid)}</h3>
      <p class="sd">what restic holds for this backup, newest first · tap to browse, ⤓ restores one</p>
      <div class="list">${rows || `<div class="empty">no snapshots yet — run the backup to make the first one</div>`}</div>
      <div class="sheet-actions"><button class="btn primary" id="bSnapClose" style="flex:1">Close</button></div>`;
    $("#bSnapClose").addEventListener("click", closeBackupSheet);
    backupBody.querySelectorAll("[data-bbrowse]").forEach(el=>{
      el.addEventListener("click", e=>{
        if(e.target.closest("[data-brestore]")) return; // the ⤓ button owns its click
        openSnapshotBrowse(mid, bid, name, el.dataset.bbrowse, "/");
      });
    });
    backupBody.querySelectorAll("[data-brestore]").forEach(el=>{
      el.addEventListener("click", e=>{ e.stopPropagation(); openRestore(mid, bid, name, el.dataset.brestore); });
    });
    backupScrim.classList.add("open");
  }

  // openSnapshotBrowse walks one directory level inside a snapshot — the restore-
  // confidence feature. It reads the agent's /backups/{id}/snapshots/{snap}/ls
  // (proxied by hush-control), which is read-only: a snapshot is immutable, so
  // confirming your files are really in there can never harm the backup. Browsing
  // is lazy, one directory at a time, exactly like the live filesystem Store.
  async function openSnapshotBrowse(mid, bid, name, snap, path){
    const clean = path && path !== "/" ? path : "/";
    let data;
    if(MODE === "demo"){
      data = { path: clean, entries: demoSnapshotLS(mid, bid, snap, clean), truncated: false };
    } else {
      toast("reading snapshot…");
      try {
        const q = clean === "/" ? "" : `?path=${encodeURIComponent(clean)}`;
        const r = await fetch(`api/machines/${encodeURIComponent(mid)}/backups/${encodeURIComponent(bid)}/snapshots/${encodeURIComponent(snap)}/ls${q}`, {cache:"no-store"});
        if(!r.ok){ const t = await r.text().catch(()=> ""); throw new Error((t||"").trim() || ("error "+r.status)); }
        data = await r.json();
      } catch(err){ toast((err&&err.message) ? err.message : "couldn't read snapshot"); return; }
    }
    const entries = Array.isArray(data.entries) ? data.entries : [];
    const cur = data.path || clean;
    const parts = cur.split("/").filter(Boolean);
    const parent = cur === "/" ? null : (parts.length <= 1 ? "/" : "/" + parts.slice(0,-1).join("/"));
    const rows = entries.map(e=>{
      const isDir = e.type === "dir";
      const child = (cur === "/" ? "" : cur) + "/" + e.name;
      const meta = e.type === "symlink" ? `→ ${esc(e.target||"")}` : (isDir ? "" : fmtBytes(e.size||0));
      const gly = isDir ? "▸" : (e.type === "symlink" ? "↳" : "·");
      return `<div class="row"${isDir?` data-snapdir="${esc(child)}" style="cursor:pointer"`:` style="cursor:default"`}>
        <span class="gly">${gly}</span><span class="nm${isDir?"":" mono"}">${esc(e.name)}</span>
        <span class="rt">${meta}</span></div>`;
    }).join("");
    // Clickable breadcrumb: root, then each segment up to the current directory.
    let acc = "";
    const crumbSegs = [`<a data-snapcrumb="/">snapshot</a>`].concat(parts.map(seg=>{
      acc += "/" + seg;
      return `<span class="sep">/</span><a data-snapcrumb="${esc(acc)}">${esc(seg)}</a>`;
    }));
    backupBody.innerHTML = `
      <h3>Snapshot <span class="mono">${esc(snap)}</span></h3>
      <p class="sd">browsing what this snapshot holds — read-only, so you can confirm your files are really in here</p>
      <div class="crumbs snapcrumb">${crumbSegs.join("")}</div>
      <div class="list">${rows || `<div class="empty">this directory is empty in the snapshot</div>`}</div>
      ${data.truncated ? `<div class="empty">partial listing — more entries than shown</div>` : ""}
      <div class="sheet-actions">
        <button class="btn ghost" id="snapUp"${parent==null?" disabled":""}>↑ Up</button>
        <button class="btn" id="snapToList">← Snapshots</button>
      </div>`;
    backupBody.querySelectorAll("[data-snapdir]").forEach(el=>{
      el.addEventListener("click", ()=> openSnapshotBrowse(mid, bid, name, snap, el.dataset.snapdir));
    });
    backupBody.querySelectorAll("[data-snapcrumb]").forEach(el=>{
      el.addEventListener("click", ()=> openSnapshotBrowse(mid, bid, name, snap, el.dataset.snapcrumb));
    });
    if(parent!=null) $("#snapUp").addEventListener("click", ()=> openSnapshotBrowse(mid, bid, name, snap, parent));
    $("#snapToList").addEventListener("click", ()=> openSnapshots(mid, bid, name));
    backupScrim.classList.add("open");
  }

  // demoSnapshots fabricates a believable snapshot history for MODE="demo" from a
  // backup's paths, so the snapshot browser (the flagship restore-confidence
  // feature) is reachable without a live repo behind it — oldest first, the order
  // openSnapshots reverses to show newest at the top.
  function demoSnapshots(mid, bid){
    const h = hostBackupEntry(mid);
    const bks = (h && h.backups) || [];
    const lead = bks.find(b=>b.id===bid) || bks[0] || {};
    const paths = (lead.paths && lead.paths.length) ? lead.paths : ["/"];
    const rand = mulberry32(hashStr(mid+"::"+bid));
    const out = [];
    for(let i=6;i>=0;i--){
      const idhex = Math.floor(rand()*0xffffffff).toString(16).padStart(8,"0");
      out.push({ id:idhex+"cafe", short_id:idhex, time:new Date(Date.now()-(6+i*24)*3600e3).toISOString(), paths });
    }
    return out;
  }

  // demoSnapshotLS synthesises one directory level of a snapshot's tree, reusing
  // the same seeded generator the disk-usage treemap uses so a demo walk is
  // stable and believable. The root level is the backup's named roots.
  function demoSnapshotLS(mid, bid, snap, path){
    const clean = path && path !== "" ? path : "/";
    if(clean === "/"){
      const h = hostBackupEntry(mid);
      const bks = (h && h.backups) || [];
      const lead = bks.find(b=>b.id===bid) || bks[0] || {};
      const roots = (lead.paths && lead.paths.length) ? lead.paths : ["/"];
      const names = new Set();
      roots.forEach(p=>{ const seg = p.split("/").filter(Boolean); if(seg.length) names.add(seg[0]); });
      if(!names.size){ ["etc","home","srv","usr","var"].forEach(n=>names.add(n)); }
      return [...names].map(n=>({ name:n, type:"dir", path:"/"+n }));
    }
    const depth = clean.split("/").filter(Boolean).length;
    return synthDuEntries(mid+"::"+snap+"::"+clean, depth).map(e=>({
      name: e.name,
      type: e.isDir ? "dir" : "file",
      size: e.size,
      path: (clean === "/" ? "" : clean) + "/" + e.name,
    }));
  }

  // openRestore renders a small form to restore one snapshot. It restores INTO a
  // target directory (defaulting to a scratch path, never the original location)
  // so "see what's in this snapshot" can't clobber the live files by accident —
  // the operator opts into an in-place restore by typing that path themselves.
  function openRestore(mid, bid, name, snap){
    const target = `/var/tmp/hush-restore/${snap}`;
    backupBody.innerHTML = `
      <h3>Restore · ${esc(snap)}</h3>
      <p class="sd">from ${esc(name||bid)} — restic writes the snapshot's files into a target folder</p>
      <div class="field">
        <label>Restore into</label>
        <input type="text" id="rTarget" value="${esc(target)}" autocapitalize="off" autocorrect="off" spellcheck="false">
        <div class="hint">an absolute path on <b>${esc(mid)}</b> — defaults to a scratch dir so it won't overwrite the originals</div>
      </div>
      <div class="field-note">
        <b>Careful —</b> restoring into a live path (e.g. <b>/</b>) overwrites whatever's there. The default scratch dir is safe to inspect first.
      </div>
      <div class="sheet-actions">
        <button class="btn ghost" id="rCancel">Back</button>
        <button class="btn primary" id="rGo">⤓ Restore</button>
      </div>`;
    $("#rCancel").addEventListener("click", ()=> openSnapshots(mid, bid, name));
    $("#rGo").addEventListener("click", ()=>{
      const t = ($("#rTarget").value||"").trim();
      if(!t.startsWith("/")){ $("#rTarget").focus(); toast("target must be an absolute path"); return; }
      closeBackupSheet();
      openRunView(mid, `restic restore ${snap} → ${t}`, {
        runUrl: `api/machines/${encodeURIComponent(mid)}/backups/${encodeURIComponent(bid)}/restore`,
        payload: { snapshot: snap, target: t },
        canSave: false,
      });
    });
    backupScrim.classList.add("open");
  }

  /* ---------- Backups: generate the paste-over-SSH setup command ----------
     hush-control never touches the box — it generates the exact
     idempotent root command from what the agent advertises in /vitals (restic
     present? -backup on? a rest-server binary for a vault?) plus the box's OS
     (to pick the package manager). You paste it over SSH; re-pasting converges. */
  function pkgInstallRestic(os){
    os = (os||"").toLowerCase();
    if(/debian|ubuntu|mint|raspbian|pop|kali|devuan/.test(os)) return "sudo apt-get update && sudo apt-get install -y restic";
    if(/arch|manjaro|endeavour|garuda/.test(os)) return "sudo pacman -S --needed --noconfirm restic";
    if(/fedora|rhel|red hat|centos|rocky|alma|nobara/.test(os)) return "sudo dnf install -y restic";
    if(/opensuse|suse/.test(os)) return "sudo zypper --non-interactive install restic";
    if(/alpine/.test(os)) return "sudo apk add restic";
    if(/nixos/.test(os)) return "# NixOS: add pkgs.restic to environment.systemPackages, then: sudo nixos-rebuild switch";
    if(/steamos/.test(os)) return "# SteamOS: sudo steamos-readonly disable && sudo pacman -S restic  (or use the static binary from restic.net)";
    return "# install restic via your package manager, or grab the static binary from https://github.com/restic/restic/releases";
  }

  // genBackupSetupScript builds the idempotent setup command for one box. It adds
  // only the steps that are actually missing, so a re-run is a near no-op, and
  // ends with a hush-agent restart when anything the agent must re-read changed.
  //
  // Each step is emitted as a single &&-chained command rather than several
  // bare lines. A multi-line paste into a terminal can silently drop its last
  // line (no trailing newline to submit it), which used to mean a step like
  // the tee onto agent.env never ran while the restart right after it did —
  // "success" with nothing actually changed. Chaining collapses that failure
  // mode to "the whole step visibly didn't run", and the trailing restart is
  // always && -appended onto the last real command instead of sitting alone.
  function genBackupSetupScript(m, wantVault){
    const cap = m.backup || {};
    const ip = m.ip || "<this-box-tailnet-ip>";
    const L = [`# hush backups — set up ${m.id}`];
    let needRestart = false;
    let lastCmdIdx = -1;
    const pushCmd = (line) => { L.push(line); if(!line.trimStart().startsWith("#")) lastCmdIdx = L.length - 1; };
    if(!cap.restic){
      L.push("# 1) restic — the tool that does the backing up");
      pushCmd(pkgInstallRestic(m.os));
      needRestart = true;
    }
    if(!cap.enabled){
      L.push("# " + (cap.restic?"1":"2") + ") enable the Backup capability on this box's agent");
      pushCmd("sudo mkdir -p /etc/hush && sudo touch /etc/hush/agent.env && sudo sed -i '/^HUSH_AGENT_BACKUP=/d' /etc/hush/agent.env && echo 'HUSH_AGENT_BACKUP=1' | sudo tee -a /etc/hush/agent.env >/dev/null");
      needRestart = true;
    }
    if(wantVault){
      L.push("# vault — a rest-server that stores other machines' backups, tailnet-only + append-only");
      pushCmd("sudo useradd -r -s /usr/sbin/nologin restic 2>/dev/null; sudo mkdir -p /srv/restic && sudo chown restic /srv/restic");
      L.push("# fetch rest-server (bump the version/arch if needed)");
      pushCmd("curl -fsSL https://github.com/restic/rest-server/releases/download/v0.13.0/rest-server_0.13.0_linux_amd64.tar.gz -o /tmp/rs.tgz && sudo tar -xzf /tmp/rs.tgz -C /tmp && sudo install /tmp/rest-server_*/rest-server /usr/local/bin/rest-server");
      pushCmd(`sudo tee /etc/systemd/system/rest-server.service >/dev/null <<'UNIT'
[Unit]
Description=restic REST server (hush vault)
After=network-online.target
Wants=network-online.target
[Service]
User=restic
ExecStart=/usr/local/bin/rest-server --path /srv/restic --listen ${ip}:8000 --append-only --no-auth
Restart=on-failure
[Install]
WantedBy=multi-user.target
UNIT`);
      pushCmd("sudo systemctl daemon-reload && sudo systemctl enable --now rest-server");
      L.push(`# other machines back up here with repository:  rest:http://${ip}:8000/<name>`);
      // The agent detects a vault (rest-server on PATH) once at startup and
      // advertises it in /vitals, so standing one up only shows in the console
      // after the agent restarts and re-detects. Without this, a box that already
      // had restic + -backup on would host a vault that /vitals never reports —
      // the console keeps saying "no vault detected on your fleet".
      needRestart = true;
    }
    if(needRestart){
      if(lastCmdIdx >= 0) L[lastCmdIdx] += " && sudo systemctl restart hush-agent";
      else L.push("sudo systemctl restart hush-agent");
    }
    if(L.length === 1) L.push("# already set up — nothing to do 🎉");
    return L.join("\n");
  }

  // openBackupSetupSheet shows a box's detected backup state and the generated
  // command, with a toggle to also stand up a vault. Reuses the backup scrim.
  function openBackupSetupSheet(m){
    const cap = m.backup || {};
    let wantVault = false, cmd = "";
    const dot = (ok,label)=> `<span style="white-space:nowrap;color:${ok?'var(--accent)':'var(--faint)'}">${ok?'✓':'○'} ${esc(label)}</span>`;
    const render = ()=>{ cmd = genBackupSetupScript(m, wantVault); const c = $("#bsCmd"); if(c) c.textContent = cmd; };
    backupBody.innerHTML = `
      <h3>Set up backups · ${esc(m.id)}</h3>
      <p class="sd">hush-control never touches the box — run this on <b>${esc(m.id)}</b> over SSH.</p>
      <div class="field-note" style="display:flex;gap:16px;flex-wrap:wrap">
        ${dot(!!cap.restic, cap.restic ? `restic ${esc(cap.restic.replace(/^restic\s*/,'').split(' ')[0])}` : "restic missing")}
        ${dot(!!cap.enabled, cap.enabled ? "-backup on" : "-backup off")}
        ${dot(!!cap.vault, cap.vault ? "vault present" : "no vault")}
      </div>
      <label class="field" style="flex-direction:row;align-items:center;gap:.5rem;cursor:pointer">
        <input type="checkbox" id="bsVault" style="width:auto"${cap.vault?" disabled":""}>
        <span>Also host a <b>vault</b> here — a rest-server that stores other machines' backups${cap.vault?" <span style='opacity:.6'>(already present)</span>":""}</span>
      </label>
      <div class="cmdbox"><code id="bsCmd"></code><button class="btn" id="bsCopy">Copy</button></div>
      <div class="field-note">Idempotent — safe to re-paste. Installs restic, enables <b>-backup</b>, optionally stands up an append-only tailnet vault, then restarts the agent so it re-detects.</div>
      <div class="sheet-actions"><button class="btn primary" id="bsDone" style="flex:1">Done</button></div>`;
    const v = $("#bsVault"); if(v) v.addEventListener("change", e=>{ wantVault = e.target.checked; render(); });
    $("#bsCopy").addEventListener("click", async ()=>{
      try { await navigator.clipboard.writeText(cmd); toast("copied to clipboard"); }
      catch(e){ toast("couldn't copy — select and copy manually"); }
    });
    $("#bsDone").addEventListener("click", closeBackupSheet);
    render();
    backupScrim.classList.add("open");
  }

  /* ---------- Backups: key escrow ----------
     A restic repo key lives only in the agent's 0700 state dir on the box it
     backs up — the "the key stays on the box" rule hush-control leans on so the
     control plane can never leak it. The flip side is a circular risk: if the box
     dies, its disk took the sole copy of the key with it, and the snapshots it
     wrote are encrypted with that key. Escrow closes that gap WITHOUT undoing the
     rule: the operator runs `hush-agent -export-keys` over their own SSH session
     to print the keys and stash them off-box, so the secret still never transits
     hush-control or the phone. */

  // Escrow status is a local, per-browser note that a box's repo keys have been
  // saved off-box. It is deliberately NOT sent to hush-control: the control plane
  // never holds keys and shouldn't hold claims about them either. Only a timestamp
  // per machine id is stored — never a key. localStorage can throw (private mode,
  // storage disabled), so every access is guarded and degrades to "not escrowed".
  const ESCROW_LS_KEY = "hush.escrowed";
  function escrowMap(){ try { return JSON.parse(localStorage.getItem(ESCROW_LS_KEY)||"{}")||{}; } catch(e){ return {}; } }
  function escrowedAt(id){ return escrowMap()[id]||""; }
  function setEscrowed(id,on){ try { const mm=escrowMap(); if(on) mm[id]=new Date().toISOString(); else delete mm[id]; localStorage.setItem(ESCROW_LS_KEY, JSON.stringify(mm)); } catch(e){} }

  // genBackupKeyExportCommand builds the on-box escrow command — the same
  // "generated here, executed on the box" pattern the setup sheet uses. It prints
  // the repo keys as JSON on stdout; the operator saves that off-box.
  function genBackupKeyExportCommand(m){
    return [
      `# hush backups — escrow ${m.id}'s repo keys off-box`,
      "# prints the repository keys as JSON; save the output in a password manager,",
      "# NOT on a box you back up — lose the key and the snapshots are unrecoverable.",
      "sudo hush-agent -export-keys",
    ].join("\n");
  }

  // openBackupEscrowSheet shows the on-box export command and a toggle to record
  // that you've saved the keys off-box. The command runs over SSH (hush-control
  // never sees the key); the "saved" flag is a browser-local reminder only.
  function openBackupEscrowSheet(m){
    const backups = m.backups||[];
    const cmd = genBackupKeyExportCommand(m);
    const when = escrowedAt(m.id);
    backupBody.innerHTML = `
      <h3>Escrow repo keys · ${esc(m.id)}</h3>
      <p class="sd">The repo key lives only on <b>${esc(m.id)}</b> — if the box dies, so does the only copy, and its snapshots are encrypted with it. Run this over SSH and stash the output in a password manager (never on a box you back up).</p>
      <div class="cmdbox"><code id="beCmd">${esc(cmd)}</code><button class="btn" id="beCopy">Copy</button></div>
      <div class="field-note">Read-only — prints ${backups.length} key${backups.length===1?"":"s"} as JSON and exits, over your own SSH session. The key never passes through hush-control or the phone.</div>
      <label class="field" style="flex-direction:row;align-items:center;gap:.5rem;cursor:pointer">
        <input type="checkbox" id="beSaved"${when?" checked":""} style="width:auto">
        <span>I've saved these keys off-box${when?` <span style='opacity:.6'>· marked ${esc(when.slice(0,10))}</span>`:""}</span>
      </label>
      <div class="field-note" style="opacity:.7">This checkbox is a private reminder kept in this browser only — hush-control never records it, and never sees the key.</div>
      <div class="sheet-actions"><button class="btn primary" id="beDone" style="flex:1">Done</button></div>`;
    $("#beCopy").addEventListener("click", async ()=>{
      try { await navigator.clipboard.writeText(cmd); toast("copied to clipboard"); }
      catch(e){ toast("couldn't copy — select and copy manually"); }
    });
    $("#beSaved").addEventListener("change", e=>{ setEscrowed(m.id, e.target.checked); toast(e.target.checked?"marked as escrowed":"escrow mark cleared"); });
    // Re-render the machine view on close so the section badge reflects the mark.
    $("#beDone").addEventListener("click", ()=>{ closeBackupSheet(); renderMachine(); });
    backupScrim.classList.add("open");
  }

  /* ---------- build sheet ---------- */
  const scrim = $("#scrim");
  $("#palette").innerHTML = CONSTRUCTS.map(c=>{
    // Machine is the one construct that already ships (via the add-machine flow),
    // so it carries the "agents waiting to be added" dot the rest don't have.
    const badge = c[0]==="Machine" ? `<span class="badge-count" id="machineBadge" style="display:none"></span>` : "";
    return `
    <div class="pitem" data-c="${c[0]}">
      <span class="pg">${c[1]}</span>
      <div><div class="pn">${c[0]}${badge}</div><div class="pdz">${c[2]}</div></div>
    </div>`;
  }).join("");
  $("#buildBtn").addEventListener("click", ()=>scrim.classList.add("open"));
  scrim.addEventListener("click", e=>{ if(e.target===scrim) scrim.classList.remove("open"); });
  $("#palette").querySelectorAll(".pitem").forEach(el=>{
    el.addEventListener("click", ()=>{
      scrim.classList.remove("open");
      // Machine and Backup are the constructs that actually do something today;
      // the rest are still placeholders.
      if(el.dataset.c === "Machine"){ openAddSheet(); return; }
      if(el.dataset.c === "Backup"){ openBackupSheet(null); return; }
      toast(`＋ ${el.dataset.c} builder — coming in a later phase`);
    });
  });

  /* ---------- add machine sheet ---------- */
  const addScrim = $("#addScrim");
  const addBody = $("#addSheetBody");
  let addStep = 0;                 // 0 form, 1 verified, 2 done
  let addDraft = { name:"", addr:"", role:"" };
  let addTestResult = null;
  let addBusy = false;
  let addError = "";
  // tailnet discovery state for the "Scan tailnet" affordance.
  let discoverState = { ran:false, loading:false, available:true, error:"", candidates:[] };
  // lastDiscover holds the most recent background poll result, so the badge and
  // the freshly-opened sheet can show discovered agents without waiting on a scan.
  let lastDiscover = null;

  function openAddSheet(){
    addStep = 0; addDraft = { name:"", addr:"", role:"" };
    addTestResult = null; addBusy = false; addError = "";
    // Seed from the last background poll so cached candidates show immediately;
    // "Rescan" then refreshes them live.
    if(lastDiscover){
      discoverState = { ran:true, loading:false, available:lastDiscover.available, error:"", candidates:lastDiscover.candidates.slice() };
    } else {
      discoverState = { ran:false, loading:false, available:true, error:"", candidates:[] };
    }
    addScrim.classList.add("open");
    renderAddSheet();
  }
  function closeAddSheet(){ addScrim.classList.remove("open"); }

  function renderAddSheet(){
    if(addStep === 0){
      addBody.innerHTML = `
        <h3>Add a machine</h3>
        <p class="sd">point hush-control at a new hush-agent on your tailnet</p>
        ${renderScanBlock()}
        <div class="field">
          <label>Name <span class="opt">— optional, falls back to the agent's hostname</span></label>
          <input type="text" id="fName" placeholder="e.g. beacon" value="${esc(addDraft.name)}">
        </div>
        <div class="field">
          <label>Tailnet address</label>
          <input type="text" id="fAddr" placeholder="100.71.x.x:8765" value="${esc(addDraft.addr)}">
          <div class="hint">the agent's tailnet IP or MagicDNS name, port 8765</div>
        </div>
        <div class="field">
          <label>Role <span class="opt">— optional</span></label>
          <input type="text" id="fRole" placeholder="e.g. store, gateway" value="${esc(addDraft.role)}">
        </div>
        <div class="field-note">
          <b>Note —</b> hush-agent has no auth yet, so this just confirms the address answers and saves it. Anything already on your tailnet can reach it.
        </div>
        ${addError ? `<div class="field-note err">${esc(addError)}</div>` : ""}
        <div class="sheet-actions">
          <button class="btn ghost" id="addCancel">Cancel</button>
          <button class="btn primary" id="addTest" ${addBusy?"disabled":""}>${addBusy?"Testing…":"Test connection →"}</button>
        </div>`;
      $("#addCancel").addEventListener("click", closeAddSheet);
      $("#addTest").addEventListener("click", submitTest);
      $("#fName").addEventListener("input", e=>{ addDraft.name = e.target.value; });
      $("#fAddr").addEventListener("input", e=>{ addDraft.addr = e.target.value; });
      $("#fRole").addEventListener("input", e=>{ addDraft.role = e.target.value; });
      attachScanHandlers();
    } else if(addStep === 1){
      const r = addTestResult;
      addBody.innerHTML = `
        <h3>Add a machine</h3>
        <p class="sd">${esc(addDraft.addr)}</p>
        <div class="verify-box">
          <div class="verify-row"><span class="vdot ok"></span>reached the agent</div>
          <div class="verify-row"><span class="vdot ok"></span>/vitals responded in ${r.latencyMs}ms</div>
          <div class="preview">
            <span class="gly">▦</span>
            <div><div class="pn">${esc(addDraft.name || r.host || "—")}</div><div class="pm">${esc(r.os||"—")}</div></div>
          </div>
        </div>
        <div class="sheet-actions">
          <button class="btn ghost" id="addBack">← Back</button>
          <button class="btn primary" id="addSave" ${addBusy?"disabled":""}>${addBusy?"Adding…":"Add to fleet"}</button>
        </div>`;
      $("#addBack").addEventListener("click", ()=>{ addStep=0; renderAddSheet(); });
      $("#addSave").addEventListener("click", submitAdd);
    } else {
      const total = M.length + PENDING.length;
      addBody.innerHTML = `
        <h3>${esc(addDraft.name || (addTestResult&&addTestResult.host) || "Machine")} added ✓</h3>
        <p class="sd">now watching ${total} machine${total===1?"":"s"}</p>
        <div class="field-note"><b>Note —</b> vitals arrive on the next poll (~2.5s). No restart of hush-control needed.</div>
        <div class="sheet-actions">
          <button class="btn primary" id="addDone" style="flex:1">Done</button>
        </div>`;
      $("#addDone").addEventListener("click", closeAddSheet);
    }
  }

  async function submitTest(){
    const addr = ($("#fAddr").value || "").trim();
    addDraft.addr = addr;
    if(!addr){ addError = "enter an address"; renderAddSheet(); return; }
    addBusy = true; addError = ""; renderAddSheet();
    try {
      const r = await fetch("api/agents/test", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ addr })
      });
      const data = await r.json();
      addBusy = false;
      if(!data.ok){ addError = data.error || "couldn't reach that address"; renderAddSheet(); return; }
      addTestResult = data;
      addStep = 1;
      renderAddSheet();
    } catch(e){
      addBusy = false; addError = "couldn't reach hush-control itself — is it running?";
      renderAddSheet();
    }
  }

  async function submitAdd(){
    addBusy = true; renderAddSheet();
    try {
      const r = await fetch("api/agents", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ name: addDraft.name, addr: addDraft.addr, role: addDraft.role })
      });
      if(!r.ok){
        addBusy = false; addError = await r.text() || "couldn't add that machine";
        addStep = 0; renderAddSheet(); return;
      }
      const added = await r.json();
      PENDING.push({ id: added.name || (addTestResult&&addTestResult.host) || added.addr, ip: added.ip });
      addBusy = false;
      addStep = 2;
      state.view = "fleet"; // so the pending card is visible behind the sheet
      renderAddSheet();
      render();
      poll(); // fetch fresh vitals now instead of waiting for the next interval tick
      // Drop the just-added machine from the discovery badge without waiting for
      // the next background scan.
      if(lastDiscover){
        lastDiscover.candidates = lastDiscover.candidates.filter(c => c.addr !== addDraft.addr);
        updateAddBadge();
      }
    } catch(e){
      addBusy = false; addError = "couldn't reach hush-control itself — is it running?";
      addStep = 0; renderAddSheet();
    }
  }

  // renderScanBlock draws the "Scan tailnet" control and, once a scan has run,
  // the list of discovered agents not yet in the fleet. Tapping one pre-fills
  // the form and runs the same test → add flow as a hand-typed address.
  function renderScanBlock(){
    const s = discoverState;
    if(s.loading){
      return `<div class="scan-block"><button class="btn ghost" disabled>Scanning tailnet…</button></div>`;
    }
    if(!s.ran){
      return `<div class="scan-block"><button class="btn ghost" id="scanBtn">⟲ Scan tailnet for agents</button></div>`;
    }
    if(!s.available){
      return `<div class="scan-block">
        <button class="btn ghost" id="scanBtn">⟲ Scan tailnet for agents</button>
        <div class="field-note">Tailnet scan needs hush-control running in tsnet mode. Enter the address by hand below.</div></div>`;
    }
    if(s.error){
      return `<div class="scan-block">
        <button class="btn ghost" id="scanBtn">⟲ Rescan tailnet</button>
        <div class="field-note err">${esc(s.error)}</div></div>`;
    }
    if(!s.candidates.length){
      return `<div class="scan-block">
        <button class="btn ghost" id="scanBtn">⟲ Rescan tailnet</button>
        <div class="field-note">No new hush-agents found — everything live on your tailnet is already in the fleet.</div></div>`;
    }
    const rows = s.candidates.map((c,i)=>`
      <button class="disc-row" data-i="${i}">
        <span class="gly">▦</span>
        <div class="disc-meta"><div class="pn">${esc(c.name||c.ip)}</div><div class="pm">${esc(c.ip)}${c.os?" · "+esc(c.os):""}</div></div>
        <span class="disc-add">Add →</span>
      </button>`).join("");
    return `<div class="scan-block">
      <div class="disc-list">${rows}</div>
      <button class="btn ghost" id="scanBtn">⟲ Rescan tailnet</button></div>`;
  }

  function attachScanHandlers(){
    const b = $("#scanBtn");
    if(b) b.addEventListener("click", ()=>scanTailnet(true)); // explicit scan → force fresh
    document.querySelectorAll(".disc-row").forEach(el=>{
      el.addEventListener("click", ()=>{
        const c = discoverState.candidates[+el.dataset.i];
        if(!c) return;
        addDraft.name = c.name || "";
        addDraft.addr = c.addr;
        addError = "";
        const inp = $("#fAddr"); if(inp) inp.value = c.addr;
        const nm = $("#fName"); if(nm) nm.value = c.name || "";
        submitTest(); // reuse the verify → add flow, exactly as a typed address
      });
    });
  }

  async function scanTailnet(fresh){
    discoverState.loading = true; discoverState.error = ""; renderAddSheet();
    try {
      const r = await fetch("api/discover" + (fresh ? "?rescan=1" : ""));
      const data = await r.json();
      discoverState = {
        ran:true, loading:false,
        available: !!data.available,
        error: data.error || "",
        candidates: Array.isArray(data.candidates) ? data.candidates : []
      };
      // keep the badge in sync with what the sheet just learned
      lastDiscover = { available: discoverState.available, candidates: discoverState.candidates };
      updateAddBadge();
    } catch(e){
      discoverState = { ran:true, loading:false, available:true, error:"couldn't reach hush-control — is it running?", candidates:[] };
    }
    renderAddSheet();
  }

  // pollDiscover refreshes the passive badge: how many agents are live on the
  // tailnet but not yet in the fleet. It reads the control plane's cached scan,
  // so it's cheap to call on an interval.
  async function pollDiscover(){
    try {
      const r = await fetch("api/discover");
      const data = await r.json();
      lastDiscover = {
        available: !!data.available,
        candidates: Array.isArray(data.candidates) ? data.candidates : []
      };
      updateAddBadge();
    } catch(e){ /* leave the last known badge in place */ }
  }

  function updateAddBadge(){
    const n = (lastDiscover && lastDiscover.available) ? lastDiscover.candidates.length : 0;
    // The dot rides on Build (the dock button) and on the Machine row inside its palette.
    ["#addBadge","#machineBadge"].forEach(sel=>{
      const b = $(sel);
      if(!b) return;
      if(n > 0){ b.textContent = n; b.style.display = ""; }
      else { b.style.display = "none"; }
    });
    const btn = $("#buildBtn");
    if(btn){
      if(n > 0) btn.title = n + " agent" + (n===1?"":"s") + " found on your tailnet, not yet added";
      else btn.removeAttribute("title");
    }
  }

  addScrim.addEventListener("click", e=>{ if(e.target===addScrim) closeAddSheet(); });

  /* ---------- fleet report download ---------- */
  async function downloadReport(){
    const btn = $("#reportBtn");
    btn.disabled = true;
    try {
      const r = await fetch("api/report", {cache:"no-store"});
      if(!r.ok) throw new Error("bad status");
      const blob = await r.blob();
      const cd = r.headers.get("Content-Disposition") || "";
      const m = /filename="?([^"]+)"?/.exec(cd);
      const name = m ? m[1] : "hush-fleet.json";
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click();
      a.remove(); URL.revokeObjectURL(url);
      toast("⬇ fleet report downloaded");
    } catch(e){
      toast("couldn't generate the report — is hush-control running?");
    } finally {
      btn.disabled = false;
    }
  }
  $("#reportBtn").addEventListener("click", downloadReport);

  /* ---------- toast ---------- */
  let toastT;
  function toast(msg){
    const t = $("#toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove("show"), 2600);
  }

  /* ---------- version / update indicator ---------- */
  const updateScrim = $("#updateScrim");
  const updateBody = $("#updateSheetBody");
  let lastVersion = null;

  async function checkVersion(force){
    const chip = $("#verChip");
    try {
      const r = await fetch(force ? "api/version?force=1" : "api/version", {cache:"no-store"});
      if(!r.ok) throw new Error("bad status");
      const v = await r.json();
      if(!v.current) throw new Error("no version");
      lastVersion = v;
      if(v.updateAvailable && v.latest){
        chip.className = "chip ver avail";
        chip.innerHTML = `<span class="up"></span>${v.current} → ${v.latest}`;
        chip.title = `A newer release (${v.latest}) is available. hush-control auto-updates on its timer; click for a command to update now.`;
      } else {
        chip.className = "chip ver";
        chip.innerHTML = v.current;
        chip.title = v.error ? `Update check failed: ${v.error}` : "Running the latest release. Click to check for updates now.";
      }
      chip.hidden = false;
      return v;
    } catch(e){
      lastVersion = null;
      chip.hidden = true; // no server-side version (demo / file://) — say nothing
      return null;
    }
  }

  $("#verChip").addEventListener("click", ()=>{
    if(lastVersion && lastVersion.updateAvailable && lastVersion.latest){
      openUpdateSheet();
    } else {
      openConfirmCheckSheet();
    }
  });

  function openConfirmCheckSheet(){
    updateBody.innerHTML = `
      <h3>Check for updates now?</h3>
      <p class="sd">This asks GitHub for the latest release immediately instead of waiting for the next scheduled check. GitHub limits unauthenticated API requests per hour, so avoid mashing this button.</p>
      <div class="sheet-actions">
        <button class="btn ghost" id="confCancel" style="flex:1">Cancel</button>
        <button class="btn primary" id="confScan" style="flex:1">Check now</button>
      </div>`;
    $("#confCancel").addEventListener("click", closeUpdateSheet);
    $("#confScan").addEventListener("click", async ()=>{
      const btn = $("#confScan");
      btn.disabled = true;
      btn.textContent = "Checking…";
      const v = await checkVersion(true);
      if(v && v.updateAvailable && v.latest){
        openUpdateSheet();
      } else {
        closeUpdateSheet();
        if(v) toast(v.error ? `update check failed: ${v.error}` : `up to date (${v.current})`);
      }
    });
    updateScrim.classList.add("open");
  }

  function openUpdateSheet(){
    const v = lastVersion;
    const cmd = "sudo systemctl start hush-control-update.service";
    updateBody.innerHTML = `
      <h3>Update available: ${esc(v.latest)}</h3>
      <p class="sd">running ${esc(v.current)} — hush-control auto-updates within its next daily window, or run this now over SSH:</p>
      <div class="cmdbox"><code>${esc(cmd)}</code><button class="btn" id="updCopy">Copy</button></div>
      <div class="field-note">Verifies the release's SHA-256 before swapping the binary, then restarts the service. Safe to run any time.</div>
      <div class="sheet-actions">
        <a class="btn ghost" href="https://github.com/clarkbar-sys/hush/releases/tag/${encodeURIComponent(v.latest)}" target="_blank" rel="noopener" style="text-decoration:none;text-align:center">Release notes</a>
        <button class="btn primary" id="updClose" style="flex:1">Done</button>
      </div>`;
    $("#updCopy").addEventListener("click", async ()=>{
      try { await navigator.clipboard.writeText(cmd); toast("copied to clipboard"); }
      catch(e){ toast("couldn't copy — select and copy manually"); }
    });
    $("#updClose").addEventListener("click", closeUpdateSheet);
    updateScrim.classList.add("open");
  }
  function closeUpdateSheet(){ updateScrim.classList.remove("open"); }
  updateScrim.addEventListener("click", e=>{ if(e.target===updateScrim) closeUpdateSheet(); });

  /* ---------- per-machine agent update popup ---------- */
  function openAgentUpdateSheet(m){
    const isMac = (m.os||"").toLowerCase()==="darwin";
    const cmd = isMac
      ? "go install github.com/clarkbar-sys/hush/cmd/hush-agent@latest"
      : "curl -fsSL https://raw.githubusercontent.com/clarkbar-sys/hush/main/install.sh | sudo sh\nsudo systemctl restart hush-agent";
    const note = isMac
      ? "macOS has no systemd unit to install — this rebuilds the binary with the Go toolchain. Restart the running hush-agent process yourself afterward."
      : "Re-runs the one-line installer to fetch the new binary, then restarts the service so it picks it up.";
    updateBody.innerHTML = `
      <h3>Update available on ${esc(m.id)}: ${esc(m.latestVersion)}</h3>
      <p class="sd">running ${esc(m.agentVersion)} — run this on ${esc(m.id)} over SSH:</p>
      <div class="cmdbox"><code>${esc(cmd)}</code><button class="btn" id="agentUpdCopy">Copy</button></div>
      <div class="field-note">${note}</div>
      <div class="sheet-actions">
        <a class="btn ghost" href="https://github.com/clarkbar-sys/hush/releases/tag/${encodeURIComponent(m.latestVersion)}" target="_blank" rel="noopener" style="text-decoration:none;text-align:center">Release notes</a>
        <button class="btn primary" id="agentUpdClose" style="flex:1">Done</button>
      </div>`;
    $("#agentUpdCopy").addEventListener("click", async ()=>{
      try { await navigator.clipboard.writeText(cmd); toast("copied to clipboard"); }
      catch(e){ toast("couldn't copy — select and copy manually"); }
    });
    $("#agentUpdClose").addEventListener("click", closeUpdateSheet);
    updateScrim.classList.add("open");
  }

  /* ---------- go ---------- */
  poll();
  setInterval(poll, 2500);
  checkVersion();
  setInterval(checkVersion, 15*60*1000);
  pollDiscover();
  setInterval(pollDiscover, 20000);
  pollBackupStatus();
  setInterval(pollBackupStatus, 60000);

  /* register the service worker so the console is installable and opens
     offline. Only works in a secure context (tsnet HTTPS or localhost);
     silently skipped over plain-HTTP LAN, where the console still runs fine. */
  if ('serviceWorker' in navigator && window.isSecureContext) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch((err) => {
        console.warn('service worker registration failed:', err);
      });
    });
  }
})();
</script>
</body>
</html>
