<div id="homeScreen" role="dialog" aria-label="hush launcher" hidden>
  <div class="home-phone">
    <div class="home-screen">
      <div class="home-status">
        <span class="home-carrier"><span class="home-bars"><i></i><i></i><i></i><i></i><i></i></span>clarkbar.sys</span>
        <span class="spacer"></span>
        <span class="home-clock" id="homeClock">--:--</span>
        <span class="spacer"></span>
        <span class="home-batt"><span><b></b></span></span>
      </div>
      <div class="home-header">
        <div class="brand"><span class="dot-h"></span><b>hush</b></div>
        <button class="chip ver" id="verChip" type="button" hidden></button>
      </div>
      <div class="home-grid">
        <button class="home-app" id="homeHush" data-tile="fleet" type="button" aria-label="Open fleet">
          <span class="home-icon"><img src="/icon-192.png" alt="" width="57" height="57" draggable="false"></span>
          <span class="home-label">fleet</span>
        </button>
        <button class="home-app" id="homePayphone" data-tile="payphone" type="button" aria-label="Open payphone">
          <span class="home-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="15" cy="5.2" r="2.2"></circle>
            <path d="M15 7.6 11.5 13"></path>
            <path d="M11.5 13 15.5 16"></path>
            <path d="M15.5 16 13.5 21"></path>
            <path d="M11.5 13 5.5 17.5"></path>
            <path d="M11.5 13 8.7 8.3 6.7 7"></path>
            <circle cx="6.7" cy="7" r="1.1"></circle>
          </svg></span>
          <span class="home-label">payphone</span>
        </button>
        <button class="home-app" id="homeGithub" data-tile="github" type="button" aria-label="Browse clarkbar.sys repos on GitHub">
          <span class="home-icon"><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></span>
          <span class="home-label">github</span>
        </button>
        <a class="home-app" id="homeTally" data-tile="tally" href="https://tally/" target="_blank" rel="noopener" aria-label="Open tally">
          <span class="home-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M6 4v16M10 4v16M14 4v16M18 4v16"></path>
            <path d="M3 15 21 7"></path>
          </svg></span>
          <span class="home-label">tally</span>
        </a>
        <button class="home-app" id="homePlug" data-tile="plug" type="button" aria-label="Open plug — data sources">
          <span class="home-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 2v6M15 2v6"></path>
            <path d="M7 8h10v2a5 5 0 0 1-10 0V8z"></path>
            <path d="M12 15v7"></path>
          </svg></span>
          <span class="home-label">plug</span>
        </button>
        <button class="home-app" id="homeRiff" data-tile="riff" type="button" aria-label="Open riff together">
          <span class="home-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="16.5" r="2" fill="currentColor" stroke="none"></circle>
            <path d="M8 13.5a5.5 5.5 0 0 1 8 0"></path>
            <path d="M5.5 11a9 9 0 0 1 13 0" opacity=".7"></path>
            <path d="M3 8.6a12.6 12.6 0 0 1 18 0" opacity=".42"></path>
          </svg></span>
          <span class="home-label">riff</span>
        </button>
        <button class="home-app" id="homeLlmnuke" data-tile="llmnuke" type="button" aria-label="Open LLMNUKE.EXE — agent sessions">
          <span class="home-icon home-icon-nuke"><svg viewBox="0 0 57 57" aria-hidden="true">
            <defs>
              <radialGradient id="nukeTileBg" cx="50%" cy="34%" r="80%">
                <stop offset="0" stop-color="#0c3a05"></stop>
                <stop offset="1" stop-color="#010600"></stop>
              </radialGradient>
              <linearGradient id="nukeTileTox" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#d6ffce"></stop>
                <stop offset=".55" stop-color="#39ff14"></stop>
                <stop offset="1" stop-color="#0f7a06"></stop>
              </linearGradient>
            </defs>
            <rect width="57" height="57" rx="12" fill="url(#nukeTileBg)"></rect>
            <g opacity=".5" stroke="#39ff14" stroke-width=".5">
              <path d="M0 14h57M0 28h57M0 42h57"></path>
            </g>
            <g transform="translate(28.5 25)" fill="url(#nukeTileTox)" stroke="#031400" stroke-width="1.4" stroke-linejoin="round">
              <circle r="4.4"></circle>
              <path d="M0 0 L10 -17.3 A20 20 0 0 1 20 0 Z"></path>
              <path d="M0 0 L10 -17.3 A20 20 0 0 1 20 0 Z" transform="rotate(120)"></path>
              <path d="M0 0 L10 -17.3 A20 20 0 0 1 20 0 Z" transform="rotate(240)"></path>
            </g>
            <text x="28.5" y="50" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="9" font-weight="700" letter-spacing="1" fill="#39ff14">.EXE</text>
          </svg></span>
          <span class="home-label">LLMNUKE.EXE</span>
        </button>
        <button class="home-app" id="homeForge" data-tile="forgecraft" type="button" aria-label="Open forgecraft">
          <span class="home-icon"><svg viewBox="0 0 24 24" aria-hidden="true">
            <defs>
              <linearGradient id="homeForgeGold" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#fff4cf"></stop>
                <stop offset=".18" stop-color="#ffd268"></stop>
                <stop offset=".55" stop-color="#e18a2b"></stop>
                <stop offset=".8" stop-color="#9c4f18"></stop>
                <stop offset="1" stop-color="#f4b64c"></stop>
              </linearGradient>
              <linearGradient id="homeForgeEmber" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#ffe27a"></stop>
                <stop offset=".55" stop-color="#ff6a1f"></stop>
                <stop offset="1" stop-color="#b81e0a"></stop>
              </linearGradient>
            </defs>
            <text x="12" y="18.5" text-anchor="middle" font-size="19" font-weight="900"
              font-family="'Arial Black',Impact,sans-serif" style="paint-order:stroke"
              stroke="#1b0d05" stroke-width="2.4" stroke-linejoin="round" fill="url(#homeForgeGold)">F</text>
            <ellipse cx="12" cy="20.5" rx="7" ry=".9" fill="url(#homeForgeEmber)" opacity=".85"></ellipse>
          </svg></span>
          <span class="home-label">forgecraft</span>
        </button>
      </div>
      <div class="home-edit-hint" id="homeEditHint" aria-hidden="true">Drag to rearrange · tap the wallpaper when you're done</div>
      <div class="home-dots" aria-hidden="true"><i class="on"></i></div>
